<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Casos — CAFSA</title>
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.js"></script>
    <style>
        :root {
            --brand-red: #E24B4A;
            --brand-dark: #2D2D2D;
            --brand-gray: #5F5E5A;
            --brand-light: #F4F4F4;
            --accent: #1D9E75;
            --text-primary: #1a1a1a;
            --border: #E0E0E0;
            --surface: #ffffff;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        /* Tipografía Arial para máxima legibilidad y look Tech-Financiero */
        body { font-family: Arial, Helvetica, sans-serif; background: #ECECEC; color: var(--text-primary); }
        
        header { 
            background: var(--brand-dark); padding: 0 2rem; height: 70px; display: flex; 
            align-items: center; justify-content: space-between; color: white; position: sticky; 
            top: 0; z-index: 100; border-bottom: 4px solid var(--brand-red);
        }
        .logo-badge { background: var(--brand-red); padding: 6px 12px; border-radius: 8px; font-weight: bold; margin-right: 12px; }
        #auth-btn { background: transparent; border: 2px solid rgba(255,255,255,0.2); color: white; padding: 8px 18px; border-radius: var(--radius); cursor: pointer; transition: 0.3s; font-weight: 600; }
        
        #status-bar { background: white; padding: 10px 2rem; font-size: 13px; color: var(--brand-gray); border-bottom: 1px solid var(--border); display: none; align-items: center; gap: 10px; }
        
        main { padding: 2.5rem 1rem; max-width: 1200px; margin: 0 auto; }
        .form-card { background: var(--surface); border-radius: 20px; padding: 2.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }

        .section-title { 
            color: var(--brand-dark); padding: 0 0 10px 0; border-bottom: 2px solid var(--brand-light);
            margin: 30px 0 20px 0; font-size: 16px; font-weight: 700; text-transform: uppercase; 
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::before { content: ''; width: 4px; height: 18px; background: var(--brand-red); border-radius: 2px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        .field.span-full { grid-column: 1 / -1; }
        label { font-size: 12px; font-weight: 600; color: var(--brand-gray); }
        
        input, select, textarea { 
            padding: 12px 15px; border: 2px solid var(--brand-light); border-radius: var(--radius); 
            font-family: Arial, sans-serif; font-size: 14px; background: var(--brand-light); outline: none; transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--brand-red); background: white; }
        
        .highlight-box { background: #FAFAFA; border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); }
        .analysis-section { border-left: 5px solid var(--brand-red); background: #fffdfd; display: none; padding: 25px; border-radius: 0 var(--radius) var(--radius) 0; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); }

        .actions { margin-top: 40px; display: flex; justify-content: flex-end; }
        .btn-save { 
            background: var(--brand-red); color: white; border: none; padding: 15px 50px; border-radius: 50px; 
            font-weight: 700; cursor: pointer; transition: 0.4s; display: flex; align-items: center; gap: 12px; font-size: 15px;
        }
        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(226, 75, 74, 0.4); }

        #toast { position: fixed; bottom: 30px; right: 30px; padding: 18px 30px; border-radius: var(--radius); color: white; display: none; z-index: 1000; font-weight: 600; }
        .success { background: var(--accent); }
        .error { background: var(--brand-red); }

        #login-overlay { position: fixed; inset: 0; background: var(--brand-dark); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .spinner { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div style="background:#fff; border-radius:25px; padding:3rem; max-width:400px; width:90%; text-align:center;">
        <h2 id="overlay-title">Verificando sesión...</h2>
        <button id="manual-login-btn" onclick="signIn()" style="display:none; width:100%; padding:15px; background:var(--brand-red); color:#fff; border:none; border-radius:50px; margin-top:20px; cursor:pointer; font-weight: 700;">Iniciar Sesión</button>
    </div>
</div>

<header>
    <div class="header-brand"><span class="logo-badge">CAFSA</span><strong>Repositorio Técnico</strong></div>
    <button id="auth-btn" onclick="signOut()"><span id="auth-label">Conectando...</span></button>
</header>

<div id="status-bar"><span id="status-text">Iniciando...</span></div>

<main>
    <div class="form-card">
        <form id="formNuevo">
            <div class="section-title">1. Cliente y Operación</div>
            <div class="grid">
                <div class="field span-full">
                    <div style="display: flex; align-items: center; gap: 15px; padding: 15px; border: 2px dashed var(--border); border-radius: var(--radius);">
                        <input type="checkbox" id="esReferido" style="width: 20px; height: 20px; accent-color: var(--brand-red);">
                        <label style="margin:0">¿ES REFERIDO? (AS)</label>
                    </div>
                </div>
                <div class="field"><label>Empresa (T)</label><select id="n_empresa" required><option value="">-- Seleccionar --</option><option>ARRENDADORA</option><option>FINANCIERA</option></select></div>
                <div class="field"><label>Ejecutivo (U)</label><select id="n_ejecutivo" required><option value="">-- Seleccionar --</option><option>K. Rodríguez</option><option>A. Mora</option><option>A. Valverde</option><option>B. Castro</option><option>C. Molina</option><option>C. Jiménez</option><option>D. Alvarado</option><option>D. Espinoza</option><option>D. Mora</option><option>D. Villar</option><option>D. Piña</option><option>D. Valerin</option><option>F. Badilla</option><option>F. Meza</option><option>F. Palma</option><option>I. Ureña</option><option>J. González</option><option>J. Viales</option><option>J. Martínez</option><option>J. Montero</option><option>J. Arroyo</option><option>L. Espinoza</option><option>M. Sánchez</option><option>G. Peña</option><option>R. Rodríguez</option><option>R. Porras</option><option>R. Abarca</option></select></div>
                <div class="field"><label>Sucursal (V)</label><select id="n_sucursal" required><option value="">-- Seleccionar --</option><option>AL ESTE</option><option>AUTOMOTRIZ CURRIDABAT</option><option>AUTOMOTRIZ ESCAZU</option><option>AUTOMOTRIZ LA URUCA</option><option>AUTOMOTRIZ LIBERIA</option><option>AUTOMOTRIZ PEREZ ZELEDON</option><option>AUTOMOTRIZ SAN CARLOS</option><option>LEXUS</option><option>XPENG</option><option>PURDY CIUDAD TOYOTA</option><option>PURDY CURRIDABAT</option><option>OTROS NEGOCIOS</option></select></div>
                <div class="field"><label>Cédula (W)</label><input type="text" id="n_cedula"></div>
                <div class="field"><label>Cliente (X)</label><input type="text" id="n_cliente" required></div>
                <div class="field"><label>Tipo Cliente (K)</label><select id="n_tipoCliente"><option value="">-- Seleccionar --</option><option>JURIDICO</option><option>INDEPENDIENTE</option><option>ASALARIADO</option></select></div>
                <div class="field"><label>Riesgo (AH)</label><select id="n_tipoRiesgo"><option value="SIN ALERTA">SIN ALERTA</option><option value="API">API</option><option value="PEP">PEP</option><option value="APFND">APFND</option></select></div>
            </div>

            <div class="section-title">2. Garantía y Financiero</div>
            <div class="highlight-box grid">
                <div class="field"><label>Moneda (Y)</label><select id="n_moneda"><option value="COLONES">COLONES</option><option value="DOLARES">DOLARES</option></select></div>
                <div class="field"><label>Monto Crédito (Z)</label><input type="number" id="n_valor" oninput="validarYCalcularPorcentaje()"></div>
                <div class="field">
                    <label>Depósito / Prima (AA)</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="n_deposito" oninput="validarYCalcularPorcentaje()" style="flex:1">
                        <span id="n_porcentaje_txt" style="font-weight: 800; color: var(--brand-red); padding: 10px; background: #fff; border-radius: 8px; border: 1px solid var(--border);">0%</span>
                    </div>
                </div>
                <div class="field"><label>Monto Garantía (AB)</label><input type="number" id="n_montoArrendar" oninput="validarYCalcularPorcentaje()"></div>
                <div class="field"><label>Marca (AD)</label><input type="text" id="n_marca"></div>
                <div class="field"><label>Modelo (AE)</label><input type="text" id="n_modelo"></div>
                <div class="field"><label>Año (AF)</label><input type="number" id="n_anio"></div>
            </div>

            <div class="section-title">3. Estado de Operación</div>
            <div class="grid">
                <div class="field"><label>Estado Principal (B)</label><select id="n_estado" required><option value="">-- Seleccionar --</option><option>Aprobado</option><option>Desembolsado</option><option>Reservado</option><option>Rechazado</option><option>En aprobación</option><option>En Estudio de Riesgo</option></select></div>
                <div class="field"><label>Producto (F)</label><select id="n_producto"><option value="">-- Seleccionar --</option><option>AOFF</option><option>AOP</option><option>RENTING</option><option>USADOS</option><option>MOTOS</option><option>PRENDARIO</option></select></div>
                <div class="field"><label>F. Entrega (C)</label><input type="date" id="n_fechaEntrega"></div>
                <div class="field"><label>Hora Entrega (D)</label><input type="time" id="n_horaEntrega"></div>
                <div class="field"><label>OP (N)</label><input type="text" id="n_op"></div>
                <div class="field"><label>Solicitud (O)</label><input type="text" id="n_solicitud"></div>
            </div>

            <div class="section-title">4. Envío a Análisis Técnico</div>
            <div class="field span-full" style="margin-bottom: 20px;">
                <div style="display: flex; align-items: center; gap: 15px; padding: 20px; background: var(--brand-dark); color: white; border-radius: var(--radius); cursor: pointer;" onclick="document.getElementById('check_A').click()">
                    <input type="checkbox" id="check_A" onchange="toggleAnalisis()" style="width: 24px; height: 24px; accent-color: var(--brand-red);" onclick="event.stopPropagation()">
                    <label for="check_A" style="color: white; font-size: 14px; cursor: pointer; margin:0;">HABILITAR ENVÍO DE CASO A ANÁLISIS (AT)</label>
                </div>
            </div>

            <div id="seccionAnalisis" class="analysis-section">
                <div class="grid">
                    <div class="field"><label>Monto de la solicitud (AX)</label><input type="text" id="ana_monto" placeholder="Ej: $1111 ó ¢11111"></div>
                    <div class="field"><label>Tipo de vehículo (AY)</label><input type="text" id="ana_vehiculo" placeholder="Marca, estilo, año, nuevo/usado"></div>
                    <div class="field"><label>Porcentaje de Prima (AZ)</label><input type="text" id="ana_prima" placeholder="10%, 20%..."></div>
                    
                    <div class="field"><label>Nivel de aprobación (BA)</label>
                        <select id="ana_nivel">
                            <option value="">-- Seleccionar --</option>
                            <option>Comité de Crédito</option>
                            <option>Comité Ejecutivo</option>
                            <option>Gerencia General</option>
                            <option>Gerencia de Crédito</option>
                        </select>
                    </div>

                    <div class="field"><label>Tipo de operación (BB)</label>
                        <select id="ana_tipo_op">
                            <option value="">-- Seleccionar --</option>
                            <option>Arrendamiento</option>
                            <option>Financiamiento</option>
                            <option>Línea</option>
                            <option>Tarjeta</option>
                            <option>Marchamo</option>
                        </select>
                    </div>

                    <div class="field"><label>Gestión (BC)</label>
                        <select id="ana_gestion">
                            <option value="">-- Seleccionar --</option>
                            <option>Incremento</option>
                            <option>Nuevo</option>
                            <option>Renovación</option>
                            <option>Renovación e incremento</option>
                            <option>Seguimiento</option>
                        </select>
                    </div>

                    <div class="field span-full"><label>Tasa fija y variable (BD)</label>
                        <textarea id="ana_tasas" rows="2" placeholder="Detalle: Tasa fija los primeros X años de, posterior tasa de X..."></textarea>
                    </div>

                    <div class="field"><label>Plazo en meses (BE)</label><input type="number" id="ana_plazo"></div>
                    
                    <div class="field"><label>Ejecutivo y número de contacto (BF)</label>
                        <input type="text" id="ana_contacto" placeholder="Nombre apellido y número telefónico">
                    </div>

                    <div class="field"><label>Exposición (BG)</label>
                        <input type="text" id="ana_exposicion" placeholder="Individual, GIE, Total">
                    </div>

                    <div class="field span-full"><label>Comentarios adicionales importantes (BH)</label>
                        <textarea id="ana_comentarios" rows="2"></textarea>
                    </div>

                    <div class="field"><label>Archivos del caso (Carpeta ZIP) (BI)</label>
                        <input type="text" id="ana_zip" placeholder="Nombre de la carpeta ZIP">
                    </div>

                    <div class="field"><label>Origen de fondos (BJ)</label>
                        <select id="ana_fondos">
                            <option value="">-- Seleccionar --</option>
                            <option>entrega vehículo</option>
                            <option>ahorros</option>
                            <option>Fondos propios</option>
                            <option>otros</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button type="button" id="btnGuardar" class="btn-save" onclick="guardarNuevo()">
                    <div class="spinner" id="btnSpinner"></div>
                    <span id="btnText">Guardar Registro</span>
                </button>
            </div>
        </form>
    </div>
</main>

<div id="toast"></div>

<script>
// Configuración MSAL y Excel se mantiene igual...
const msalConfig = {
    auth: {
        clientId: "330765a8-2c56-4eca-bce2-f418eb1cdaf0",
        authority: "https://login.microsoftonline.com/8fe4234f-a041-4848-a8c7-ebe2442403da",
        redirectUri: "https://mhernandez-cafsa.github.io/formulario-cafsa/"
    },
    cache: { cacheLocation: "sessionStorage" }
};

const EXCEL_CONFIG = {
    driveUrl: "/sites/financieracafsasa.sharepoint.com:/sites/RepositoriodeCasos:/drive",
    fileName: "Casos en trámite.xlsx",
    sheetPrincipal: "Casos",
    sheetAnalisis: "Casos Para Análisis"
};

let msalInstance, accessToken, currentUser, fileId, driveId, nextRowPrincipal = 0, nextRowAnalisis = 0;

async function init() {
    msalInstance = new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();
    try {
        const response = await msalInstance.handleRedirectPromise();
        if (response) {
            accessToken = response.accessToken;
            currentUser = response.account;
            onAuthenticated();
        } else {
            const accounts = msalInstance.getAllAccounts();
            if (accounts.length > 0) {
                const silent = await msalInstance.acquireTokenSilent({
                    scopes: ["Files.ReadWrite.All", "Sites.ReadWrite.All"],
                    account: accounts[0]
                });
                accessToken = silent.accessToken;
                currentUser = accounts[0];
                onAuthenticated();
            } else {
                document.getElementById("manual-login-btn").style.display = "block";
            }
        }
    } catch (e) {
        document.getElementById("manual-login-btn").style.display = "block";
    }
}

async function onAuthenticated() {
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("auth-label").innerText = currentUser.name;
    document.getElementById("status-bar").style.display = "flex";
    try {
        const driveRes = await graphCall(EXCEL_CONFIG.driveUrl);
        driveId = driveRes.id;
        const search = await graphCall(`/drives/${driveId}/root/search(q='${EXCEL_CONFIG.fileName}')`);
        const file = search.value.find(f => f.name === EXCEL_CONFIG.fileName);
        fileId = file.id;
        const rangeP = await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${EXCEL_CONFIG.sheetPrincipal}/usedRange`);
        nextRowPrincipal = rangeP.rowCount + 1;
        const rangeA = await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${EXCEL_CONFIG.sheetAnalisis}/usedRange`);
        nextRowAnalisis = rangeA.rowCount + 1;
        document.getElementById("status-text").innerText = "Sincronizado con SharePoint";
    } catch (e) { showToast("Error de conexión", "error"); }
}

function toggleAnalisis() {
    const isChecked = document.getElementById("check_A").checked;
    document.getElementById("seccionAnalisis").style.display = isChecked ? "block" : "none";
}

async function graphCall(endpoint, method = "GET", body = null) {
    const headers = new Headers();
    headers.append("Authorization", `Bearer ${accessToken}`);
    headers.append("Content-Type", "application/json");
    const options = { method, headers };
    if (body) options.body = JSON.stringify(body);
    const response = await fetch(`https://graph.microsoft.com/v1.0${endpoint}`, options);
    return response.json();
}

function validarYCalcularPorcentaje() {
    const deposito = parseFloat(document.getElementById("n_deposito").value) || 0;
    const montoG = parseFloat(document.getElementById("n_montoArrendar").value) || 0;
    if (montoG > 0) document.getElementById("n_porcentaje_txt").innerText = ((deposito / montoG) * 100).toFixed(1) + "%";
}

async function guardarNuevo() {
    const btn = document.getElementById("btnGuardar");
    btn.disabled = true;
    document.getElementById("btnSpinner").style.display = "block";

    try {
        const now = new Date();
        const marcaTemporal = now.toLocaleString(); // Columna AU
        const idUnico = now.toISOString().split('T')[0].replace(/-/g, '') + now.getHours() + now.getMinutes() + now.getSeconds();
        
        const enviadoAnalisis = document.getElementById("check_A").checked ? "SI" : "NO";
        const clienteNom = document.getElementById("n_cliente").value; // AV
        const cedulaVal = document.getElementById("n_cedula").value; // AW

        const rowData = [[
            idUnico, // A
            document.getElementById("n_estado").value, // B
            document.getElementById("n_fechaEntrega").value, // C
            document.getElementById("n_horaEntrega").value, // D
            "", // E
            document.getElementById("n_producto").value, // F
            "", "", "", "", // G - J
            document.getElementById("n_tipoCliente").value, // K
            "", "", // L, M
            document.getElementById("n_op").value, // N
            document.getElementById("n_solicitud").value, // O
            "", "", "", // P, Q, R
            document.getElementById("n_empresa").value, // S
            document.getElementById("n_ejecutivo").value, // T
            document.getElementById("n_sucursal").value, // U
            cedulaVal, // V
            clienteNom, // W
            document.getElementById("n_moneda").value, // X
            document.getElementById("n_valor").value, // Y
            document.getElementById("n_deposito").value, // Z
            document.getElementById("n_montoArrendar").value, // AA
            "1", // AB
            document.getElementById("n_marca").value, // AC
            document.getElementById("n_modelo").value, // AD
            document.getElementById("n_anio").value, // AE
            "", // AF
            document.getElementById("n_tipoRiesgo").value, // AG
            "ACTIVO", // AH
            "", "", "", "", "", "", "", "", "", // AI - AQ
            currentUser.name, // AR
            (document.getElementById("esReferido").checked ? "SI" : "NO"), // AS
            enviadoAnalisis, // AT
            marcaTemporal, // AU: Marca temporal
            clienteNom, // AV: Nombre Replicado
            cedulaVal, // AW: Cedula Replicada
            document.getElementById("ana_monto").value, // AX
            document.getElementById("ana_vehiculo").value, // AY
            document.getElementById("ana_prima").value, // AZ
            document.getElementById("ana_nivel").value, // BA
            document.getElementById("ana_tipo_op").value, // BB
            document.getElementById("ana_gestion").value, // BC
            document.getElementById("ana_tasas").value, // BD
            document.getElementById("ana_plazo").value, // BE
            document.getElementById("ana_contacto").value, // BF
            document.getElementById("ana_exposicion").value, // BG
            document.getElementById("ana_comentarios").value, // BH
            document.getElementById("ana_zip").value, // BI
            document.getElementById("ana_fondos").value // BJ
        ]];

        const addrP = `${EXCEL_CONFIG.sheetPrincipal}!A${nextRowPrincipal}:BJ${nextRowPrincipal}`;
        await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${EXCEL_CONFIG.sheetPrincipal}/range(address='${addrP}')`, "PATCH", { values: rowData });

        if (enviadoAnalisis === "SI") {
            const addrA = `${EXCEL_CONFIG.sheetAnalisis}!A${nextRowAnalisis}:BJ${nextRowAnalisis}`;
            await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${EXCEL_CONFIG.sheetAnalisis}/range(address='${addrA}')`, "PATCH", { values: rowData });
            nextRowAnalisis++;
        }

        showToast("✓ Guardado con éxito", "success");
        document.getElementById("formNuevo").reset();
        toggleAnalisis();
        nextRowPrincipal++;
    } catch (e) {
        showToast("Error: " + e.message, "error");
    } finally {
        btn.disabled = false;
        document.getElementById("btnSpinner").style.display = "none";
    }
}

function showToast(msg, type) {
    const t = document.getElementById("toast");
    t.innerText = msg; t.className = type; t.style.display = "block";
    setTimeout(() => t.style.display = "none", 3000);
}

async function signIn() { await msalInstance.loginRedirect({ scopes: ["Files.ReadWrite.All", "Sites.ReadWrite.All"] }); }
async function signOut() { await msalInstance.logoutRedirect(); }

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
