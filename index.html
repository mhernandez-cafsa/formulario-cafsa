<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Casos — CAFSA</title>
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.js"></script>
    <style>
        /* Tipografía redondeada y legible tipo App */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap');
        
        :root {
            --brand-red: #E24B4A;
            --brand-dark: #1A1C1E; /* Gris oscuro financiero */
            --brand-gray: #64748B;
            --brand-light: #F8FAFC;
            --accent: #10B981;
            --text-primary: #1E293B;
            --border: #E2E8F0;
            --surface: #FFFFFF;
            --radius: 16px; /* Más redondeado para estética App */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #F1F5F9; 
            color: var(--text-primary); 
            line-height: 1.5;
        }
        
        header { 
            background: var(--brand-dark); 
            padding: 0 2rem; 
            height: 70px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            color: white; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            border-bottom: 4px solid var(--brand-red);
        }
        .logo-badge { 
            background: var(--brand-red); 
            padding: 6px 14px; 
            border-radius: 10px; 
            font-family: 'DM Mono'; 
            font-weight: bold;
            margin-right: 12px; 
        }
        #auth-btn { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            color: white; 
            padding: 8px 18px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: 0.3s;
            font-weight: 600;
            font-family: inherit;
        }
        #auth-btn:hover { background: rgba(255,255,255,0.2); }
        
        #status-bar { 
            background: white; 
            padding: 10px 2rem; 
            font-size: 13px; 
            color: var(--brand-gray); 
            border-bottom: 1px solid var(--border); 
            display: none; 
            align-items: center; 
            gap: 10px; 
        }
        
        main { padding: 2.5rem 1rem; max-width: 1100px; margin: 0 auto; }
        
        .form-card { 
            background: var(--surface); 
            border-radius: 24px; 
            padding: 3rem; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.04); 
        }

        .section-title { 
            color: var(--brand-dark); 
            padding: 0 0 12px 0;
            border-bottom: 2px solid var(--brand-light);
            margin: 40px 0 24px 0; 
            font-size: 18px; 
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-title:first-of-type { margin-top: 0; }
        
        .section-title::before {
            content: '';
            width: 6px;
            height: 22px;
            background: var(--brand-red);
            display: inline-block;
            border-radius: 4px;
        }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        .span-full { grid-column: 1 / -1; }
        
        label { font-size: 13px; font-weight: 600; color: #475569; }
        
        input, select, textarea { 
            padding: 12px 16px; 
            border: 2px solid #F1F5F9; 
            border-radius: 14px; 
            font-family: inherit; 
            font-size: 14px; 
            background: #F8FAFC; 
            outline: none; 
            transition: all 0.2s ease;
            color: var(--text-primary);
        }
        input:focus, select:focus, textarea:focus { 
            border-color: var(--brand-red); 
            background: white;
            box-shadow: 0 0 0 4px rgba(226, 75, 74, 0.08);
        }
        
        /* Especial para Sección 4 colapsable */
        .collapsible-content {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed var(--border);
        }
        #toggleSeccion4:checked ~ .collapsible-content { display: block; }

        .financiero-highlight {
            background: #F8FAFC;
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 20px;
        }
        
        .actions { margin-top: 50px; display: flex; justify-content: center; }
        
        .btn-save { 
            background: var(--brand-dark); 
            color: white; 
            border: none; 
            padding: 18px 60px; 
            border-radius: 18px; 
            font-weight: 700; 
            font-size: 16px;
            cursor: pointer; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .btn-save:hover { background: #000; transform: translateY(-2px); }
        .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }
        
        #toast { position: fixed; bottom: 30px; right: 30px; padding: 18px 30px; border-radius: 16px; color: white; display: none; z-index: 1000; font-weight: 600; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
        .success { background: var(--accent); }
        .error { background: var(--brand-red); }

        #login-overlay { position: fixed; inset: 0; background: var(--brand-dark); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .login-card { background:#fff; border-radius: 30px; padding: 4rem; max-width: 450px; width: 90%; text-align: center; }
        
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .replica-badge { font-size: 10px; background: #E2E8F0; padding: 2px 8px; border-radius: 4px; margin-left: 5px; color: #64748B; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <div style="font-size: 50px; margin-bottom: 24px;">🏢</div>
        <h2 style="margin-bottom: 12px; color: var(--brand-dark); font-weight: 800;">Portal CAFSA</h2>
        <p style="margin-bottom: 30px; color: var(--brand-gray); font-size: 16px;">Autenticación corporativa requerida.</p>
        <button id="manual-login-btn" onclick="signIn()" style="display:none; width:100%; padding:16px; background:var(--brand-red); color:#fff; border:none; border-radius:16px; cursor:pointer; font-weight: 700; font-family: inherit;">Iniciar Sesión</button>
    </div>
</div>

<header>
    <div class="header-brand"><span class="logo-badge">CAFSA</span><strong>Core de Operaciones</strong></div>
    <button id="auth-btn" onclick="signOut()"><span id="auth-label">Conectando...</span></button>
</header>

<div id="status-bar">
    <div style="width: 8px; height: 8px; background: var(--accent); border-radius: 50%;"></div>
    <span id="status-text">Validando credenciales...</span>
</div>

<main>
    <div class="form-card">
        <form id="formNuevo">
            <div class="section-title">1. Cliente y Operación</div>
            <div class="grid">
                <div class="field span-full">
                    <label>¿ES REFERIDO? (AS)</label>
                    <div style="display: flex; align-items: center; gap: 15px; padding: 15px; background: var(--brand-light); border-radius: 14px;">
                        <input type="checkbox" id="esReferido" style="width: 20px; height: 20px; accent-color: var(--brand-red);">
                        <span style="font-weight: 500; font-size: 14px;">Marcar si el cliente es una referencia</span>
                    </div>
                </div>
                <div class="field"><label>Empresa (T)</label><select id="n_empresa" required><option value="">-- Seleccionar --</option><option>ARRENDADORA</option><option>FINANCIERA</option></select></div>
                <div class="field"><label>Ejecutivo (U)</label><select id="n_ejecutivo" required><option value="">-- Seleccionar --</option><option>K. Rodríguez</option><option>A. Mora</option><option>A. Valverde</option><option>B. Castro</option><option>C. Molina</option><option>C. Jiménez</option><option>D. Alvarado</option><option>D. Espinoza</option><option>D. Mora</option><option>D. Villar</option><option>D. Piña</option><option>D. Valerin</option><option>F. Badilla</option><option>F. Meza</option><option>F. Palma</option><option>I. Ureña</option><option>J. González</option><option>J. Viales</option><option>J. Martínez</option><option>J. Montero</option><option>J. Arroyo</option><option>L. Espinoza</option><option>M. Sánchez</option><option>G. Peña</option><option>R. Rodríguez</option><option>R. Porras</option><option>R. Abarca</option></select></div>
                <div class="field"><label>Sucursal (V)</label><select id="n_sucursal" required><option value="">-- Seleccionar --</option><option>AL ESTE</option><option>AUTOMOTRIZ CURRIDABAT</option><option>AUTOMOTRIZ ESCAZU</option><option>AUTOMOTRIZ LA URUCA</option><option>AUTOMOTRIZ LIBERIA</option><option>AUTOMOTRIZ PEREZ ZELEDON</option><option>AUTOMOTRIZ SAN CARLOS</option><option>LEXUS</option><option>XPENG</option><option>PURDY CIUDAD TOYOTA</option><option>PURDY CURRIDABAT</option><option>OTROS NEGOCIOS</option></select></div>

                <div class="field"><label>Tipo Cliente (K)</label><select id="n_tipoCliente"><option value="">-- Seleccionar --</option><option>JURIDICO</option><option>INDEPENDIENTE</option><option>ASALARIADO</option></select></div>
                <div class="field"><label>Riesgo (AH)</label><select id="n_tipoRiesgo"><option value="SIN ALERTA">SIN ALERTA</option><option value="API">API</option><option value="PEP">PEP</option><option value="APFND">APFND</option></select></div>
                <div class="field"><label>Cliente–Garantía (E)</label><select id="n_clienteGarantia"><option value="">-- Seleccionar --</option><option>LISTA</option><option>SIN EMPEZAR</option></select></div>

            </div>

            <div class="section-title">2. Garantía y Financiero</div>
            <div class="financiero-highlight">
                <div class="grid">

                    <div class="field"><label>Monto Crédito (Z)</label><input type="number" id="n_valor" oninput="validarYCalcularPorcentaje()" placeholder="0.00"></div>
                    <div class="field">
                        <label>Depósito / Prima (AA)</label>

                            <input type="number" id="n_deposito" placeholder="0.00" oninput="validarYCalcularPorcentaje()" style="flex: 1;">
                            <span id="n_porcentaje_txt" style="font-weight: 700; color: var(--brand-red); background: white; padding: 10px; border-radius: 12px; border: 1px solid var(--border);">0%</span>

                    <div class="field"><label>Ingreso Depósito (AJ)</label><select id="n_ingresoDeposito" onchange="toggleCamposAmbas()"><option value="">-- Seleccionar --</option><option value="Entra por CAFSA">Entra por CAFSA</option><option value="Entra por Agencia">Entra por Agencia</option><option value="Entra por Ambas">Entra por Ambas</option></select></div>
                    <div id="contenedorAmbas" class="field span-full" style="display: none; background: #fff; padding: 20px; border-radius: 14px; border: 1px solid var(--border);">

                            <div class="field"><label>Monto en CAFSA (AN)</label><input type="number" id="n_montoCafsa" placeholder="0"></div>
                        </div>
                    </div>
                    <div class="field"><label>Unidades (AC)</label><input type="number" id="n_qUnidades" value="1"></div>
                    <div class="field"><label>Marca (AD)</label><input type="text" id="n_marca"></div>
                    <div class="field"><label>Modelo (AE)</label><input type="text" id="n_modelo"></div>
                    <div class="field"><label>Año (AF)</label><input type="number" id="n_anio" placeholder="2024"></div>
                    <div class="field"><label>Vendedor (AG)</label><input type="text" id="n_vendedor"></div>
                </div>
            </div>

            <div class="section-title">3. Estado de Operación</div>
            <div class="grid">
                <div class="field"><label>Estado Principal (B)</label><select id="n_estado" onchange="sincronizarCampos()" required><option value="">-- Seleccionar --</option><option>Aprobado</option><option>Desembolsado</option><option>Reservado</option><option>Rechazado</option><option>En aprobación</option><option>En Estudio de Riesgo</option></select></div>
                <div class="field"><label>Producto (F)</label><select id="n_producto"><option value="">-- Seleccionar --</option><option>AOFF</option><option>AOP</option><option>RENTING</option><option>USADOS</option><option>MOTOS</option><option>PRENDARIO</option></select></div>
                <div class="field"><label>Mes (L)</label><select id="n_mes"><option>ENERO</option><option>FEBRERO</option><option>MARZO</option><option>ABRIL</option><option>MAYO</option><option>JUNIO</option><option>JULIO</option><option>AGOSTO</option><option>SEPTIEMBRE</option><option>OCTUBRE</option><option>NOVIEMBRE</option><option>DICIEMBRE</option></select></div>
                <div class="field"><label>Estado Desembolso (P)</label><select id="n_estadoDesembolso"><option value="">-- Seleccionar --</option><option>AM LISTO</option><option>REVISIÓN WF 1</option><option>SIN SOLICITAR</option></select></div>

                <div class="field"><label>OC (S)</label><select id="n_oc"><option value="LISTA">LISTA</option><option value="EN TRÁMITE">EN TRÁMITE</option></select></div>
                <div class="field"><label>Fecha Entrega (C)</label><input type="date" id="n_fechaEntrega"></div>
                <div class="field"><label>Hora Entrega (D)</label><input type="time" id="n_horaEntrega"></div>
                <div class="field"><label>F. Desembolso (M)</label><input type="date" id="n_fechaDesembolso"></div>
                <div class="field"><label>OP (N)</label><input type="text" id="n_op"></div>
                <div class="field"><label>Solicitud (O)</label><input type="text" id="n_solicitud"></div>
                <div class="field"><label>Garantía Llamado (AP)</label><input type="number" id="n_garantia_llamado"></div>
                <div class="field"><label>PV Llamado (AQ)</label><input type="number" id="n_pv_llamado"></div>

            <div class="section-title">
                <input type="checkbox" id="toggleSeccion4" style="width: 18px; height: 18px; cursor: pointer; accent-color: var(--brand-red);">
                <label for="toggleSeccion4" style="cursor: pointer; font-size: 18px; color: var(--brand-dark);">4. Detalles Complementarios (AT)</label>
            </div>
            
            <div class="collapsible-content">
                <div class="grid">
                    <div class="field"><label>Monto Solicitud (AY)</label><input type="text" id="sec4_monto" placeholder="$ ó ¢"></div>
                    <div class="field"><label>Tipo Vehículo (AZ)</label><input type="text" id="sec4_vehiculo" placeholder="Marca, estilo, año, estado"></div>
                    <div class="field"><label>Porcentaje Prima (BA)</label><input type="text" id="sec4_prima" placeholder="10%, 20%..."></div>
                    <div class="field"><label>Nivel de Aprobación (BB)</label>

                    </div>
                    <div class="field"><label>Tipo de Operación (BC)</label>

                            <option>Línea</option>

                    </div>
                    <div class="field"><label>Gestión (BD)</label>
                        <select id="sec4_gestion">
                            <option value="">-- Seleccionar --</option>
                            <option>Incremento</option>

                            <option>Renovación</option>

                    <div class="field span-full"><label>Tasa Fija y Variable (BE)</label><textarea id="sec4_tasa" rows="2" placeholder="Detalle años de tasa fija y posterior tasa variable..."></textarea></div>

</main>

<div id="toast"></div>

<script>
// CONFIGURACIÓN MSAL Y EXCEL (Manteniendo tuClientId y Authority)
const msalConfig = {
    auth: {
        clientId: "330765a8-2c56-4eca-bce2-f418eb1cdaf0",
        authority: "https://login.microsoftonline.com/8fe4234f-a041-4848-a8c7-ebe2442403da",
        redirectUri: "https://mhernandez-cafsa.github.io/formulario-cafsa/"
    },
    cache: { cacheLocation: "sessionStorage" }
};

const EXCEL_CONFIG = {
    driveUrl: "/sites/financieracafsasa.sharepoint.com:/sites/RepositoriodeCasos:/drive",
    fileName: "Casos en trámite.xlsx",
    sheetName: "Casos"
};

let msalInstance, accessToken, currentUser, fileId, driveId, nextRow = 0;

// Sincronización de campos para la sección 4 en tiempo real
function sincronizarCampos() {
    document.getElementById("replica_AR").value = document.getElementById("n_referido_por").value;
    document.getElementById("replica_X").value = document.getElementById("n_cliente").value;
    document.getElementById("replica_W").value = document.getElementById("n_cedula").value;
}

async function init() {
    msalInstance = new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();
    try {
        const response = await msalInstance.handleRedirectPromise();
        if (response) {
            accessToken = response.accessToken;
            currentUser = response.account;
            onAuthenticated();
        } else {
            const accounts = msalInstance.getAllAccounts();
            if (accounts.length > 0) {
                const silent = await msalInstance.acquireTokenSilent({
                    scopes: ["Files.ReadWrite.All", "Sites.ReadWrite.All"],
                    account: accounts[0]
                });
                accessToken = silent.accessToken;
                currentUser = accounts[0];
                onAuthenticated();
            } else {
                document.getElementById("manual-login-btn").style.display = "block";
            }
        }
    } catch (e) {
        console.error(e);
        document.getElementById("manual-login-btn").style.display = "block";
    }
}

async function signIn() { await msalInstance.loginRedirect({ scopes: ["Files.ReadWrite.All", "Sites.ReadWrite.All"] }); }
async function signOut() { await msalInstance.logoutRedirect(); }

async function onAuthenticated() {
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("auth-label").innerText = currentUser.name;
    document.getElementById("status-bar").style.display = "flex";
    try {
        const driveRes = await graphCall(EXCEL_CONFIG.driveUrl);
        driveId = driveRes.id;
        const search = await graphCall(`/drives/${driveId}/root/search(q='${EXCEL_CONFIG.fileName}')`);
        const file = search.value.find(f => f.name === EXCEL_CONFIG.fileName);
        if (!file) throw new Error("No se encontró el archivo");
        fileId = file.id;
        const range = await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${EXCEL_CONFIG.sheetName}/usedRange`);
        nextRow = range.rowCount + 1;
        document.getElementById("status-text").innerText = "Sincronizado. Fila actual: " + nextRow;
    } catch (e) {
        showToast("Error de conexión con SharePoint", "error");
    }
}

async function graphCall(endpoint, method = "GET", body = null) {
    const headers = new Headers();
    headers.append("Authorization", `Bearer ${accessToken}`);
    headers.append("Content-Type", "application/json");
    const options = { method, headers };
    if (body) options.body = JSON.stringify(body);
    const response = await fetch(`https://graph.microsoft.com/v1.0${endpoint}`, options);
    if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error.message);
    }
    return response.json();
}

function toggleCamposAmbas() {
    const val = document.getElementById("n_ingresoDeposito").value;
    document.getElementById("contenedorAmbas").style.display = (val === "Entra por Ambas") ? "block" : "none";
}

function validarYCalcularPorcentaje() {
    const deposito = parseFloat(document.getElementById("n_deposito").value) || 0;
    const montoG = parseFloat(document.getElementById("n_montoArrendar").value) || 0;
    if (montoG > 0) {
        const porc = ((deposito / montoG) * 100).toFixed(1);
        document.getElementById("n_porcentaje_txt").innerText = porc + "%";
    }
}

async function guardarNuevo() {
    if (!accessToken || !fileId) {
        showToast("Error de sesión", "error");
        return;
    }
    const btn = document.getElementById("btnGuardar");
    const spinner = document.getElementById("btnSpinner");
    const btnText = document.getElementById("btnText");
    
    btn.disabled = true;
    spinner.style.display = "block";
    btnText.innerText = "Procesando...";

    try {
        const idUnico = "ID-" + new Date().getTime();
        const timestamp = new Date().toLocaleString();
        const moneda = document.getElementById("n_moneda").value;
        const valor = parseFloat(document.getElementById("n_valor").value) || 0;
        const conversion = (moneda === "COLONES") ? (valor / 525).toFixed(2) : valor; 
        const deposito = parseFloat(document.getElementById("n_deposito").value) || 0;
        const montoG = parseFloat(document.getElementById("n_montoArrendar").value) || 0;
        const porcentajeFormula = montoG > 0 ? (deposito / montoG) : 0;
        const referidoCheck = document.getElementById("esReferido").checked ? "SI" : "NO";
        const seccion4Marcada = document.getElementById("toggleSeccion4").checked ? "SI" : "NO";

        // Mapeo completo de A hasta BK
        const rowData = [[
            idUnico,                                            // A
            document.getElementById("n_estado").value,          // B
            document.getElementById("n_fechaEntrega").value,    // C
            document.getElementById("n_horaEntrega").value,     // D
            document.getElementById("n_clienteGarantia").value, // E
            document.getElementById("n_producto").value,        // F
            document.getElementById("n_siCancela").value,       // G
            document.getElementById("n_operacion").value,       // H
            "",                                                 // I
            document.getElementById("n_esWF").value,            // J
            document.getElementById("n_tipoCliente").value,     // K
            document.getElementById("n_mes").value,             // L
            document.getElementById("n_fechaDesembolso").value, // M
            document.getElementById("n_op").value,              // N
            document.getElementById("n_solicitud").value,       // O
            document.getElementById("n_estadoDesembolso").value,// P
            "",                                                 // Q
            document.getElementById("n_os").value,              // R
            document.getElementById("n_oc").value,              // S
            document.getElementById("n_empresa").value,         // T
            document.getElementById("n_ejecutivo").value,       // U
            document.getElementById("n_sucursal").value,        // V
            document.getElementById("n_cedula").value,          // W
            document.getElementById("n_cliente").value,         // X
            moneda,                                             // Y
            valor,                                              // Z
            deposito,                                           // AA
            montoG,                                             // AB
            document.getElementById("n_qUnidades").value,       // AC
            document.getElementById("n_marca").value,           // AD
            document.getElementById("n_modelo").value,          // AE
            document.getElementById("n_anio").value,            // AF
            document.getElementById("n_vendedor").value,        // AG
            document.getElementById("n_tipoRiesgo").value,      // AH
            "ACTIVO",                                           // AI
            document.getElementById("n_ingresoDeposito").value, // AJ
            "",                                                 // AK
            "",                                                 // AL
            document.getElementById("n_montoAgencia").value,    // AM
            document.getElementById("n_montoCafsa").value,      // AN
            "",                                                 // AO
            document.getElementById("n_garantia_llamado").value,// AP
            document.getElementById("n_pv_llamado").value,      // AQ
            document.getElementById("n_referido_por").value,    // AR
            referidoCheck,                                      // AS
            seccion4Marcada,                                    // AT (Check desplegar)
            timestamp,                                          // AU (Marca temporal)
            document.getElementById("n_referido_por").value,    // AV (Replica AR)
            document.getElementById("n_cliente").value,         // AW (Replica X)
            document.getElementById("n_cedula").value,          // AX (Replica W)
            document.getElementById("sec4_monto").value,        // AY
            document.getElementById("sec4_vehiculo").value,     // AZ
            document.getElementById("sec4_prima").value,        // BA
            document.getElementById("sec4_nivel").value,        // BB
            document.getElementById("sec4_operacion").value,    // BC
            document.getElementById("sec4_gestion").value,      // BD
            document.getElementById("sec4_tasa").value,         // BE
            document.getElementById("sec4_plazo").value,        // BF
            document.getElementById("sec4_contacto").value,     // BG
            document.getElementById("sec4_exposicion").value,   // BH
            document.getElementById("sec4_comentarios").value,  // BI
            document.getElementById("sec4_zip").value,          // BJ
            document.getElementById("sec4_origen").value        // BK
        ]];

        const address = `${EXCEL_CONFIG.sheetName}!A${nextRow}:BK${nextRow}`;
        await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${EXCEL_CONFIG.sheetName}/range(address='${address}')`, "PATCH", {
            values: rowData
        });

        showToast("✓ Registro Financiero Exitoso", "success");
        document.getElementById("formNuevo").reset();
        document.getElementById("n_porcentaje_txt").innerText = "0%";
        nextRow++;
        document.getElementById("status-text").innerText = "Conectado. Fila: " + nextRow;
    } catch (e) {
        showToast("Error: " + e.message, "error");
    } finally {
        btn.disabled = false;
        spinner.style.display = "none";
        btnText.innerText = "Finalizar y Guardar";
    }
}

function showToast(msg, type) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.className = type;
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 5000);
}
document.addEventListener("DOMContentLoaded", init);
</script>
