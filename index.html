<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Casos — CAFSA</title>
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap');
        
        :root {
            --brand-red: #E24B4A;
            --brand-dark: #2D2D2D;
            --brand-gray: #5F5E5A;
            --brand-light: #F4F4F4;
            --accent: #1D9E75;
            --text-primary: #1a1a1a;
            --border: #E0E0E0;
            --surface: #ffffff;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Syne', sans-serif; background: #ECECEC; color: var(--text-primary); }
        
        header { 
            background: var(--brand-dark); 
            padding: 0 2rem; 
            height: 70px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            color: white; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            border-bottom: 4px solid var(--brand-red);
        }
        .logo-badge { 
            background: var(--brand-red); 
            padding: 6px 12px; 
            border-radius: 8px; 
            font-family: 'DM Mono'; 
            font-weight: bold;
            margin-right: 12px; 
        }
        #auth-btn { 
            background: transparent; 
            border: 2px solid rgba(255,255,255,0.2); 
            color: white; 
            padding: 8px 18px; 
            border-radius: var(--radius); 
            cursor: pointer; 
            transition: 0.3s;
            font-weight: 600;
        }
        #auth-btn:hover { background: rgba(255,255,255,0.1); border-color: white; }
        
        #status-bar { 
            background: white; 
            padding: 10px 2rem; 
            font-size: 13px; 
            color: var(--brand-gray); 
            border-bottom: 1px solid var(--border); 
            display: none; 
            align-items: center; 
            gap: 10px; 
            font-weight: 500;
        }
        
        main { padding: 2.5rem 1rem; max-width: 1200px; margin: 0 auto; }
        
        .form-card { 
            background: var(--surface); 
            border-radius: 20px; 
            padding: 2.5rem; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }

        .section-title { 
            color: var(--brand-dark); 
            padding: 0 0 10px 0;
            border-bottom: 2px solid var(--brand-light);
            margin: 30px 0 20px 0; 
            font-size: 16px; 
            font-weight: 700;
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--brand-red);
            display: inline-block;
            border-radius: 2px;
        }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        .field.span-full { grid-column: 1 / -1; }
        
        label { font-size: 12px; font-weight: 600; color: var(--brand-gray); letter-spacing: 0.2px; }
        
        input, select, textarea { 
            padding: 12px 15px; 
            border: 2px solid var(--brand-light); 
            border-radius: var(--radius); 
            font-family: inherit; 
            font-size: 14px; 
            background: var(--brand-light); 
            outline: none; 
            transition: all 0.3s ease;
        }
        input:focus, select:focus { 
            border-color: var(--brand-red); 
            background: white;
            box-shadow: 0 0 0 4px rgba(226, 75, 74, 0.1);
        }
        
        .referido-box {
            display: flex; align-items: center; gap: 15px; 
            padding: 15px; border: 2px dashed var(--border); 
            border-radius: var(--radius); background: #fdfdfd;
        }

        .financiero-highlight {
            background: #FAFAFA;
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: var(--radius);
            margin-top: 10px;
        }
        
        .actions { margin-top: 40px; display: flex; justify-content: flex-end; }
        
        .btn-save { 
            background: var(--brand-red); 
            color: white; 
            border: none; 
            padding: 15px 50px; 
            border-radius: 50px; 
            font-weight: 700; 
            font-size: 16px;
            cursor: pointer; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; 
            align-items: center; 
            gap: 12px;
            box-shadow: 0 6px 20px rgba(226, 75, 74, 0.3);
        }
        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(226, 75, 74, 0.4); }
        .btn-save:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        
        #toast { position: fixed; bottom: 30px; right: 30px; padding: 18px 30px; border-radius: var(--radius); color: white; display: none; z-index: 1000; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .success { background: var(--accent); }
        .error { background: var(--brand-red); }

        #login-overlay { position: fixed; inset: 0; background: var(--brand-dark); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .login-card { background:#fff; border-radius: 25px; padding: 3rem; max-width: 400px; width: 90%; text-align: center; border-bottom: 6px solid var(--brand-red); }
        
        .spinner { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <div style="font-size: 40px; margin-bottom: 20px;">🛡️</div>
        <h2 style="margin-bottom: 10px; color: var(--brand-dark);">Acceso Restringido</h2>
        <p style="margin-bottom: 25px; color: var(--brand-gray); font-size: 15px;">Inicie sesión con su cuenta corporativa CAFSA.</p>
        <button id="manual-login-btn" onclick="signIn()" style="display:none; width:100%; padding:15px; background:var(--brand-red); color:#fff; border:none; border-radius:50px; cursor:pointer; font-weight: 700;">Iniciar Sesión con Microsoft</button>
    </div>
</div>

<header>
    <div class="header-brand"><span class="logo-badge">CAFSA</span><strong>Repositorio de Casos</strong></div>
    <button id="auth-btn" onclick="signOut()"><span id="auth-label">Conectando...</span></button>
</header>

<div id="status-bar">
    <div style="width: 10px; height: 10px; background: var(--accent); border-radius: 50%;"></div>
    <span id="status-text">Iniciando sistema...</span>
</div>

<main>
    <div class="form-card">
        <form id="formNuevo">
            <div class="section-title">1. Cliente y Operación</div>
            <div class="grid">
                <div class="field span-full">
                    <label>¿ES REFERIDO? (AS)</label>
                    <div class="referido-box">
                        <input type="checkbox" id="esReferido" style="width: 22px; height: 22px; cursor: pointer; accent-color: var(--brand-red);">
                        <span style="font-weight: 500; color: var(--brand-dark);">Marcar si el cliente es una referencia</span>
                    </div>
                </div>
                <div class="field"><label>Empresa (T)</label><select id="n_empresa" required><option value="">-- Seleccionar --</option><option>ARRENDADORA</option><option>FINANCIERA</option></select></div>
                <div class="field"><label>Ejecutivo (U)</label><select id="n_ejecutivo" required><option value="">-- Seleccionar --</option><option>K. Rodríguez</option><option>A. Mora</option><option>A. Valverde</option><option>B. Castro</option><option>C. Molina</option><option>C. Jiménez</option><option>D. Alvarado</option><option>D. Espinoza</option><option>D. Mora</option><option>D. Villar</option><option>D. Piña</option><option>D. Valerin</option><option>F. Badilla</option><option>F. Meza</option><option>F. Palma</option><option>I. Ureña</option><option>J. González</option><option>J. Viales</option><option>J. Martínez</option><option>J. Montero</option><option>J. Arroyo</option><option>L. Espinoza</option><option>M. Sánchez</option><option>G. Peña</option><option>R. Rodríguez</option><option>R. Porras</option><option>R. Abarca</option></select></div>
                <div class="field"><label>Sucursal (V)</label><select id="n_sucursal" required><option value="">-- Seleccionar --</option><option>AL ESTE</option><option>AUTOMOTRIZ CURRIDABAT</option><option>AUTOMOTRIZ ESCAZU</option><option>AUTOMOTRIZ LA URUCA</option><option>AUTOMOTRIZ LIBERIA</option><option>AUTOMOTRIZ PEREZ ZELEDON</option><option>AUTOMOTRIZ SAN CARLOS</option><option>LEXUS</option><option>XPENG</option><option>PURDY CIUDAD TOYOTA</option><option>PURDY CURRIDABAT</option><option>OTROS NEGOCIOS</option></select></div>
                <div class="field"><label>Cédula (W)</label><input type="text" id="n_cedula" placeholder="0-0000-0000"></div>
                <div class="field"><label>Cliente (X)</label><input type="text" id="n_cliente" required></div>
                <div class="field"><label>Tipo Cliente (K)</label><select id="n_tipoCliente"><option value="">-- Seleccionar --</option><option>JURIDICO</option><option>INDEPENDIENTE</option><option>ASALARIADO</option></select></div>
                <div class="field"><label>Riesgo (AH)</label><select id="n_tipoRiesgo"><option value="SIN ALERTA">SIN ALERTA</option><option value="API">API</option><option value="PEP">PEP</option><option value="APFND">APFND</option></select></div>
                <div class="field"><label>Cliente–Garantía (E)</label><select id="n_clienteGarantia"><option value="">-- Seleccionar --</option><option>LISTA</option><option>SIN EMPEZAR</option></select></div>
                <div class="field"><label>¿Se Cancela? (G)</label><select id="n_siCancela"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div class="field"><label>¿Es de WF? (J)</label><select id="n_esWF"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div class="field"><label># OP Cancelada (H)</label><input type="text" id="n_operacion"></div>
            </div>

            <div class="section-title">2. Garantía y Financiero</div>
            <div class="financiero-highlight">
                <div class="grid">
                    <div class="field"><label>Moneda (Y)</label><select id="n_moneda"><option value="COLONES">COLONES</option><option value="DOLARES">DOLARES</option></select></div>
                    <div class="field"><label>Monto Crédito (Z)</label><input type="number" id="n_valor" oninput="validarYCalcularPorcentaje()"></div>
                    <div class="field">
                        <label>Depósito / Prima (AA)</label>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="number" id="n_deposito" oninput="validarYCalcularPorcentaje()" style="flex: 1;">
                            <span id="n_porcentaje_txt" style="font-weight: 800; color: var(--brand-red); background: #fff; padding: 10px; border-radius: 8px; border: 1px solid var(--border);">0%</span>
                        </div>
                    </div>
                    <div class="field"><label>Monto Garantía (AB)</label><input type="number" id="n_montoArrendar" oninput="validarYCalcularPorcentaje()"></div>
                    <div class="field"><label>Ingreso Depósito (AJ)</label><select id="n_ingresoDeposito" onchange="toggleCamposAmbas()"><option value="">-- Seleccionar --</option><option value="Entra por CAFSA">Entra por CAFSA</option><option value="Entra por Agencia">Entra por Agencia</option><option value="Entra por Ambas">Entra por Ambas</option></select></div>
                    
                    <div id="contenedorAmbas" class="field span-full" style="display: none; background: #fff; padding: 20px; border-radius: 12px; border: 1px solid var(--border);">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="field"><label>Monto en Agencia (AM)</label><input type="number" id="n_montoAgencia"></div>
                            <div class="field"><label>Monto en CAFSA (AN)</label><input type="number" id="n_montoCafsa"></div>
                        </div>
                    </div>

                    <div class="field"><label>Unidades (AC)</label><input type="number" id="n_qUnidades" value="1"></div>
                    <div class="field"><label>Marca (AD)</label><input type="text" id="n_marca"></div>
                    <div class="field"><label>Modelo (AE)</label><input type="text" id="n_modelo"></div>
                    <div class="field"><label>Año (AF)</label><input type="number" id="n_anio"></div>
                    <div class="field"><label>Vendedor (AG)</label><input type="text" id="n_vendedor"></div>
                </div>
            </div>

            <div class="section-title">3. Estado de Operación</div>
            <div class="grid">
                <div class="field"><label>Estado Principal (B)</label><select id="n_estado" required><option value="">-- Seleccionar --</option><option>Aprobado</option><option>Desembolsado</option><option>Reservado</option><option>Rechazado</option><option>En aprobación</option><option>En Estudio de Riesgo</option></select></div>
                <div class="field"><label>Producto (F)</label><select id="n_producto"><option value="">-- Seleccionar --</option><option>AOFF</option><option>AOP</option><option>RENTING</option><option>USADOS</option><option>MOTOS</option><option>PRENDARIO</option></select></div>
                <div class="field"><label>Mes (L)</label><select id="n_mes"><option>ENERO</option><option>FEBRERO</option><option>MARZO</option><option>ABRIL</option><option>MAYO</option><option>JUNIO</option><option>JULIO</option><option>AGOSTO</option><option>SEPTIEMBRE</option><option>OCTUBRE</option><option>NOVIEMBRE</option><option>DICIEMBRE</option></select></div>
                <div class="field"><label>Estado Desembolso (P)</label><select id="n_estadoDesembolso"><option value="">-- Seleccionar --</option><option>AM LISTO</option><option>REVISIÓN WF 1</option><option>SIN SOLICITAR</option></select></div>
                <div class="field"><label>OS (R)</label><select id="n_os"><option value="LISTA">LISTA</option><option value="EN TRÁMITE">EN TRÁMITE</option></select></div>
                <div class="field"><label>OC (S)</label><select id="n_oc"><option value="LISTA">LISTA</option><option value="EN TRÁMITE">EN TRÁMITE</option></select></div>
                <div class="field"><label>Fecha Entrega (C)</label><input type="date" id="n_fechaEntrega"></div>
                <div class="field"><label>Hora Entrega (D)</label><input type="time" id="n_horaEntrega"></div>
                <div class="field"><label>F. Desembolso (M)</label><input type="date" id="n_fechaDesembolso"></div>
                <div class="field"><label>OP (N)</label><input type="text" id="n_op"></div>
                <div class="field"><label>Solicitud (O)</label><input type="text" id="n_solicitud"></div>
                <div class="field"><label>Garantía Llamado (AP)</label><input type="number" id="n_garantia_llamado"></div>
                <div class="field"><label>PV Llamado (AQ)</label><input type="number" id="n_pv_llamado"></div>
            </div>

            <div class="section-title">4. Datos de Formalización</div>
            <div class="grid">
                <div class="field"><label>Notario (I)</label><input type="text" id="n_notario" placeholder="Nombre del notario"></div>
                <div class="field"><label>Trámite (Q)</label><select id="n_tramite"><option value="">-- Seleccionar --</option><option>FÍSICO</option><option>DIGITAL</option></select></div>
                <div class="field"><label>Comentarios (AK)</label><textarea id="n_comentarios" rows="2"></textarea></div>
                <div class="field"><label>Check List (AL)</label><select id="n_checklist"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            </div>

            <div class="actions">
                <button type="button" id="btnGuardar" class="btn-save" onclick="guardarNuevo()">
                    <div class="spinner" id="btnSpinner"></div>
                    <span id="btnText">Guardar Registro</span>
                </button>
            </div>
        </form>
    </div>
</main>

<div id="toast"></div>

<script>
const msalConfig = {
    auth: {
        clientId: "330765a8-2c56-4eca-bce2-f418eb1cdaf0",
        authority: "https://login.microsoftonline.com/8fe4234f-a041-4848-a8c7-ebe2442403da",
        redirectUri: "https://mhernandez-cafsa.github.io/formulario-cafsa/"
    },
    cache: { cacheLocation: "sessionStorage" }
};

const EXCEL_CONFIG = {
    driveUrl: "/sites/financieracafsasa.sharepoint.com:/sites/RepositoriodeCasos:/drive",
    fileName: "Casos en trámite.xlsx",
    sheetName: "Casos"
};

let msalInstance, accessToken, currentUser, fileId, driveId, nextRow = 0;

async function init() {
    msalInstance = new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();
    try {
        const response = await msalInstance.handleRedirectPromise();
        if (response) {
            accessToken = response.accessToken;
            currentUser = response.account;
            onAuthenticated();
        } else {
            const accounts = msalInstance.getAllAccounts();
            if (accounts.length > 0) {
                const silent = await msalInstance.acquireTokenSilent({
                    scopes: ["Files.ReadWrite.All", "Sites.ReadWrite.All"],
                    account: accounts[0]
                });
                accessToken = silent.accessToken;
                currentUser = accounts[0];
                onAuthenticated();
            } else {
                document.getElementById("manual-login-btn").style.display = "block";
            }
        }
    } catch (e) {
        console.error(e);
        document.getElementById("manual-login-btn").style.display = "block";
    }
}

async function signIn() { await msalInstance.loginRedirect({ scopes: ["Files.ReadWrite.All", "Sites.ReadWrite.All"] }); }
async function signOut() { await msalInstance.logoutRedirect(); }

async function onAuthenticated() {
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("auth-label").innerText = currentUser.name;
    document.getElementById("status-bar").style.display = "flex";
    
    try {
        const driveRes = await graphCall(EXCEL_CONFIG.driveUrl);
        driveId = driveRes.id;
        const search = await graphCall(`/drives/${driveId}/root/search(q='${EXCEL_CONFIG.fileName}')`);
        const file = search.value.find(f => f.name === EXCEL_CONFIG.fileName);
        if (!file) throw new Error("No se encontró el archivo");
        fileId = file.id;
        const range = await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${EXCEL_CONFIG.sheetName}/usedRange`);
        nextRow = range.rowCount + 1;
        document.getElementById("status-text").innerText = "Conectado. Próxima fila: " + nextRow;
    } catch (e) {
        showToast("Error de conexión con SharePoint", "error");
    }
}

async function graphCall(endpoint, method = "GET", body = null) {
    const headers = new Headers();
    headers.append("Authorization", `Bearer ${accessToken}`);
    headers.append("Content-Type", "application/json");
    const options = { method, headers };
    if (body) options.body = JSON.stringify(body);
    const response = await fetch(`https://graph.microsoft.com/v1.0${endpoint}`, options);
    if (!response.ok) throw new Error("Error en Graph API");
    return response.json();
}

function toggleCamposAmbas() {
    const val = document.getElementById("n_ingresoDeposito").value;
    document.getElementById("contenedorAmbas").style.display = (val === "Entra por Ambas") ? "block" : "none";
}

function validarYCalcularPorcentaje() {
    const deposito = parseFloat(document.getElementById("n_deposito").value) || 0;
    const montoG = parseFloat(document.getElementById("n_montoArrendar").value) || 0;
    if (montoG > 0) {
        const porc = ((deposito / montoG) * 100).toFixed(1);
        document.getElementById("n_porcentaje_txt").innerText = porc + "%";
    }
}

async function guardarNuevo() {
    if (!accessToken || !fileId) return;
    const btn = document.getElementById("btnGuardar");
    btn.disabled = true;
    document.getElementById("btnSpinner").style.display = "block";
    document.getElementById("btnText").innerText = "Guardando...";

    try {
        const idUnico = "ID-" + new Date().getTime();
        const moneda = document.getElementById("n_moneda").value;
        const valor = parseFloat(document.getElementById("n_valor").value) || 0;
        const conversion = (moneda === "COLONES") ? (valor / 525).toFixed(2) : valor; 
        const deposito = parseFloat(document.getElementById("n_deposito").value) || 0;
        const montoG = parseFloat(document.getElementById("n_montoArrendar").value) || 0;
        const porcentajeFormula = montoG > 0 ? (deposito / montoG) : 0;
        const referido = document.getElementById("esReferido").checked ? "SI" : "NO";

        // EL SECRETO ESTÁ EN EL ORDEN DE ESTE ARRAY (45 columnas A-AS)
        const rowData = [[
            idUnico,                                           // A
            document.getElementById("n_estado").value,         // B
            document.getElementById("n_fechaEntrega").value,   // C
            document.getElementById("n_horaEntrega").value,    // D
            document.getElementById("n_clienteGarantia").value,// E
            document.getElementById("n_producto").value,       // F
            document.getElementById("n_siCancela").value,      // G
            document.getElementById("n_operacion").value,      // H
            document.getElementById("n_notario").value,        // I (NUEVO)
            document.getElementById("n_esWF").value,           // J
            document.getElementById("n_tipoCliente").value,    // K
            document.getElementById("n_mes").value,            // L
            document.getElementById("n_fechaDesembolso").value,// M
            document.getElementById("n_op").value,             // N
            document.getElementById("n_solicitud").value,      // O
            document.getElementById("n_estadoDesembolso").value,// P
            document.getElementById("n_tramite").value,        // Q (NUEVO)
            document.getElementById("n_os").value,             // R
            document.getElementById("n_oc").value,             // S
            document.getElementById("n_empresa").value,        // T
            document.getElementById("n_ejecutivo").value,      // U
            document.getElementById("n_sucursal").value,       // V
            document.getElementById("n_cedula").value,         // W
            document.getElementById("n_cliente").value,        // X
            moneda,                                            // Y
            valor,                                             // Z
            deposito,                                          // AA
            montoG,                                            // AB
            document.getElementById("n_qUnidades").value,      // AC
            document.getElementById("n_marca").value,          // AD
            document.getElementById("n_modelo").value,         // AE
            document.getElementById("n_anio").value,           // AF
            document.getElementById("n_vendedor").value,       // AG
            document.getElementById("n_tipoRiesgo").value,     // AH
            "ACTIVO",                                          // AI (Estado Interno)
            document.getElementById("n_ingresoDeposito").value,// AJ
            document.getElementById("n_comentarios").value,    // AK (NUEVO)
            document.getElementById("n_checklist").value,      // AL (NUEVO)
            document.getElementById("n_montoAgencia").value || 0, // AM
            document.getElementById("n_montoCafsa").value || 0,   // AN
            porcentajeFormula,                                 // AO
            document.getElementById("n_garantia_llamado").value || 0, // AP
            document.getElementById("n_pv_llamado").value || 0,       // AQ
            currentUser.name,                                  // AR
            referido                                           // AS
        ]];

        const address = `${EXCEL_CONFIG.sheetName}!A${nextRow}:AS${nextRow}`;
        await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${EXCEL_CONFIG.sheetName}/range(address='${address}')`, "PATCH", {
            values: rowData
        });
        
        showToast("✓ Registro guardado correctamente", "success");
        document.getElementById("formNuevo").reset();
        document.getElementById("n_porcentaje_txt").innerText = "0%";
        nextRow++;
        document.getElementById("status-text").innerText = "Conectado. Próxima fila: " + nextRow;
    } catch (e) {
        showToast("Error al guardar: " + e.message, "error");
    } finally {
        btn.disabled = false;
        document.getElementById("btnSpinner").style.display = "none";
        document.getElementById("btnText").innerText = "Guardar Registro";
    }
}

function showToast(msg, type) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.className = type;
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 4000);
}
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
