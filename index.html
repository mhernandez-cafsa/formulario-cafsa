<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Casos — CAFSA</title>
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-red: #E24B4A;
            --brand-dark: #1A1C1E; /* Gris oscuro profundo tech */
            --brand-gray: #64748B;
            --brand-light: #F8FAFC;
            --accent: #10B981;
            --text-primary: #1E293B;
            --border: #E2E8F0;
            --surface: #ffffff;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #F1F5F9; 
            color: var(--text-primary); 
            line-height: 1.5;
        }
        
        header { 
            background: var(--brand-dark); 
            padding: 0 2rem; 
            height: 65px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            color: white; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            border-bottom: 3px solid var(--brand-red);
        }

        .logo-badge { 
            background: var(--brand-red); 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-weight: 800;
            margin-right: 10px; 
            font-size: 14px;
        }

        #auth-btn { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.2); 
            color: white; 
            padding: 6px 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 13px;
            font-weight: 500;
        }

        #status-bar { 
            background: #fff; 
            padding: 8px 2rem; 
            font-size: 12px; 
            color: var(--brand-gray); 
            border-bottom: 1px solid var(--border); 
            display: none; 
            align-items: center; 
            gap: 8px; 
        }
        
        main { padding: 2rem 1rem; max-width: 1100px; margin: 0 auto; }
        
        .form-card { 
            background: var(--surface); 
            border-radius: 16px; 
            padding: 2rem; 
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .section-title { 
            color: var(--brand-dark); 
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            margin: 25px 0 15px 0; 
            font-size: 14px; 
            font-weight: 700;
            text-transform: uppercase; 
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: '';
            width: 3px; height: 15px;
            background: var(--brand-red);
            border-radius: 2px;
        }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field.span-full { grid-column: 1 / -1; }
        
        label { font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; }
        
        input, select, textarea { 
            padding: 10px 14px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            font-family: inherit; 
            font-size: 14px; 
            background: #FBFCFD; 
            color: var(--text-primary);
            outline: none; 
            transition: all 0.2s;
        }
        input:focus, select:focus { 
            border-color: var(--brand-red); 
            background: white;
            box-shadow: 0 0 0 3px rgba(226, 75, 74, 0.1);
        }

        /* Sección Especial 4 */
        .seccion-detalles {
            background: #F8FAFC;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
            display: none;
        }
        
        .toggle-container {
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .toggle-container:hover { background: #e2e8f0; }

        .btn-save { 
            background: var(--brand-dark); 
            color: white; 
            border: none; 
            padding: 14px 40px; 
            border-radius: 10px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s;
            margin-left: auto;
            display: flex; align-items: center; gap: 10px;
        }
        .btn-save:hover { background: #000; transform: translateY(-1px); }

        #toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 10px; color: white; display: none; z-index: 1000; font-size: 14px; }
        .success { background: var(--accent); }
        .error { background: var(--brand-red); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card" style="position:fixed; inset:0; background:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200;">
        <h2 style="margin-bottom:20px;">CAFSA | Autenticación</h2>
        <button id="manual-login-btn" onclick="signIn()" style="padding:15px 30px; background:var(--brand-red); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">Iniciar Sesión Corporativa</button>
    </div>
</div>

<header>
    <div class="header-brand"><span class="logo-badge">CAFSA</span><span style="font-weight:300; letter-spacing:1px;">REPOSITORIO DIGITAL</span></div>
    <button id="auth-btn" onclick="signOut()"><span id="auth-label">...</span></button>
</header>

<div id="status-bar">
    <div style="width: 8px; height: 8px; background: var(--accent); border-radius: 50%;"></div>
    <span id="status-text">Cargando...</span>
</div>

<main>
    <div class="form-card">
        <form id="formNuevo">
            <div class="section-title">1. Cliente y Operación</div>
            <div class="grid">
                <div class="field span-full">

                <div class="field"><label>Empresa (T)</label>

                </div>
                <div class="field"><label>Ejecutivo (U)</label>
                    <select id="n_ejecutivo" required><option value="">-- Seleccionar --</option><option>K. Rodríguez</option><option>A. Mora</option><option>A. Valverde</option><option>B. Castro</option><option>C. Molina</option><option>C. Jiménez</option><option>D. Alvarado</option><option>D. Espinoza</option><option>D. Mora</option><option>D. Villar</option><option>D. Piña</option><option>D. Valerin</option><option>F. Badilla</option><option>F. Meza</option><option>F. Palma</option><option>I. Ureña</option><option>J. González</option><option>J. Viales</option><option>J. Martínez</option><option>J. Montero</option><option>J. Arroyo</option><option>L. Espinoza</option><option>M. Sánchez</option><option>G. Peña</option><option>R. Rodríguez</option><option>R. Porras</option><option>R. Abarca</option></select>
                </div>
                <div class="field"><label>Sucursal (V)</label>
                    <select id="n_sucursal" required><option value="">-- Seleccionar --</option><option>AL ESTE</option><option>AUTOMOTRIZ CURRIDABAT</option><option>AUTOMOTRIZ ESCAZU</option><option>AUTOMOTRIZ LA URUCA</option><option>AUTOMOTRIZ LIBERIA</option><option>AUTOMOTRIZ PEREZ ZELEDON</option><option>AUTOMOTRIZ SAN CARLOS</option><option>LEXUS</option><option>XPENG</option><option>PURDY CIUDAD TOYOTA</option><option>PURDY CURRIDABAT</option><option>OTROS NEGOCIOS</option></select>
                </div>
                <div class="field"><label>Cédula (W)</label><input type="text" id="n_cedula" placeholder="0-0000-0000"></div>
                <div class="field"><label>Cliente (X)</label><input type="text" id="n_cliente" required></div>
                <div class="field"><label>Tipo Cliente (K)</label>
                    <select id="n_tipoCliente"><option value="">-- Seleccionar --</option><option>JURIDICO</option><option>INDEPENDIENTE</option><option>ASALARIADO</option></select>
                </div>
                <div class="field"><label>Riesgo (AH)</label>
                    <select id="n_tipoRiesgo"><option value="SIN ALERTA">SIN ALERTA</option><option value="API">API</option><option value="PEP">PEP</option><option value="APFND">APFND</option></select>
                </div>
                <div class="field"><label>Cliente–Garantía (E)</label>
                    <select id="n_clienteGarantia"><option value="">-- Seleccionar --</option><option>LISTA</option><option>SIN EMPEZAR</option></select>
                </div>
                <div class="field"><label>¿Se Cancela? (G)</label>
                    <select id="n_siCancela"><option value="NO">NO</option><option value="SI">SI</option></select>
                </div>
                <div class="field"><label>¿Es de WF? (J)</label>
                    <select id="n_esWF"><option value="NO">NO</option><option value="SI">SI</option></select>
                </div>
                <div class="field"><label># OP Cancelada (H)</label><input type="text" id="n_operacion"></div>

            <div class="section-title">2. Garantía y Financiero</div>
            <div class="grid">
                <div class="field"><label>Moneda (Y)</label>

                </div>
                <div class="field"><label>Monto Crédito (Z)</label><input type="number" id="n_valor" oninput="validarYCalcularPorcentaje()"></div>
                <div class="field">
                    <label>Depósito / Prima (AA)</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="number" id="n_deposito" oninput="validarYCalcularPorcentaje()" style="flex:1">
                        <span id="n_porcentaje_txt" style="background:var(--brand-dark); color:white; padding:10px; border-radius:8px; font-weight:bold; font-size:12px">0%</span>
                    </div>
                </div>
                <div class="field"><label>Monto Garantía (AB)</label><input type="number" id="n_montoArrendar" oninput="validarYCalcularPorcentaje()"></div>
                <div class="field"><label>Ingreso Depósito (AJ)</label>
                    <select id="n_ingresoDeposito" onchange="toggleCamposAmbas()">
                        <option value="">-- Seleccionar --</option>
                        <option value="Entra por CAFSA">Entra por CAFSA</option>
                        <option value="Entra por Agencia">Entra por Agencia</option>
                        <option value="Entra por Ambas">Entra por Ambas</option>
                    </select>
                </div>
                <div id="contenedorAmbas" class="field span-full" style="display:none; background:#f8fafc; padding:15px; border-radius:10px; border:1px solid var(--border)">
                    <div class="grid">
                        <div class="field"><label>Monto en Agencia (AM)</label><input type="number" id="n_montoAgencia"></div>
                        <div class="field"><label>Monto en CAFSA (AN)</label><input type="number" id="n_montoCafsa"></div>
                    </div>
                </div>
                <div class="field"><label>Unidades (AC)</label><input type="number" id="n_qUnidades" value="1"></div>
                <div class="field"><label>Marca (AD)</label><input type="text" id="n_marca"></div>
                <div class="field"><label>Modelo (AE)</label><input type="text" id="n_modelo"></div>
                <div class="field"><label>Año (AF)</label><input type="number" id="n_anio"></div>
                <div class="field"><label>Vendedor (AG)</label><input type="text" id="n_vendedor"></div>
            </div>

            <div class="section-title">3. Estado de Operación</div>
            <div class="grid">
                <div class="field"><label>Estado Principal (B)</label>
                    <select id="n_estado" required><option value="">-- Seleccionar --</option><option>Aprobado</option><option>Desembolsado</option><option>Reservado</option><option>Rechazado</option><option>En aprobación</option><option>En Estudio de Riesgo</option></select>
                </div>
                <div class="field"><label>Producto (F)</label>
                    <select id="n_producto"><option value="">-- Seleccionar --</option><option>AOFF</option><option>AOP</option><option>RENTING</option><option>USADOS</option><option>MOTOS</option><option>PRENDARIO</option></select>
                </div>
                <div class="field"><label>Mes (L)</label>
                    <select id="n_mes"><option>ENERO</option><option>FEBRERO</option><option>MARZO</option><option>ABRIL</option><option>MAYO</option><option>JUNIO</option><option>JULIO</option><option>AGOSTO</option><option>SEPTIEMBRE</option><option>OCTUBRE</option><option>NOVIEMBRE</option><option>DICIEMBRE</option></select>
                </div>
                <div class="field"><label>Fecha Entrega (C)</label><input type="date" id="n_fechaEntrega"></div>
                <div class="field"><label>OP (N)</label><input type="text" id="n_op"></div>
                <div class="field"><label>Garantía Llamado (AP)</label><input type="number" id="n_garantia_llamado"></div>
                <div class="field"><label>PV Llamado (AQ)</label><input type="number" id="n_pv_llamado"></div>
                <div class="field"><label>Comentarios Generales (AR)</label><input type="text" id="n_comentarios_gen"></div>
            </div>

            <div class="section-title">4. Detalles de Crédito y Aprobación</div>
            
            <label class="toggle-container">
                <input type="checkbox" id="checkSeccion4" onchange="document.getElementById('seccionDetalle4').style.display = this.checked ? 'block' : 'none'" style="margin-right:10px; width:18px; height:18px;">
                <span>Desplegar campos de análisis detallado (AT)</span>
            </label>

            <div id="seccionDetalle4" class="seccion-detalles">
                <div class="grid">
                    <div class="field"><label>Monto Solicitud (AY)</label><input type="text" id="det_monto" placeholder="¢ o $"></div>
                    <div class="field"><label>Tipo Vehículo (AZ)</label><input type="text" id="det_vehiculo" placeholder="Marca, Estilo, Año, Nuevo/Usado"></div>
                    <div class="field"><label>% Prima (BA)</label><input type="text" id="det_prima" placeholder="10%"></div>
                    <div class="field"><label>Nivel Aprobación (BA2)</label>
                        <select id="det_aprobacion">
                            <option value="">-- Seleccionar --</option>
                            <option>Comité de Crédito</option>
                            <option>Comité Ejecutivo</option>
                            <option>Gerencia General</option>
                            <option>Gerencia de Crédito</option>
                        </select>
                    </div>
                    <div class="field"><label>Tipo Operación (BB)</label>
                        <select id="det_operacion">
                            <option value="">-- Seleccionar --</option>
                            <option>Arrendamiento</option>
                            <option>Financiamiento</option>
                            <option>Línea</option>
                            <option>Tarjeta</option>
                            <option>Marchamo</option>
                        </select>
                    </div>
                    <div class="field"><label>Gestión (BC)</label>
                        <select id="det_gestion">
                            <option value="">-- Seleccionar --</option>
                            <option>Incremento</option>
                            <option>Nuevo</option>
                            <option>Renovación</option>
                            <option>Renovación e incremento</option>
                            <option>Seguimiento</option>
                        </select>
                    </div>
                    <div class="field span-full"><label>Tasas Fija y Variable (BD)</label><textarea id="det_tasas" rows="2"></textarea></div>
                    <div class="field"><label>Plazo Meses (BE)</label><input type="number" id="det_plazo"></div>
                    <div class="field"><label>Ejecutivo y Contacto (BF)</label><input type="text" id="det_contacto"></div>
                    <div class="field"><label>Exposición (BG)</label><input type="text" id="det_exposicion"></div>
                    <div class="field"><label>Origen de Fondos Prima (BJ)</label>
                        <select id="det_origen">
                            <option value="">-- Seleccionar --</option>
                            <option>Entrega vehículo</option>
                            <option>Ahorros</option>
                            <option>Fondos propios</option>
                            <option>Otros</option>
                        </select>
                    </div>
                    <div class="field span-full"><label>Comentarios Importantes (BH)</label><textarea id="det_comentarios" rows="2"></textarea></div>
                    <div class="field span-full"><label>Archivos Caso ZIP (BI)</label><input type="text" id="det_archivos" placeholder="Nombre de los archivos identificados"></div>
                </div>
            </div>

            <div style="margin-top:30px; display:flex;">
                <button type="button" id="btnGuardar" class="btn-save" onclick="guardarNuevo()">
                    <span id="btnText">Registrar en Casos</span>
                </button>
            </div>
        </form>
    </div>
</main>

<div id="toast"></div>

<script>
// CONFIGURACIÓN MSAL (Mismo funcionamiento)
const msalConfig = {
    auth: {
        clientId: "330765a8-2c56-4eca-bce2-f418eb1cdaf0",
        authority: "https://login.microsoftonline.com/8fe4234f-a041-4848-a8c7-ebe2442403da",
        redirectUri: "https://mhernandez-cafsa.github.io/formulario-cafsa/"
    },
    cache: { cacheLocation: "sessionStorage" }
};

const EXCEL_CONFIG = {
    driveUrl: "/sites/financieracafsasa.sharepoint.com:/sites/RepositoriodeCasos:/drive",
    fileName: "Casos en trámite.xlsx",
    sheetName: "Casos"
};

let msalInstance, accessToken, currentUser, fileId, driveId, nextRow = 0;

async function init() {
    msalInstance = new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();
    try {
        const response = await msalInstance.handleRedirectPromise();
        if (response) {
            accessToken = response.accessToken;
            currentUser = response.account;
            onAuthenticated();
        } else {
            const accounts = msalInstance.getAllAccounts();
            if (accounts.length > 0) {
                const silent = await msalInstance.acquireTokenSilent({
                    scopes: ["Files.ReadWrite.All", "Sites.ReadWrite.All"],
                    account: accounts[0]
                });
                accessToken = silent.accessToken;
                currentUser = accounts[0];
                onAuthenticated();
            } else {
                document.getElementById("manual-login-btn").style.display = "block";
            }
        }
    } catch (e) { console.error(e); }
}

async function signIn() { await msalInstance.loginRedirect({ scopes: ["Files.ReadWrite.All", "Sites.ReadWrite.All"] }); }
async function signOut() { await msalInstance.logoutRedirect(); }

async function onAuthenticated() {
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("auth-label").innerText = currentUser.name;
    document.getElementById("status-bar").style.display = "flex";
    try {
        const driveRes = await graphCall(EXCEL_CONFIG.driveUrl);
        driveId = driveRes.id;
        const search = await graphCall(`/drives/${driveId}/root/search(q='${EXCEL_CONFIG.fileName}')`);
        const file = search.value.find(f => f.name === EXCEL_CONFIG.fileName);
        fileId = file.id;
        const range = await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${EXCEL_CONFIG.sheetName}/usedRange`);
        nextRow = range.rowCount + 1;
        document.getElementById("status-text").innerText = "Sincronizado. Fila: " + nextRow;
    } catch (e) { showToast("Error de conexión", "error"); }
}

async function graphCall(endpoint, method = "GET", body = null) {
    const headers = new Headers();
    headers.append("Authorization", `Bearer ${accessToken}`);
    headers.append("Content-Type", "application/json");
    const options = { method, headers };
    if (body) options.body = JSON.stringify(body);
    const response = await fetch(`https://graph.microsoft.com/v1.0${endpoint}`, options);
    return response.json();
}

function toggleCamposAmbas() {
    const val = document.getElementById("n_ingresoDeposito").value;
    document.getElementById("contenedorAmbas").style.display = (val === "Entra por Ambas") ? "block" : "none";
}

function validarYCalcularPorcentaje() {
    const deposito = parseFloat(document.getElementById("n_deposito").value) || 0;
    const montoG = parseFloat(document.getElementById("n_montoArrendar").value) || 0;
    if (montoG > 0) {
        document.getElementById("n_porcentaje_txt").innerText = ((deposito / montoG) * 100).toFixed(1) + "%";
    }
}

async function guardarNuevo() {
    const btn = document.getElementById("btnGuardar");
    btn.disabled = true;
    document.getElementById("btnText").innerText = "Procesando...";

    try {
        const marcaTemporal = new Date().toLocaleString();
        const cedula = document.getElementById("n_cedula").value;
        const cliente = document.getElementById("n_cliente").value;
        const comentariosGen = document.getElementById("n_comentarios_gen").value;
        
        // Mapeo dinámico de datos existentes
        const rowData = [[
            "ID-" + new Date().getTime(), // A
            document.getElementById("n_estado").value, // B
            document.getElementById("n_fechaEntrega").value, // C
            "", "", // D, E
            document.getElementById("n_producto").value, // F
            document.getElementById("n_siCancela").value, // G
            document.getElementById("n_operacion").value, // H
            "", // I
            document.getElementById("n_esWF").value, // J
            document.getElementById("n_tipoCliente").value, // K
            document.getElementById("n_mes").value, // L
            "", // M
            document.getElementById("n_op").value, // N
            "", "", "", "", "", // O, P, Q, R, S
            document.getElementById("n_empresa").value, // T
            document.getElementById("n_ejecutivo").value, // U
            document.getElementById("n_sucursal").value, // V
            cedula, // W
            cliente, // X
            document.getElementById("n_moneda").value, // Y
            document.getElementById("n_valor").value, // Z
            document.getElementById("n_deposito").value, // AA
            document.getElementById("n_montoArrendar").value, // AB
            document.getElementById("n_qUnidades").value, // AC
            document.getElementById("n_marca").value, // AD
            document.getElementById("n_modelo").value, // AE
            document.getElementById("n_anio").value, // AF
            document.getElementById("n_vendedor").value, // AG
            document.getElementById("n_tipoRiesgo").value, // AH
            "ACTIVO", // AI
            document.getElementById("n_ingresoDeposito").value, // AJ
            "", "", // AK, AL
            document.getElementById("n_montoAgencia").value, // AM
            document.getElementById("n_montoCafsa").value, // AN
            "", // AO
            document.getElementById("n_garantia_llamado").value, // AP
            document.getElementById("n_pv_llamado").value, // AQ
            comentariosGen, // AR (Columna AR)
            document.getElementById("esReferido").checked ? "SI" : "NO", // AS
            
            // --- SECCIÓN 4 (Mapeo solicitado) ---
            document.getElementById("checkSeccion4").checked ? "SI" : "NO", // AT: Check seccion
            marcaTemporal, // AU: Marca temporal
            comentariosGen, // AV: Replica AR
            cliente,        // AW: Replica X
            cedula,         // AX: Replica W
            document.getElementById("det_monto").value, // AY
            document.getElementById("det_vehiculo").value, // AZ
            document.getElementById("det_prima").value, // BA
            document.getElementById("det_aprobacion").value, // BA (Nota: en tu excel BA se repite o es BB?)
            document.getElementById("det_operacion").value, // BB
            document.getElementById("det_gestion").value, // BC
            document.getElementById("det_tasas").value, // BD
            document.getElementById("det_plazo").value, // BE
            document.getElementById("det_contacto").value, // BF
            document.getElementById("det_exposicion").value, // BG
            document.getElementById("det_comentarios").value, // BH
            document.getElementById("det_archivos").value, // BI
            document.getElementById("det_origen").value // BJ
        ]];

        const address = `${EXCEL_CONFIG.sheetName}!A${nextRow}:BJ${nextRow}`;
        await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${EXCEL_CONFIG.sheetName}/range(address='${address}')`, "PATCH", {
            values: rowData
        });

        showToast("✓ Registro guardado", "success");
        document.getElementById("formNuevo").reset();
        nextRow++;
    } catch (e) {
        showToast("Error: " + e.message, "error");
    } finally {
        btn.disabled = false;
        document.getElementById("btnText").innerText = "Registrar en Casos";
    }
}

function showToast(msg, type) {
    const t = document.getElementById("toast");
    t.innerText = msg; t.className = type; t.style.display = "block";
    setTimeout(() => t.style.display = "none", 4000);
}
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
