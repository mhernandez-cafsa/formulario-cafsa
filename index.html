<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Casos — CAFSA</title>
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --brand: #0F4C81; --brand-light: #E6F1FB; --brand-mid: #378ADD;
            --accent: #1D9E75; --danger: #E24B4A; --text-primary: #1a1a1a;
            --text-secondary: #5F5E5A; --text-hint: #888780; --border: rgba(0,0,0,0.1);
            --surface: #ffffff; --surface-2: #F8F9FB; --radius: 10px; --radius-lg: 16px;
        }
        body { font-family: 'Syne', sans-serif; background: var(--surface-2); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--brand); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .header-brand { display: flex; align-items: center; gap: 12px; }
        .logo-badge { width: 34px; height: 34px; background: rgba(255,255,255,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; color: #fff; }
        .header-title { font-size: 15px; font-weight: 600; color: #fff; }
        #auth-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: #fff; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        #status-bar { background: var(--brand-light); border-bottom: 1px solid rgba(55,138,221,0.2); padding: 8px 2rem; font-size: 12.5px; color: var(--brand); display: none; align-items: center; gap: 8px; }
        main { flex: 1; padding: 2rem; max-width: 1100px; margin: 0 auto; width: 100%; }
        .form-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .section-title { padding: 1.25rem 1.75rem; border-bottom: 1px solid var(--border); background: #fafafa; font-weight: 700; color: var(--brand); font-size: 14px; text-transform: uppercase; }
        .grid { padding: 1.5rem 1.75rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; border-bottom: 1px solid var(--border); }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .span-full { grid-column: 1 / -1; }
        label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }
        input, select, textarea { font-family: inherit; font-size: 14px; padding: 10px; border: 1.5px solid var(--border); border-radius: var(--radius); outline: none; background: #fff; width: 100%; }
        input:focus, select:focus { border-color: var(--brand-mid); }
        .actions { padding: 1.5rem 1.75rem; display: flex; justify-content: flex-end; }
        .btn-save { background: var(--brand); color: #fff; border: none; padding: 12px 40px; border-radius: var(--radius); font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-save:hover { background: #0D4070; transform: translateY(-1px); }
        #toast { position: fixed; bottom: 2rem; right: 2rem; padding: 15px 25px; border-radius: 8px; color: #fff; display: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="login-overlay" style="position:fixed;inset:0;background:rgba(15,76,129,0.98);display:flex;align-items:center;justify-content:center;z-index:200;">
    <div style="background:#fff;border-radius:20px;padding:2.5rem;max-width:380px;width:90%;text-align:center;">
        <h2 id="overlay-title">Cargando...</h2>
        <button id="manual-login-btn" onclick="signIn()" style="display:none; width:100%; padding:12px; background:#0F4C81; color:#fff; border:none; border-radius:8px; margin-top:20px; cursor:pointer;">Iniciar Sesión con Microsoft</button>
    </div>
</div>

<header>
    <div class="header-brand"><div class="logo-badge">CA</div><div class="header-title">CAFSA Repositorio</div></div>
    <button id="auth-btn" onclick="signOut()"><span id="auth-label">Conectando...</span></button>
</header>

<div id="status-bar"><span id="status-text">Iniciando...</span></div>

<main>
    <div class="form-card">
        <form id="formNuevo">
            <div class="section-title">1. Cliente y Operación</div>
            <div class="grid">
                <div class="field span-full">
                    <label>¿ES REFERIDO? (AQ)</label>
                    <div style="display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff;">
                        <input type="checkbox" id="esReferido" style="width: 20px; height: 20px;">
                        <span>Marcar si es un cliente referido</span>
                    </div>
                </div>
                <div class="field"><label>Empresa (S)</label><select id="n_empresa" required><option value="">-- Seleccionar --</option><option>ARRENDADORA</option><option>FINANCIERA</option></select></div>
                <div class="field"><label>Ejecutivo (T)</label><select id="n_ejecutivo" required><option value="">-- Seleccionar --</option><option>K. Rodríguez</option><option>A. Mora</option><option>A. Valverde</option><option>B. Castro</option><option>C. Molina</option><option>C. Jiménez</option><option>D. Alvarado</option><option>D. Espinoza</option><option>D. Mora</option><option>D. Villar</option><option>D. Piña</option><option>D. Valerin</option><option>F. Badilla</option><option>F. Meza</option><option>F. Palma</option><option>I. Ureña</option><option>J. González</option><option>J. Viales</option><option>J. Martínez</option><option>J. Montero</option><option>J. Arroyo</option><option>L. Espinoza</option><option>M. Sánchez</option><option>G. Peña</option><option>R. Rodríguez</option><option>R. Porras</option><option>R. Abarca</option></select></div>
                <div class="field"><label>Sucursal (U)</label><select id="n_sucursal" required><option value="">-- Seleccionar --</option><option>AL ESTE</option><option>AUTOMOTRIZ CURRIDABAT</option><option>AUTOMOTRIZ ESCAZU</option><option>AUTOMOTRIZ LA URUCA</option><option>AUTOMOTRIZ LIBERIA</option><option>AUTOMOTRIZ PEREZ ZELEDON</option><option>AUTOMOTRIZ SAN CARLOS</option><option>EUROMATERIALES GUANACASTE</option><option>EUROMATERIALES TRES RIOS</option><option>HIGER-FAW</option><option>LEXUS</option><option>XPENG</option><option>PURDY AVENIDA ESCAZU</option><option>PURDY CENTER ALAJUELA</option><option>PURDY CENTER CARTAGO</option><option>PURDY CENTER ESCAZÚ</option><option>PURDY CENTER GRECIA</option><option>PURDY CENTER GUAPILES</option><option>PURDY CENTER NICOYA</option><option>PURDY CENTER TIBAS</option><option>PURDY CIUDAD TOYOTA</option><option>OTROS NEGOCIOS</option><option>PURDY CURRIDABAT</option><option>MOTOS ABT</option><option>MOTOS KTM</option><option>PURDY LIBERIA</option><option>PURDY PASEO COLON</option><option>PURDY PEREZ ZELEDON</option><option>PURDY SAN CARLOS</option><option>PURDY TERRAMALL</option><option>PURDY TRABAJO</option><option>PURDY ZAPOTE</option></select></div>
                <div class="field"><label>Cédula (V)</label><input type="text" id="n_cedula"></div>
                <div class="field"><label>Cliente (W)</label><input type="text" id="n_cliente" required></div>
                <div class="field"><label>Tipo Cliente (K)</label><select id="n_tipoCliente"><option value="">-- Seleccionar --</option><option>JURIDICO</option><option>INDEPENDIENTE</option><option>ASALARIADO</option></select></div>
                <div class="field"><label>Riesgo (AG)</label><select id="n_tipoRiesgo"><option value="SIN ALERTA">SIN ALERTA</option><option value="API">API</option><option value="PEP">PEP</option><option value="APFND">APFND</option></select></div>
                <div class="field"><label>Cliente–Garantía (E)</label><select id="n_clienteGarantia"><option value="">-- Seleccionar --</option><option>LISTA</option><option>SIN EMPEZAR</option></select></div>
                <div class="field"><label>¿Se Cancela? (G)</label><select id="n_siCancela"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div class="field"><label>¿Es de WF? (J)</label><select id="n_esWF"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div class="field"><label># OP Cancelada (H)</label><input type="text" id="n_operacion"></div>
            </div>

            <div class="section-title">2. Garantía</div>
            <div class="grid">
                <div class="field"><label>Moneda (X)</label><select id="n_moneda"><option value="">-- Seleccionar --</option><option>COLONES</option><option>DOLARES</option></select></div>
                <div class="field"><label>Monto Arrendar / Monto Credito (Y)</label><input type="number" id="n_valor" oninput="validarYCalcularPorcentaje()"></div>
                <div class="field">
                    <label>Depósito / Prima (Z)</label>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="number" id="n_deposito" placeholder="0.00" oninput="validarYCalcularPorcentaje()" style="flex: 1;">
                        <span id="n_porcentaje_txt" style="font-weight: bold; color: var(--brand); min-width: 40px;">0%</span>
                    </div>
                </div>
                <div class="field"><label>Ingreso de Depósito (AI)</label><select id="n_ingresoDeposito" onchange="toggleCamposAmbas()"><option value="">-- Seleccionar --</option><option value="Entra por CAFSA">Entra por CAFSA</option><option value="Entra por Agencia">Entra por Agencia</option><option value="Entra por Ambas">Entra por Ambas</option></select></div>
                
                <div id="contenedorAmbas" class="field span-full" style="display: none; background: #f0f0f0; padding: 15px; border-radius: 8px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="field"><label>Monto en Agencia (AL)</label><input type="number" id="n_montoAgencia" oninput="calcularSumaTotal()" placeholder="0"></div>
                        <div class="field"><label>Monto en CAFSA (AM)</label><input type="number" id="n_montoCafsa" oninput="calcularSumaTotal()" placeholder="0"></div>
                    </div>
                </div>

                <div class="field"><label>Monto Garantía (AA)</label><input type="number" id="n_montoArrendar"></div>
                <div class="field"><label>Unidades (AB)</label><input type="number" id="n_qUnidades" value="1"></div>
                <div class="field"><label>Marca (AC)</label><select id="n_marca"><option value="">-- Seleccionar --</option><option>BMW</option><option>CF MOTO</option><option>CHEVROLET</option><option>CITROËN</option><option>DAIHATSU</option><option>DODGE</option><option>DUCATI</option><option>FAW</option><option>FORD</option><option>HIGER</option><option>HINO</option><option>HONDA</option><option>HUSQVARNA</option><option>HYUNDAI</option><option>KIA</option><option>KTM</option><option>LEXUS</option><option>XPENG</option><option>MAZDA</option><option>MG</option><option>NISSAN</option><option>SUBARU</option><option>SUZUKI</option><option>TOYOTA</option><option>TRIUMPH</option><option>VOLKSWAGEN</option><option>ZERO MOTOS</option></select></div>
                <div class="field"><label>Modelo (AD)</label><input type="text" id="n_modelo"></div>
                <div class="field"><label>Año (AE)</label><input type="number" id="n_anio"></div>
                <div class="field"><label>Vendedor (AF)</label><input type="text" id="n_vendedor"></div>
            </div>

            <div class="section-title">3. Operación</div>
            <div class="grid">
                <div class="field"><label>Estado Principal (B)</label><select id="n_estado" required><option value="">-- Seleccionar --</option><option>Aprobado</option><option>Desembolsado</option><option>Reservado</option><option>Rechazado</option><option>Cliente elige otra entidad</option><option>En aprobación GG</option><option>En aprobación</option><option>En Estudio de Riesgo</option><option>Esperando más info</option></select></div>
                <div class="field"><label>Producto (F)</label><select id="n_producto"><option value="">-- Seleccionar --</option><option>AOFF</option><option>AOP</option><option>SBD ARRENDADORA</option><option>RENTING</option><option>USADOS DOLARES</option><option>USADOS</option><option>MOTOS</option><option>PRENDARIO</option><option>SBD FINANCIERA</option><option>BTB</option><option>PRÉSTAMO DIRECTO</option><option>PURDY CUOTAS</option></select></div>
                <div class="field"><label>Mes (L)</label><select id="n_mes"><option value="">-- Seleccionar --</option><option>ENERO</option><option>FEBRERO</option><option>MARZO</option><option>ABRIL</option><option>MAYO</option><option>JUNIO</option><option>JULIO</option><option>AGOSTO</option><option>SEPTIEMBRE</option><option>OCTUBRE</option><option>NOVIEMBRE</option><option>DICIEMBRE</option></select></div>
                <div class="field"><label>Estado Desembolso (P)</label><select id="n_estadoDesembolso"><option value="">-- Seleccionar --</option><option>AM LISTO</option><option>REVISIÓN WF 1</option><option>REVISIÓN WF 2</option><option>SIN SOLICITAR</option></select></div>
                <div class="field"><label>OS (R)</label><select id="n_os"><option value="">-- Seleccionar --</option><option>LISTA</option><option>EN TRÁMITE</option><option>SIN SOLICITAR</option></select></div>
                <div class="field"><label>OC (S)</label><select id="n_oc"><option value="">-- Seleccionar --</option><option>LISTA</option><option>EN TRÁMITE</option><option>SIN SOLICITAR</option></select></div>
                <div class="field"><label>Fecha Entrega (C)</label><input type="date" id="n_fechaEntrega"></div>
                <div class="field"><label>Hora Entrega (D)</label><input type="time" id="n_horaEntrega"></div>
                <div class="field"><label>F. Desembolso (M)</label><input type="date" id="n_fechaDesembolso"></div>
                <div class="field"><label>OP (N)</label><input type="text" id="n_op"></div>
                <div class="field"><label>Solicitud (O)</label><input type="text" id="n_solicitud"></div>
                <div class="field"><label>GARANTÍA (AN)</label><input type="number" id="n_garantia_llamado"></div>
                <div class="field"><label>PLAN DE VENTAS (AO)</label><input type="number" id="n_pv_llamado"></div>
            </div>

            <div class="actions">
                <button type="button" class="btn-save" onclick="guardarNuevo()">Guardar Caso</button>
            </div>
        </form>
    </div>
</main>

<div id="toast"></div>

<script>
    const msalConfig = {
        auth: {
            clientId: "330765a8-2c56-4eca-bce2-f418eb1cdaf0",
            authority: "https://login.microsoftonline.com/8fe4234f-a041-4848-a8c7-ebe2442403da",
            redirectUri: window.location.origin + window.location.pathname
        }
    };

    const SP_CONFIG = {
        sitePath: "financieracafsasa.sharepoint.com:/sites/RepositoriodeCasos",
        fileName: "Casos en trámite.xlsx",
        sheetName: "Casos"
    };

    let accessToken = null;
    let nextRow = 2;
    let driveId = "", fileId = "";

    async function initMSAL() {
        const msalInstance = new msal.PublicClientApplication(msalConfig);
        await msalInstance.initialize();
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) {
            const result = await msalInstance.acquireTokenSilent({ scopes: ["Files.ReadWrite.All", "Sites.ReadWrite.All"], account: accounts[0] });
            accessToken = result.accessToken;
            document.getElementById("auth-label").textContent = accounts[0].username;
            document.getElementById("login-overlay").style.display = "none";
            await cargarConfiguracionGraph();
        } else {
            document.getElementById("manual-login-btn").style.display = "block";
            document.getElementById("overlay-title").textContent = "Inicio de Sesión Requerido";
        }
    }

    async function signIn() {
        const msalInstance = new msal.PublicClientApplication(msalConfig);
        await msalInstance.loginRedirect({ scopes: ["Files.ReadWrite.All"] });
    }

    async function cargarConfiguracionGraph() {
        try {
            const driveRes = await graphCall(`/sites/${SP_CONFIG.sitePath}:/drive`);
            driveId = driveRes.id;
            const searchRes = await graphCall(`/drives/${driveId}/root/search(q='${SP_CONFIG.fileName}')`);
            const file = searchRes.value.find(f => f.name === SP_CONFIG.fileName);
            fileId = file.id;
            const usedRange = await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${SP_CONFIG.sheetName}/usedRange`);
            nextRow = usedRange.rowCount + 1;
            showStatus("Conectado. Próxima fila: " + nextRow);
        } catch (e) { showStatus("Error de conexión"); }
    }

    async function graphCall(endpoint, method = "GET", body = null) {
        const headers = { Authorization: `Bearer ${accessToken}`, "Content-Type": "application/json" };
        const res = await fetch(`https://graph.microsoft.com/v1.0${endpoint}`, { method, headers, body: body ? JSON.stringify(body) : null });
        return res.json();
    }

    // Lógica de UI
    function toggleCamposAmbas() {
        const val = document.getElementById("n_ingresoDeposito").value;
        document.getElementById("contenedorAmbas").style.display = (val === "Entra por Ambas") ? "block" : "none";
    }

    function calcularSumaTotal() {
        const ag = parseFloat(document.getElementById("n_montoAgencia").value) || 0;
        const caf = parseFloat(document.getElementById("n_montoCafsa").value) || 0;
        document.getElementById("n_deposito").value = (ag + caf).toFixed(2);
        validarYCalcularPorcentaje();
    }

    function validarYCalcularPorcentaje() {
        const valor = parseFloat(document.getElementById("n_valor").value) || 0;
        const depo = parseFloat(document.getElementById("n_deposito").value) || 0;
        const perc = valor > 0 ? Math.round((depo / valor) * 100) : 0;
        document.getElementById("n_porcentaje_txt").textContent = perc + "%";
    }

    async function guardarNuevo() {
        if (!accessToken) return;
        
        const idUnico = "ID-" + Date.now();
        const referido = document.getElementById("esReferido").checked ? "SI" : "NO";
        
        // Mapeo 44 columnas (A-AR) basado en tu Excel y Formulario
        const rowData = [
            idUnico,                                        // A: ID UNICO
            document.getElementById("n_estado").value,      // B: Estado Principal
            document.getElementById("n_fechaEntrega").value,// C: Fecha Entrega
            document.getElementById("n_horaEntrega").value, // D: Hora Entrega
            document.getElementById("n_clienteGarantia").value, // E: Cliente-Garantía
            document.getElementById("n_producto").value,    // F: Producto
            document.getElementById("n_siCancela").value,   // G: ¿Se Cancela?
            document.getElementById("n_operacion").value,   // H: # OP Cancelada
            "",                                             // I: Comentario (si aplica)
            document.getElementById("n_esWF").value,        // J: ¿Es de WF?
            document.getElementById("n_tipoCliente").value, // K: Tipo Cliente
            document.getElementById("n_mes").value,         // L: Mes
            document.getElementById("n_fechaDesembolso").value, // M: F. Desembolso
            document.getElementById("n_op").value,          // N: OP
            document.getElementById("n_solicitud").value,   // O: Solicitud
            document.getElementById("n_estadoDesembolso").value, // P: Estado Desembolso
            "",                                             // Q: Campo Q
            document.getElementById("n_os").value,          // R: OS
            document.getElementById("n_oc").value,          // S: OC
            document.getElementById("n_empresa").value,     // T: Empresa
            document.getElementById("n_ejecutivo").value,   // U: Ejecutivo
            document.getElementById("n_sucursal").value,    // V: Sucursal
            document.getElementById("n_cedula").value,      // W: Cédula
            document.getElementById("n_cliente").value,     // X: Cliente
            document.getElementById("n_moneda").value,      // Y: Moneda
            document.getElementById("n_valor").value,       // Z: Monto Arrendar
            document.getElementById("n_deposito").value,    // AA: Depósito/Prima
            document.getElementById("n_qUnidades").value,   // AB: Unidades
            document.getElementById("n_marca").value,       // AC: Marca
            document.getElementById("n_modelo").value,      // AD: Modelo
            document.getElementById("n_anio").value,        // AE: Año
            document.getElementById("n_vendedor").value,    // AF: Vendedor
            document.getElementById("n_tipoRiesgo").value,  // AG: Riesgo
            "ACTIVO",                                       // AH: Status
            document.getElementById("n_ingresoDeposito").value, // AI: Ingreso Depósito
            "",                                             // AJ: (M)
            document.getElementById("n_montoAgencia").value,// AK: Monto Agencia
            document.getElementById("n_montoCafsa").value,  // AL: Monto CAFSA
            "",                                             // AM: (Ambas)
            document.getElementById("n_garantia_llamado").value, // AN: Garantía llamado
            document.getElementById("n_pv_llamado").value,  // AO: PV llamado
            "",                                             // AP: (Extra)
            document.getElementById("auth-label").textContent, // AQ: Usuario
            referido                                        // AR: Referido
        ];

        try {
            const range = `A${nextRow}:AR${nextRow}`;
            await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${SP_CONFIG.sheetName}/range(address='${range}')`, "PATCH", { values: [rowData] });
            showToast("Caso Guardado en Fila " + nextRow, "success");
            nextRow++;
            document.getElementById("formNuevo").reset();
        } catch (e) { showToast("Error al guardar", "error"); }
    }

    function showStatus(t) { document.getElementById("status-text").textContent = t; document.getElementById("status-bar").style.display = "flex"; }
    function showToast(m, type) {
        const t = document.getElementById("toast");
        t.textContent = m;
        t.style.background = type === "success" ? "#1D9E75" : "#E24B4A";
        t.style.display = "block";
        setTimeout(() => t.style.display = "none", 4000);
    }

    initMSAL();
</script>
</body>
</html>
