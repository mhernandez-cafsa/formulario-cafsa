<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Casos — CAFSA</title>
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap');
        :root { --brand-red: #E24B4A; --brand-dark: #2D2D2D; --brand-gray: #5F5E5A; --brand-light: #F4F4F4; --accent: #1D9E75; --border: #E0E0E0; --radius: 12px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Syne', sans-serif; background: #ECECEC; color: #1a1a1a; }
        header { background: var(--brand-dark); padding: 0 2rem; height: 70px; display: flex; align-items: center; justify-content: space-between; color: white; position: sticky; top: 0; z-index: 100; border-bottom: 4px solid var(--brand-red); }
        .logo-badge { background: var(--brand-red); padding: 6px 12px; border-radius: 8px; font-family: 'DM Mono'; font-weight: bold; margin-right: 12px; }
        main { padding: 2.5rem 1rem; max-width: 1200px; margin: 0 auto; }
        .form-card { background: #ffffff; border-radius: 20px; padding: 2.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .section-title { color: var(--brand-dark); padding-bottom: 10px; border-bottom: 2px solid var(--brand-light); margin: 30px 0 20px 0; font-size: 16px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ''; width: 4px; height: 18px; background: var(--brand-red); border-radius: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        .field.span-full { grid-column: 1 / -1; }
        label { font-size: 12px; font-weight: 600; color: var(--brand-gray); }
        input, select, textarea { padding: 12px 15px; border: 2px solid var(--brand-light); border-radius: var(--radius); font-size: 14px; background: var(--brand-light); outline: none; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: var(--brand-red); background: white; }
        .analysis-section { border-left: 5px solid var(--brand-red); background: #fff5f5; display: none; padding: 20px; border-radius: var(--radius); }
        .btn-save { background: var(--brand-red); color: white; border: none; padding: 15px 50px; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.4s; display: flex; align-items: center; gap: 12px; }
        #toast { position: fixed; bottom: 30px; right: 30px; padding: 18px 30px; border-radius: var(--radius); color: white; display: none; z-index: 1000; font-weight: 600; }
        .success { background: var(--accent); } .error { background: var(--brand-red); }
    </style>
</head>
<body>

<header>
    <div class="header-brand"><span class="logo-badge">CAFSA</span><strong>Repositorio de Casos</strong></div>
    <button id="auth-btn" onclick="signOut()">Cerrar Sesión</button>
</header>

<main>
    <div class="form-card">
        <form id="formNuevo">
            <div class="section-title">1. Cliente y Operación</div>
            <div class="grid">
                <div class="field"><label>Estado (B)</label><input type="text" id="n_estado" required></div>
                <div class="field"><label>Fecha Entrega (C)</label><input type="date" id="n_fechaEntrega"></div>
                <div class="field"><label>Hora (D)</label><input type="time" id="n_horaEntrega"></div>
                <div class="field"><label>Cliente-Garantía (E)</label><input type="text" id="n_clienteGarantia"></div>
                <div class="field"><label>Producto (F)</label><input type="text" id="n_producto"></div>
                <div class="field"><label>¿Se Cancela? (G)</label><select id="n_siCancela"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div class="field"><label># Operación (H)</label><input type="text" id="n_operacion"></div>
                <div class="field"><label>Comentario (I)</label><input type="text" id="n_comentario"></div>
                <div class="field"><label>¿Es de WF? (J)</label><select id="n_esWF"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div class="field"><label>Tipo Cliente (K)</label><input type="text" id="n_tipoCliente"></div>
                <div class="field"><label>Mes (L)</label><input type="text" id="n_mes"></div>
            </div>

            <div class="section-title">2. Detalles Financieros</div>
            <div class="grid">
                <div class="field"><label>Cédula (V)</label><input type="text" id="n_cedula"></div>
                <div class="field"><label>Cliente (W)</label><input type="text" id="n_cliente"></div>
                <div class="field"><label>Moneda (X)</label><select id="n_moneda"><option>COLONES</option><option>DOLARES</option></select></div>
                <div class="field"><label>Monto Crédito (Y)</label><input type="number" id="n_valor"></div>
                <div class="field"><label>Depósito / Prima (Z)</label><input type="number" id="n_deposito"></div>
                <div class="field"><label>Monto Garantía (AA)</label><input type="number" id="n_montoArrendar"></div>
                <div class="field"><label>Ingreso Depósito (AI)</label><input type="text" id="n_ingresoDeposito"></div>
                <div class="field"><label>Monto Agencia (AL)</label><input type="number" id="n_montoAgencia"></div>
                <div class="field"><label>Monto CAFSA (AM)</label><input type="number" id="n_montoCafsa"></div>
            </div>

            <div class="section-title">3. Envío a Análisis</div>
            <div class="field span-full" style="margin-bottom: 20px;">
                <div style="display: flex; align-items: center; gap: 15px; padding: 20px; background: var(--brand-dark); color: white; border-radius: var(--radius); cursor: pointer;">
                    <input type="checkbox" id="check_A" onchange="toggleAnalisis()" style="width: 24px; height: 24px;">
                    <label for="check_A" style="color: white; cursor: pointer;">MARCAR PARA ENVIAR A ANÁLISIS (AT)</label>
                </div>
            </div>

            <div id="seccionAnalisis" class="analysis-section">
                <div class="grid">
                    <div class="field"><label>Correo Electrónico (AU)</label><input type="email" id="ana_correo"></div>
                    <div class="field"><label>Nombre (AV)</label><input type="text" id="ana_nombre"></div>
                    <div class="field"><label>Cédula (sin guiones) (AW)</label><input type="text" id="ana_cedula"></div>
                    <div class="field"><label>Monto Solicitud (AX)</label><input type="text" id="ana_monto_sol"></div>
                    <div class="field"><label>Tipo Vehículo (AY)</label><input type="text" id="ana_tipo_vehiculo"></div>
                    <div class="field"><label>Porcentaje Prima (AZ)</label><input type="text" id="ana_porc_prima"></div>
                    <div class="field"><label>Nivel Aprobación (BA)</label><input type="text" id="ana_nivel"></div>
                    <div class="field"><label>Tipo Operación (BB)</label><input type="text" id="ana_tipo_op"></div>
                    <div class="field"><label>Gestión (BC)</label><input type="text" id="ana_gestion"></div>
                    <div class="field span-full"><label>Tasa Fija/Variable (BD)</label><textarea id="ana_tasas" rows="2"></textarea></div>
                    <div class="field"><label>Plazo Meses (BE)</label><input type="number" id="ana_plazo"></div>
                    <div class="field"><label>Ejecutivo/Contacto (BF)</label><input type="text" id="ana_contacto"></div>
                    <div class="field"><label>Exposición (BG)</label><input type="text" id="ana_exposicion"></div>
                    <div class="field span-full"><label>Comentarios Importantes (BH)</label><textarea id="ana_comentarios" rows="2"></textarea></div>
                    <div class="field"><label>Carpeta ZIP (BI)</label><input type="file" id="ana_zip"></div>
                    <div class="field"><label>Origen Fondos (BJ)</label><input type="text" id="ana_fondos"></div>
                </div>
            </div>

            <div style="margin-top: 40px; display: flex; justify-content: flex-end;">
                <button type="button" class="btn-save" onclick="guardarRegistro()">Guardar Registro</button>
            </div>
        </form>
    </div>
</main>

<div id="toast"></div>

<script>
    function toggleAnalisis() {
        const isChecked = document.getElementById("check_A").checked;
        document.getElementById("seccionAnalisis").style.display = isChecked ? "block" : "none";
    }

    async function guardarRegistro() {
        try {
            const now = new Date();
            // Generación de ID ÚNICO según fórmula
            const idUnico = now.toISOString().split('T')[0].replace(/-/g, '') + now.getHours() + now.getMinutes() + now.getSeconds();
            
            const moneda = document.getElementById("n_moneda").value;
            const valor = parseFloat(document.getElementById("n_valor").value) || 0;
            const conversion = moneda === "COLONES" ? (valor / 460).toFixed(2) : valor; //

            const rowData = [
                idUnico, // A
                document.getElementById("n_estado").value, // B
                document.getElementById("n_fechaEntrega").value, // C
                document.getElementById("n_horaEntrega").value, // D
                document.getElementById("n_clienteGarantia").value, // E
                document.getElementById("n_producto").value, // F
                document.getElementById("n_siCancela").value, // G
                document.getElementById("n_operacion").value, // H
                document.getElementById("n_comentario").value, // I
                document.getElementById("n_esWF").value, // J
                document.getElementById("n_tipoCliente").value, // K
                document.getElementById("n_mes").value, // L
                "", "", "", "", "", "", // M a R (Campos vacíos o internos)
                "", "", "", // S, T, U
                document.getElementById("n_cedula").value, // V
                document.getElementById("n_cliente").value, // W
                moneda, // X
                document.getElementById("n_montoArrendar").value, // Y (Mapeo imagen 2)
                document.getElementById("n_deposito").value, // Z
                valor, // AA
                1, // AB (Unidades)
                "", "", "", "", "", "", // AC a AH
                document.getElementById("n_ingresoDeposito").value, // AI
                "", // AJ
                conversion, // AK
                document.getElementById("n_montoAgencia").value, // AL
                document.getElementById("n_montoCafsa").value, // AM
                "", "", "", "", "" // AN a AR
            ];

            // Si check_A está marcado, agregar datos de análisis (AT a BJ)
            if (document.getElementById("check_A").checked) {
                const analisisData = [
                    "SI", // AT
                    document.getElementById("ana_correo").value, // AU
                    document.getElementById("ana_nombre").value, // AV
                    document.getElementById("ana_cedula").value, // AW
                    document.getElementById("ana_monto_sol").value, // AX
                    document.getElementById("ana_tipo_vehiculo").value, // AY
                    document.getElementById("ana_porc_prima").value, // AZ
                    document.getElementById("ana_nivel").value, // BA
                    document.getElementById("ana_tipo_op").value, // BB
                    document.getElementById("ana_gestion").value, // BC
                    document.getElementById("ana_tasas").value, // BD
                    document.getElementById("ana_plazo").value, // BE
                    document.getElementById("ana_contacto").value, // BF
                    document.getElementById("ana_exposicion").value, // BG
                    document.getElementById("ana_comentarios").value, // BH
                    "Archivo Adjunto", // BI
                    document.getElementById("ana_fondos").value // BJ
                ];
                // Aquí iría la lógica de envío a SharePoint/Excel
            }

            showToast("✓ Registro guardado correctamente", "success");
        } catch (error) {
            showToast("Error al guardar: " + error.message, "error");
        }
    }

    function showToast(msg, type) {
        const t = document.getElementById("toast");
        t.innerText = msg; t.className = type; t.style.display = "block";
        setTimeout(() => t.style.display = "none", 4000);
    }
</script>
</body>
</html>
