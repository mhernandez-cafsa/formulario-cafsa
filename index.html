<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Casos — CAFSA</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #0F4C81; --brand-light: #E6F1FB; --brand-mid: #378ADD;
    --accent: #1D9E75; --danger: #E24B4A; --text-primary: #1a1a1a;
    --text-secondary: #5F5E5A; --text-hint: #888780; --border: rgba(0,0,0,0.1);
    --surface: #ffffff; --surface-2: #F8F9FB; --radius: 10px; --radius-lg: 16px;
  }
  body { font-family: 'Syne', sans-serif; background: var(--surface-2); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--brand); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .logo-badge { width: 34px; height: 34px; background: rgba(255,255,255,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; color: #fff; }
  .header-title { font-size: 15px; font-weight: 600; color: #fff; }
  #auth-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: #fff; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  #status-bar { background: var(--brand-light); border-bottom: 1px solid rgba(55,138,221,0.2); padding: 8px 2rem; font-size: 12.5px; color: var(--brand); display: none; align-items: center; gap: 8px; }
  main { flex: 1; padding: 2rem; max-width: 1100px; margin: 0 auto; width: 100%; }
  .form-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
  .section-header { padding: 1.25rem 1.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: #fafafa; }
  .section-number { width: 24px; height: 24px; border-radius: 50%; background: var(--brand); color: #fff; font-size: 11px; display: flex; align-items: center; justify-content: center; }
  .form-grid { padding: 1.5rem 1.75rem; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; border-bottom: 1px solid var(--border); }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .span-2 { grid-column: span 2; }
  label { font-size: 10px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
  label .req { color: var(--danger); }
  input, select, textarea { font-family: inherit; font-size: 13px; padding: 10px; border: 1.5px solid var(--border); border-radius: var(--radius); outline: none; background: var(--surface-2); }
  input:focus { border-color: var(--brand-mid); background: #fff; }
  .form-actions { padding: 1.5rem 1.75rem; display: flex; justify-content: space-between; }
  .btn-submit { background: var(--brand); color: #fff; border: none; padding: 12px 30px; border-radius: var(--radius); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; }
  #toast { position: fixed; bottom: 2rem; right: 2rem; padding: 15px 25px; border-radius: 8px; color: #fff; display: none; z-index: 1000; font-weight: 500; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 800px) { .form-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<div id="login-overlay" style="position:fixed;inset:0;background:rgba(15,76,129,0.98);display:flex;align-items:center;justify-content:center;z-index:200;">
  <div style="background:#fff;border-radius:20px;padding:2.5rem;max-width:380px;width:90%;text-align:center;">
    <h2 id="overlay-title">Verificando sesión...</h2>
    <p id="overlay-msg" style="margin: 15px 0;">Accediendo a Microsoft 365</p>
    <button id="manual-login-btn" onclick="signIn()" style="display:none; width:100%; padding:12px; background:#0F4C81; color:#fff; border:none; border-radius:8px; cursor:pointer;">Iniciar Sesión</button>
  </div>
</div>

<header>
  <div class="header-brand"><div class="logo-badge">CA</div><div class="header-title">CAFSA <span>Casos</span></div></div>
  <button id="auth-btn" onclick="signOut()"><span class="auth-dot" id="auth-dot"></span> <span id="auth-label">...</span></button>
</header>

<div id="status-bar"><span id="status-text">Iniciando...</span></div>

<main>
  <div class="form-card">
    <div class="section-header"><div class="section-number">1</div><h2>Control e Identificación</h2></div>
    <div class="form-grid">
      <div class="field"><label>ID ÚNICO</label><input type="text" id="id_unico" readonly placeholder="Auto-generado"></div>
      <div class="field"><label>Estado <span class="req">*</span></label>
        <select id="estado" required><option>En Trámite</option><option>Finalizado</option><option>Cancelado</option></select>
      </div>
      <div class="field"><label>Fecha Entrega <span class="req">*</span></label><input type="date" id="fecha_entrega" required></div>
      <div class="field"><label>Hora <span class="req">*</span></label><input type="time" id="hora" required></div>
    </div>

    <div class="section-header"><div class="section-number">2</div><h2>Detalles de Operación</h2></div>
    <div class="form-grid">
      <div class="field"><label>Producto</label><input type="text" id="producto" placeholder="Ej: Arrendamiento"></div>
      <div class="field"><label># Operación</label><input type="text" id="num_operacion"></div>
      <div class="field"><label>Solicitud</label><input type="text" id="solicitud"></div>
      <div class="field"><label>Empresa</label><input type="text" id="empresa"></div>
      <div class="field span-2"><label>Comentario</label><input type="text" id="comentario"></div>
      <div class="field"><label>Si se cancela, indicar:</label><input type="text" id="cancelacion"></div>
      <div class="field"><label>Mes</label><input type="text" id="mes"></div>
    </div>

    <div class="section-header"><div class="section-number">3</div><h2>Información del Cliente</h2></div>
    <div class="form-grid">
      <div class="field"><label>Cédula <span class="req">*</span></label><input type="text" id="cedula_w" required></div>
      <div class="field span-2"><label>Nombre Cliente <span class="req">*</span></label><input type="text" id="cliente_w" required></div>
      <div class="field"><label>Tipo Cliente</label><select id="tipo_cliente"><option>Físico</option><option>Jurídico</option></select></div>
      <div class="field"><label>Ejecutivo</label><input type="text" id="ejecutivo"></div>
      <div class="field"><label>Sucursal</label><input type="text" id="sucursal"></div>
      <div class="field"><label>T. Riesgo</label><input type="text" id="t_riesgo"></div>
      <div class="field"><label>Referido Por</label><input type="text" id="referido_w"></div>
    </div>

    <div class="section-header"><div class="section-number">4</div><h2>Datos Financieros y Activos</h2></div>
    <div class="form-grid">
      <div class="field"><label>Moneda</label><select id="moneda_w"><option>CRC</option><option>USD</option></select></div>
      <div class="field"><label>Monto Arrendar</label><input type="number" id="monto_arrendar" step="0.01"></div>
      <div class="field"><label>Valor</label><input type="number" id="valor"></div>
      <div class="field"><label>Marca</label><input type="text" id="marca"></div>
      <div class="field"><label>Modelo</label><input type="text" id="modelo"></div>
      <div class="field"><label>Año</label><input type="number" id="anio"></div>
      <div class="field"><label>Vendedor</label><input type="text" id="vendedor"></div>
      <div class="field"><label>Entra por Agencia</label><select id="entra_agencia"><option>No</option><option>Si</option></select></div>
    </div>

    <div class="form-actions">
      <button class="btn-reset" type="button" onclick="resetForm()">Limpiar</button>
      <button class="btn-submit" id="submit-btn" onclick="submitForm()">
        <span class="spinner" id="spinner"></span>
        <span id="submit-label">Registrar en Excel</span>
      </button>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
const msalConfig = {
  auth: {
    clientId: "330765a8-2c56-4eca-bce2-f418eb1cdaf0",
    authority: "https://login.microsoftonline.com/8fe4234f-a041-4848-a8c7-ebe2442403da",
    redirectUri: window.location.origin + window.location.pathname
  },
  cache: { cacheLocation: "sessionStorage" }
};

const SP_CONFIG = {
  siteUrl: "https://financieracafsasa.sharepoint.com/sites/RepositoriodeCasos",
  fileName: "Casos en trámite.xlsx",
  sheetName: "Casos",
  driveId: "", fileId: ""
};

let accessToken = null;
let msalInstance = null;
let nextRow = 2;

async function initMSAL() {
  msalInstance = new msal.PublicClientApplication(msalConfig);
  await msalInstance.initialize();
  
  const response = await msalInstance.handleRedirectPromise();
  const accounts = msalInstance.getAllAccounts();

  if (accounts.length > 0) {
    const result = await msalInstance.acquireTokenSilent({ scopes: ["Files.ReadWrite.All", "Sites.ReadWrite.All"], account: accounts[0] });
    accessToken = result.accessToken;
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("auth-label").textContent = accounts[0].username;
    await initExcelFile();
  } else {
    document.getElementById("manual-login-btn").style.display = "block";
    document.getElementById("overlay-title").textContent = "Acceso Requerido";
  }
}

async function signIn() { await msalInstance.loginRedirect({ scopes: ["Files.ReadWrite.All"] }); }

async function initExcelFile() {
  try {
    showStatus("Conectando con base de datos...");
    const sitePath = "financieracafsasa.sharepoint.com:/sites/RepositoriodeCasos";
    const driveRes = await graphCall(`/sites/${sitePath}:/drive`);
    SP_CONFIG.driveId = driveRes.id;

    const searchRes = await graphCall(`/drives/${SP_CONFIG.driveId}/root/search(q='Casos en trámite')`);
    const file = searchRes.value.find(f => f.name.includes("Casos en trámite"));
    if (!file) throw new Error("Archivo no encontrado");
    SP_CONFIG.fileId = file.id;

    const usedRange = await graphCall(`/drives/${SP_CONFIG.driveId}/items/${SP_CONFIG.fileId}/workbook/worksheets/${SP_CONFIG.sheetName}/usedRange`);
    nextRow = usedRange.rowCount + 1;
    showStatus("Sistema Listo - Fila: " + nextRow);
  } catch (e) { showStatus("Error de conexión: " + e.message); }
}

async function graphCall(endpoint, method = "GET", body = null) {
  const headers = { Authorization: `Bearer ${accessToken}`, "Content-Type": "application/json" };
  const res = await fetch(`https://graph.microsoft.com/v1.0${endpoint}`, { method, headers, body: body ? JSON.stringify(body) : null });
  return res.json();
}

async function submitForm() {
  setLoading(true);
  try {
    // Generar ID ÚNICO: YYYYMMDDHHMMSS
    const now = new Date();
    const idUnico = now.toISOString().replace(/[-T:Z.]/g, "").substring(0, 14);
    
    // Mapeo de 44 columnas (A hasta AR)
    const rowData = [
      idUnico,                                      // A: ID_UNICO
      document.getElementById("estado").value,      // B: Estado
      document.getElementById("fecha_entrega").value,// C: FECHA ENTREGA
      document.getElementById("hora").value,        // D: HORA
      "",                                           // E: Cliente-Garantía (Vacio o añadir input)
      document.getElementById("producto").value,    // F: Producto
      document.getElementById("cancelacion").value, // G: SI SE CANCELA...
      document.getElementById("num_operacion").value,// H: # OPERACIÓN
      document.getElementById("comentario").value,  // I: Comentario
      "",                                           // J: SI ES DE WF...
      document.getElementById("tipo_cliente").value,// K: TIPO CLIENTE
      document.getElementById("mes").value,         // L: MES
      "",                                           // M: Fecha desembolso
      "",                                           // N: OP
      document.getElementById("solicitud").value,   // O: Solicitud
      "",                                           // P: ESTADO2
      "",                                           // Q: OS
      "",                                           // R: OC
      document.getElementById("empresa").value,     // S: EMPRESA
      document.getElementById("ejecutivo").value,   // T: Ejecutivo
      document.getElementById("sucursal").value,    // U: SUCURSAL
      document.getElementById("cedula_w").value,    // V: CEDULA
      document.getElementById("cliente_w").value,    // W: CLIENTE
      document.getElementById("moneda_w").value,    // X: MONEDA
      document.getElementById("monto_arrendar").value,// Y: MONTO ARRENDAR
      "",                                           // Z: DEPÓSITO
      document.getElementById("valor").value,       // AA: VALOR
      "1",                                          // AB: Q UNIDADES
      document.getElementById("marca").value,       // AC: MARCA
      document.getElementById("modelo").value,      // AD: MODELO
      document.getElementById("anio").value,        // AE: AÑO
      document.getElementById("vendedor").value,    // AF: Vendedor
      document.getElementById("t_riesgo").value,    // AG: T_Riesgo
      "ACTIVO",                                     // AH: STATUS
      "",                                           // AI: Ingreso Deposito
      "",                                           // AJ: M
      "",                                           // AK: Conversión
      document.getElementById("entra_agencia").value,// AL: Entra por Agencia
      "",                                           // AM: Entra por CAFSA
      "",                                           // AN: %
      "",                                           // AO: G
      "",                                           // AP: PV
      document.getElementById("auth-label").textContent, // AQ: Usuario (Logueado)
      document.getElementById("referido_w").value   // AR: Referido
    ];

    const range = `A${nextRow}:AR${nextRow}`;
    await graphCall(`/drives/${SP_CONFIG.driveId}/items/${SP_CONFIG.fileId}/workbook/worksheets/${SP_CONFIG.sheetName}/range(address='${range}')`, "PATCH", { values: [rowData] });
    
    showToast("✓ Guardado correctamente", "success");
    nextRow++;
    resetForm();
  } catch (e) { showToast("Error: " + e.message, "error"); }
  setLoading(false);
}

function showStatus(t) { document.getElementById("status-bar").style.display = "flex"; document.getElementById("status-text").textContent = t; }
function setLoading(l) { document.getElementById("spinner").style.display = l ? "block" : "none"; document.getElementById("submit-btn").disabled = l; }
function showToast(m, type) { 
  const t = document.getElementById("toast"); 
  t.textContent = m; t.style.background = type === "success" ? "#1D9E75" : "#E24B4A"; 
  t.style.display = "block"; setTimeout(() => t.style.display = "none", 3000); 
}
function resetForm() {
  document.querySelectorAll("input").forEach(i => i.id !== 'id_unico' ? i.value = "" : null);
}

document.addEventListener("DOMContentLoaded", initMSAL);
</script>
</body>
</html>
