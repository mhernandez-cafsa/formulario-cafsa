<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Casos — CAFSA</title>
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.js"></script>
    <style>
        /* Estilo Técnico Financiero - Tipografía Arial */
        :root {
            --brand-red: #E24B4A;
            --brand-dark: #2D2D2D;
            --brand-gray: #5F5E5A;
            --brand-light: #F8F9FA;
            --accent: #1D9E75;
            --text-primary: #333333;
            --border: #DDE2E5;
            --surface: #ffffff;
            --radius: 10px; /* Redondeado elegante */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, Helvetica, sans-serif; background: #F0F2F5; color: var(--text-primary); line-height: 1.5; }
        
        header { 
            background: var(--brand-dark); padding: 0 2rem; height: 65px; display: flex; 
            align-items: center; justify-content: space-between; color: white; position: sticky; 
            top: 0; z-index: 100; border-bottom: 3px solid var(--brand-red);
        }
        .logo-badge { background: var(--brand-red); padding: 5px 15px; border-radius: 5px; font-weight: bold; margin-right: 12px; font-size: 14px; }
        
        #auth-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 8px 16px; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
        
        #status-bar { background: #fff; padding: 8px 2rem; font-size: 12px; color: var(--brand-gray); border-bottom: 1px solid var(--border); display: none; align-items: center; gap: 10px; }
        
        main { padding: 2rem 1rem; max-width: 1100px; margin: 0 auto; }
        .form-card { background: var(--surface); border-radius: 16px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid var(--border); }

        .section-title { 
            color: var(--brand-dark); padding: 15px 0 10px 0; border-bottom: 1px solid var(--border);
            margin: 25px 0 20px 0; font-size: 14px; font-weight: bold; text-transform: uppercase; 
            display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px;
        }
        .section-title::before { content: ''; width: 3px; height: 15px; background: var(--brand-red); border-radius: 2px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field.span-full { grid-column: 1 / -1; }
        label { font-size: 11px; font-weight: 700; color: var(--brand-gray); text-transform: uppercase; }
        
        input, select, textarea { 
            padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; 
            font-family: Arial, sans-serif; font-size: 13px; background: #FFF; outline: none; transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--brand-red); box-shadow: 0 0 0 3px rgba(226, 75, 74, 0.1); }
        
        .highlight-box { background: #F9FAFB; border: 1px solid var(--border); padding: 18px; border-radius: var(--radius); }
        .analysis-section { border: 1px solid #FFD6D6; background: #FFF9F9; display: none; margin-top: 10px; }

        .actions { margin-top: 30px; display: flex; justify-content: flex-end; }
        .btn-save { 
            background: var(--brand-red); color: white; border: none; padding: 12px 40px; border-radius: 30px; 
            font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; font-size: 14px;
        }
        .btn-save:hover { background: #C53A39; transform: translateY(-1px); box-shadow: 0 5px 15px rgba(226, 75, 74, 0.3); }

        #toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; display: none; z-index: 1000; font-size: 13px; font-weight: bold; }
        .success { background: var(--accent); }
        .error { background: var(--brand-red); }

        #login-overlay { position: fixed; inset: 0; background: var(--brand-dark); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div style="background:#fff; border-radius:20px; padding:2.5rem; max-width:350px; width:90%; text-align:center;">
        <h2 style="font-size:18px; margin-bottom:15px;">Autenticación Requerida</h2>
        <button id="manual-login-btn" onclick="signIn()" style="display:none; width:100%; padding:12px; background:var(--brand-red); color:#fff; border:none; border-radius:30px; cursor:pointer; font-weight: bold;">Iniciar Sesión Microsoft</button>
    </div>
</div>

<header>
    <div class="header-brand"><span class="logo-badge">CAFSA</span><span style="font-size:14px; letter-spacing:1px;">REPOSITORIO TÉCNICO</span></div>
    <button id="auth-btn" onclick="signOut()"><span id="auth-label">...</span></button>
</header>

<div id="status-bar"><span id="status-text">Inicializando...</span></div>

<main>
    <div class="form-card">
        <form id="formNuevo">
            <div class="section-title">1. Identificación y Operación</div>
            <div class="grid">
                <div class="field span-full">
                    <div style="display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px dashed var(--border); border-radius: 8px; background: #fdfdfd;">
                        <input type="checkbox" id="esReferido" style="width: 16px; height: 16px; accent-color: var(--brand-red);">
                        <label style="margin:0; cursor:pointer;" for="esReferido">¿Es Referido? (AS)</label>
                    </div>
                </div>
                <div class="field"><label>Empresa (T)</label><select id="n_empresa" required><option value="">-- Seleccionar --</option><option>ARRENDADORA</option><option>FINANCIERA</option></select></div>
                <div class="field"><label>Ejecutivo (U)</label><select id="n_ejecutivo" required><option value="">-- Seleccionar --</option><option>K. Rodríguez</option><option>A. Mora</option><option>A. Valverde</option><option>B. Castro</option><option>C. Molina</option><option>C. Jiménez</option><option>D. Alvarado</option><option>D. Espinoza</option><option>D. Mora</option><option>D. Villar</option><option>D. Piña</option><option>D. Valerin</option><option>F. Badilla</option><option>F. Meza</option><option>F. Palma</option><option>I. Ureña</option><option>J. González</option><option>J. Viales</option><option>J. Martínez</option><option>J. Montero</option><option>J. Arroyo</option><option>L. Espinoza</option><option>M. Sánchez</option><option>G. Peña</option><option>R. Rodríguez</option><option>R. Porras</option><option>R. Abarca</option></select></div>
                <div class="field"><label>Sucursal (V)</label><select id="n_sucursal" required><option value="">-- Seleccionar --</option><option>AL ESTE</option><option>AUTOMOTRIZ CURRIDABAT</option><option>AUTOMOTRIZ ESCAZU</option><option>AUTOMOTRIZ LA URUCA</option><option>AUTOMOTRIZ LIBERIA</option><option>AUTOMOTRIZ PEREZ ZELEDON</option><option>AUTOMOTRIZ SAN CARLOS</option><option>LEXUS</option><option>XPENG</option><option>PURDY CIUDAD TOYOTA</option><option>PURDY CURRIDABAT</option><option>OTROS NEGOCIOS</option></select></div>
                <div class="field"><label>Cédula (W)</label><input type="text" id="n_cedula" placeholder="0-0000-0000"></div>
                <div class="field"><label>Cliente (X)</label><input type="text" id="n_cliente" required placeholder="Nombre completo"></div>
                <div class="field"><label>Tipo Cliente (K)</label><select id="n_tipoCliente"><option value="">-- Seleccionar --</option><option>JURIDICO</option><option>INDEPENDIENTE</option><option>ASALARIADO</option></select></div>
                <div class="field"><label>Riesgo (AH)</label><select id="n_tipoRiesgo"><option value="SIN ALERTA">SIN ALERTA</option><option value="API">API</option><option value="PEP">PEP</option><option value="APFND">APFND</option></select></div>
            </div>

            <div class="section-title">2. Datos Financieros y Garantía</div>
            <div class="highlight-box grid">
                <div class="field"><label>Moneda (Y)</label><select id="n_moneda"><option value="COLONES">COLONES</option><option value="DOLARES">DOLARES</option></select></div>
                <div class="field"><label>Monto Crédito (Z)</label><input type="number" id="n_valor" oninput="validarYCalcularPorcentaje()"></div>
                <div class="field">
                    <label>Depósito / Prima (AA)</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="number" id="n_deposito" oninput="validarYCalcularPorcentaje()" style="flex:1">
                        <span id="n_porcentaje_txt" style="font-weight: bold; color: var(--brand-red); padding: 8px; background: #fff; border-radius: 6px; border: 1px solid var(--border); font-size: 12px;">0%</span>
                    </div>
                </div>
                <div class="field"><label>Monto Garantía (AB)</label><input type="number" id="n_montoArrendar" oninput="validarYCalcularPorcentaje()"></div>
                <div class="field"><label>Marca (AD)</label><input type="text" id="n_marca"></div>
                <div class="field"><label>Modelo (AE)</label><input type="text" id="n_modelo"></div>
                <div class="field"><label>Año (AF)</label><input type="number" id="n_anio"></div>
            </div>

            <div class="section-title">4. Envío a Análisis (Hoja Secundaria)</div>
            <div class="field span-full" style="margin-bottom: 15px;">
                <div style="display: flex; align-items: center; gap: 12px; padding: 18px; background: var(--brand-dark); color: white; border-radius: 12px; cursor: pointer; transition: 0.2s;" onclick="document.getElementById('check_A').click()">
                    <input type="checkbox" id="check_A" onchange="toggleAnalisis()" style="width: 20px; height: 20px; accent-color: var(--brand-red);" onclick="event.stopPropagation()">
                    <label for="check_A" style="color: white; font-size: 13px; cursor: pointer; margin:0;">Habilitar Formulario de Análisis (AT)</label>
                </div>
            </div>

            <div id="seccionAnalisis" class="highlight-box analysis-section">
                <div class="grid">
                    <div class="field"><label>Monto Solicitud (AX)</label><input type="text" id="ana_monto_solicitud" placeholder="Ej: $1111 ó ¢11111"></div>
                    <div class="field"><label>Tipo de Vehículo (AV)</label><input type="text" id="ana_tipo_vehiculo" placeholder="Marca, estilo, año, nuevo/usado"></div>
                    <div class="field"><label>Porcentaje de Prima (AZ)</label><input type="text" id="ana_pct_prima" placeholder="10%, 20%..."></div>
                    
                    <div class="field"><label>Nivel de Aprobación (BA)</label>
                        <select id="ana_nivel_aprobacion">
                            <option value="">-- Seleccionar --</option>
                            <option>Comité de Crédito</option>
                            <option>Comité Ejecutivo</option>
                            <option>Gerencia General</option>
                            <option>Gerencia de Crédito</option>
                        </select>
                    </div>

                    <div class="field"><label>Tipo de Operación (BB)</label>
                        <select id="ana_tipo_operacion">
                            <option value="">-- Seleccionar --</option>
                            <option>Arrendamiento</option>
                            <option>Financiamiento</option>
                            <option>Línea</option>
                            <option>Tarjeta</option>
                            <option>Marchamo</option>
                        </select>
                    </div>

                    <div class="field"><label>Gestión (BC)</label>
                        <select id="ana_gestion">
                            <option value="">-- Seleccionar --</option>
                            <option>Incremento</option>
                            <option>Nuevo</option>
                            <option>Renovación</option>
                            <option>Renovación e incremento</option>
                            <option>Seguimiento</option>
                        </select>
                    </div>

                    <div class="field span-full"><label>Tasa fija y variable (BD)</label>
                        <textarea id="ana_tasa_detalle" rows="2" placeholder="Detalle: tasa fijo primeros X años, posterior tasa de X..."></textarea>
                    </div>

                    <div class="field"><label>Plazo en meses (BE)</label><input type="number" id="ana_plazo"></div>
                    <div class="field"><label>Ejecutivo y Contacto (BF)</label><input type="text" id="ana_contacto_ejecutivo" placeholder="Nombre y Teléfono"></div>
                    <div class="field"><label>Exposición (BG)</label><input type="text" id="ana_exposicion" placeholder="Individual, GIE, Total"></div>
                    <div class="field span-full"><label>Comentarios Adicionales (BH)</label><textarea id="ana_comentarios" rows="2"></textarea></div>
                    <div class="field"><label>Archivos ZIP (BI)</label><input type="text" id="ana_zip_name" placeholder="Nombre de carpeta ZIP"></div>
                    <div class="field"><label>Origen de Fondos (BJ)</label><input type="text" id="ana_origen_fondos" placeholder="Ej: entrega vehículo placa #, ahorros..."></div>
                </div>
            </div>

            <div class="actions">
                <button type="button" id="btnGuardar" class="btn-save" onclick="guardarNuevo()">
                    <div class="spinner" id="btnSpinner"></div>
                    <span id="btnText">Registrar en Sistema</span>
                </button>
            </div>
        </form>
    </div>
</main>

<div id="toast"></div>

<script>
// CONFIGURACIÓN MSAL Y EXCEL (Mantener tus IDs originales)
const msalConfig = {
    auth: {
        clientId: "330765a8-2c56-4eca-bce2-f418eb1cdaf0",
        authority: "https://login.microsoftonline.com/8fe4234f-a041-4848-a8c7-ebe2442403da",
        redirectUri: "https://mhernandez-cafsa.github.io/formulario-cafsa/"
    },
    cache: { cacheLocation: "sessionStorage" }
};

const EXCEL_CONFIG = {
    driveUrl: "/sites/financieracafsasa.sharepoint.com:/sites/RepositoriodeCasos:/drive",
    fileName: "Casos en trámite.xlsx",
    sheetPrincipal: "Casos",
    sheetAnalisis: "Casos Para Análisis"
};

let msalInstance, accessToken, currentUser, fileId, driveId, nextRowPrincipal = 0, nextRowAnalisis = 0;

// INICIALIZACIÓN
async function init() {
    msalInstance = new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();
    try {
        const response = await msalInstance.handleRedirectPromise();
        if (response) {
            accessToken = response.accessToken;
            currentUser = response.account;
            onAuthenticated();
        } else {
            const accounts = msalInstance.getAllAccounts();
            if (accounts.length > 0) {
                const silent = await msalInstance.acquireTokenSilent({
                    scopes: ["Files.ReadWrite.All", "Sites.ReadWrite.All"],
                    account: accounts[0]
                });
                accessToken = silent.accessToken;
                currentUser = accounts[0];
                onAuthenticated();
            } else {
                document.getElementById("manual-login-btn").style.display = "block";
            }
        }
    } catch (e) {
        document.getElementById("manual-login-btn").style.display = "block";
    }
}

async function onAuthenticated() {
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("auth-label").innerText = currentUser.name;
    document.getElementById("status-bar").style.display = "flex";
    
    try {
        const driveRes = await graphCall(EXCEL_CONFIG.driveUrl);
        driveId = driveRes.id;
        const search = await graphCall(`/drives/${driveId}/root/search(q='${EXCEL_CONFIG.fileName}')`);
        const file = search.value.find(f => f.name === EXCEL_CONFIG.fileName);
        fileId = file.id;

        const rangeP = await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${EXCEL_CONFIG.sheetPrincipal}/usedRange`);
        nextRowPrincipal = rangeP.rowCount + 1;
        
        const rangeA = await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${EXCEL_CONFIG.sheetAnalisis}/usedRange`);
        nextRowAnalisis = rangeA.rowCount + 1;

        document.getElementById("status-text").innerText = "Sincronizado con SharePoint Online";
    } catch (e) {
        showToast("Error de conexión", "error");
    }
}

function toggleAnalisis() {
    const isChecked = document.getElementById("check_A").checked;
    document.getElementById("seccionAnalisis").style.display = isChecked ? "block" : "none";
}

async function graphCall(endpoint, method = "GET", body = null) {
    const headers = new Headers();
    headers.append("Authorization", `Bearer ${accessToken}`);
    headers.append("Content-Type", "application/json");
    const options = { method, headers };
    if (body) options.body = JSON.stringify(body);
    const response = await fetch(`https://graph.microsoft.com/v1.0${endpoint}`, options);
    return response.json();
}

function validarYCalcularPorcentaje() {
    const deposito = parseFloat(document.getElementById("n_deposito").value) || 0;
    const montoG = parseFloat(document.getElementById("n_montoArrendar").value) || 0;
    if (montoG > 0) document.getElementById("n_porcentaje_txt").innerText = ((deposito / montoG) * 100).toFixed(1) + "%";
}

// GUARDADO CON NUEVO MAPEO DE COLUMNAS
async function guardarNuevo() {
    const btn = document.getElementById("btnGuardar");
    btn.disabled = true;
    document.getElementById("btnSpinner").style.display = "block";

    try {
        const now = new Date();
        const timestamp = now.toLocaleString(); // AU: Marca temporal
        const idUnico = now.toISOString().split('T')[0].replace(/-/g, '') + now.getHours() + now.getMinutes() + now.getSeconds();
        
        const nombreCliente = document.getElementById("n_cliente").value; // Replicado en AV
        const cedulaCliente = document.getElementById("n_cedula").value; // Replicado en AW
        const enviadoAnalisis = document.getElementById("check_A").checked ? "SI" : "NO";

        // Mapeo Principal hasta BJ
        const rowData = [[
            idUnico, // A
            "", "", "", "", "", "", "", "", "", // B - J
            document.getElementById("n_tipoCliente").value, // K
            "", "", "", "", "", "", "", // L - R
            document.getElementById("n_empresa").value, // S
            document.getElementById("n_ejecutivo").value, // T
            document.getElementById("n_sucursal").value, // U
            cedulaCliente, // V
            nombreCliente, // W
            document.getElementById("n_moneda").value, // X
            document.getElementById("n_valor").value, // Y
            document.getElementById("n_deposito").value, // Z
            document.getElementById("n_montoArrendar").value, // AA
            "1", // AB (Q Unidades)
            document.getElementById("n_marca").value, // AC
            document.getElementById("n_modelo").value, // AD
            document.getElementById("n_anio").value, // AE
            "", // AF (Vendedor)
            document.getElementById("n_tipoRiesgo").value, // AG
            "ACTIVO", // AH
            "", "", "", "", "", "", "", "", "", "", // AI - AR
            "", // AS
            enviadoAnalisis, // AT: Check_A
            timestamp, // AU: Marca Temporal
            nombreCliente, // AV: Replicado
            cedulaCliente, // AW: Replicado
            document.getElementById("ana_monto_solicitud").value, // AX
            document.getElementById("ana_tipo_vehiculo").value, // AV (Columna AV según instrucción, asumiendo error de dedo y es la siguiente libre)
            document.getElementById("ana_pct_prima").value, // AZ
            document.getElementById("ana_nivel_aprobacion").value, // BA
            document.getElementById("ana_tipo_operacion").value, // BB
            document.getElementById("ana_gestion").value, // BC
            document.getElementById("ana_tasa_detalle").value, // BD
            document.getElementById("ana_plazo").value, // BE
            document.getElementById("ana_contacto_ejecutivo").value, // BF
            document.getElementById("ana_exposicion").value, // BG
            document.getElementById("ana_comentarios").value, // BH
            document.getElementById("ana_zip_name").value, // BI
            document.getElementById("ana_origen_fondos").value // BJ
        ]];

        // 1. Guardar en Hoja Principal
        const addrP = `${EXCEL_CONFIG.sheetPrincipal}!A${nextRowPrincipal}:BJ${nextRowPrincipal}`;
        await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${EXCEL_CONFIG.sheetPrincipal}/range(address='${addrP}')`, "PATCH", { values: rowData });

        // 2. Si es Análisis, duplicar en la otra hoja
        if (enviadoAnalisis === "SI") {
            const addrA = `${EXCEL_CONFIG.sheetAnalisis}!A${nextRowAnalisis}:BJ${nextRowAnalisis}`;
            await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${EXCEL_CONFIG.sheetAnalisis}/range(address='${addrA}')`, "PATCH", { values: rowData });
            nextRowAnalisis++;
        }

        showToast("✓ Registro guardado correctamente", "success");
        document.getElementById("formNuevo").reset();
        toggleAnalisis();
        nextRowPrincipal++;
    } catch (e) {
        showToast("Error: " + e.message, "error");
    } finally {
        btn.disabled = false;
        document.getElementById("btnSpinner").style.display = "none";
    }
}

function showToast(msg, type) {
    const t = document.getElementById("toast");
    t.innerText = msg; t.className = type; t.style.display = "block";
    setTimeout(() => t.style.display = "none", 3000);
}

async function signIn() { await msalInstance.loginRedirect({ scopes: ["Files.ReadWrite.All", "Sites.ReadWrite.All"] }); }
async function signOut() { await msalInstance.logoutRedirect(); }

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
