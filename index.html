<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Casos — CAFSA</title>
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.js"></script>
    <style>
        /* Tipografía más técnica y moderna para Apps */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@500&display=swap');
        
        :root {
            --brand-red: #E24B4A;
            --brand-dark: #1A1C1E; /* Gris más profundo */
            --brand-gray: #64748B; /* Gris azulado técnico */
            --brand-light: #F8FAFC;
            --accent: #0F172A;
            --text-primary: #1E293B;
            --border: #E2E8F0;
            --surface: #ffffff;
            --radius: 14px;
            --bg-app: #F1F5F9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-app); color: var(--text-primary); line-height: 1.5; }
        
        header { 
            background: var(--brand-dark); 
            padding: 0 2rem; 
            height: 70px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            color: white; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            border-bottom: 3px solid var(--brand-red);
        }
        .logo-badge { 
            background: var(--brand-red); 
            padding: 6px 14px; 
            border-radius: 6px; 
            font-family: 'JetBrains Mono'; 
            font-weight: bold;
            margin-right: 12px; 
            font-size: 14px;
        }
        #auth-btn { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.2); 
            color: white; 
            padding: 8px 18px; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.3s;
            font-size: 13px;
            font-weight: 600;
        }
        #auth-btn:hover { background: rgba(255,255,255,0.15); }
        
        #status-bar { 
            background: white; 
            padding: 8px 2rem; 
            font-size: 12px; 
            color: var(--brand-gray); 
            border-bottom: 1px solid var(--border); 
            display: none; 
            align-items: center; 
            gap: 10px; 
        }
        
        main { padding: 2rem 1rem; max-width: 1100px; margin: 0 auto; }
        
        .form-card { 
            background: var(--surface); 
            border-radius: 24px; 
            padding: 3rem; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
        }

        .section-title { 
            color: var(--accent); 
            padding: 0 0 12px 0;
            border-bottom: 1px solid var(--border);
            margin: 40px 0 25px 0; 
            font-size: 15px; 
            font-weight: 700;
            text-transform: uppercase; 
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-title:first-of-type { margin-top: 0; }
        .section-title::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--brand-red);
            border-radius: 50%;
        }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        .field.span-full { grid-column: 1 / -1; }
        
        label { font-size: 11px; font-weight: 700; color: var(--brand-gray); text-transform: uppercase; }
        
        input, select, textarea { 
            padding: 12px 16px; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            font-family: inherit; 
            font-size: 14px; 
            background: #FDFDFD; 
            outline: none; 
            transition: all 0.2s ease;
            color: var(--text-primary);
        }
        input:focus, select:focus { 
            border-color: var(--brand-red); 
            background: white;
            box-shadow: 0 0 0 4px rgba(226, 75, 74, 0.08);
        }
        
        .referido-box {
            display: flex; align-items: center; gap: 15px; 
            padding: 18px; border: 1px solid var(--border); 
            border-radius: var(--radius); background: var(--brand-light);
        }

        .financiero-highlight {
            background: #F8FAFC;
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 18px;
        }

        /* Estilo para Sección 4 colapsable */
        #seccion4_content { display: none; margin-top: 20px; }
        #check_s4:checked ~ #seccion4_content { display: block; }

        .replica-field { background: #F1F5F9; color: #64748B; font-weight: 600; cursor: not-allowed; }
        
        .actions { margin-top: 50px; display: flex; justify-content: flex-end; }
        
        .btn-save { 
            background: var(--brand-dark); 
            color: white; 
            border: none; 
            padding: 16px 45px; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 15px;
            cursor: pointer; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 12px;
        }
        .btn-save:hover { background: #000; transform: translateY(-2px); }
        .btn-save:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }
        
        #toast { position: fixed; bottom: 30px; right: 30px; padding: 18px 30px; border-radius: 12px; color: white; display: none; z-index: 1000; font-weight: 600; animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .success { background: #10B981; }
        .error { background: var(--brand-red); }

        #login-overlay { position: fixed; inset: 0; background: var(--brand-dark); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .login-card { background:#fff; border-radius: 28px; padding: 4rem 3rem; max-width: 420px; width: 90%; text-align: center; }
        
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <div style="font-size: 48px; margin-bottom: 24px;">🏦</div>
        <h2 id="overlay-title" style="margin-bottom: 12px; color: var(--brand-dark); font-weight: 800;">CAFSA Core</h2>
        <p id="overlay-msg" style="margin-bottom: 32px; color: var(--brand-gray); font-size: 14px;">Autenticación corporativa requerida para acceso al repositorio.</p>
        <button id="manual-login-btn" onclick="signIn()" style="display:none; width:100%; padding:16px; background:var(--brand-red); color:#fff; border:none; border-radius:12px; cursor:pointer; font-family: inherit; font-weight: 700; font-size: 15px;">Acceder con Microsoft 365</button>
    </div>
</div>

<header>
    <div class="header-brand"><span class="logo-badge">CAFSA</span><strong style="letter-spacing: 0.5px; font-size: 15px;">Repositorio de Casos</strong></div>
    <button id="auth-btn" onclick="signOut()"><span id="auth-label">Conectando...</span></button>
</header>

<div id="status-bar">
    <div style="width: 8px; height: 8px; background: #10B981; border-radius: 50%;"></div>
    <span id="status-text">Iniciando sistema...</span>
</div>

<main>
    <div class="form-card">
        <form id="formNuevo">
            <div class="section-title">1. Cliente y Operación</div>
            <div class="grid">
                <div class="field span-full">
                    <label>¿ES REFERIDO? (AS)</label>
                    <div class="referido-box">
                        <input type="checkbox" id="esReferido" style="width: 20px; height: 20px; accent-color: var(--brand-red);">
                        <span style="font-weight: 600; font-size: 13px; color: var(--accent);">Marcar si el cliente es una referencia</span>
                    </div>
                </div>
                <div class="field"><label>Empresa (T)</label><select id="n_empresa" required><option value="">-- Seleccionar --</option><option>ARRENDADORA</option><option>FINANCIERA</option></select></div>
                <div class="field"><label>Ejecutivo (U)</label><select id="n_ejecutivo" required><option value="">-- Seleccionar --</option><option>K. Rodríguez</option><option>A. Mora</option><option>A. Valverde</option><option>B. Castro</option><option>C. Molina</option><option>C. Jiménez</option><option>D. Alvarado</option><option>D. Espinoza</option><option>D. Mora</option><option>D. Villar</option><option>D. Piña</option><option>D. Valerin</option><option>F. Badilla</option><option>F. Meza</option><option>F. Palma</option><option>I. Ureña</option><option>J. González</option><option>J. Viales</option><option>J. Martínez</option><option>J. Montero</option><option>J. Arroyo</option><option>L. Espinoza</option><option>M. Sánchez</option><option>G. Peña</option><option>R. Rodríguez</option><option>R. Porras</option><option>R. Abarca</option></select></div>
                <div class="field"><label>Sucursal (V)</label><select id="n_sucursal" required><option value="">-- Seleccionar --</option><option>AL ESTE</option><option>AUTOMOTRIZ CURRIDABAT</option><option>AUTOMOTRIZ ESCAZU</option><option>AUTOMOTRIZ LA URUCA</option><option>AUTOMOTRIZ LIBERIA</option><option>AUTOMOTRIZ PEREZ ZELEDON</option><option>AUTOMOTRIZ SAN CARLOS</option><option>LEXUS</option><option>XPENG</option><option>PURDY CIUDAD TOYOTA</option><option>PURDY CURRIDABAT</option><option>OTROS NEGOCIOS</option></select></div>
                <div class="field"><label>Cédula (W)</label><input type="text" id="n_cedula" oninput="syncS4()" placeholder="0-0000-0000"></div>
                <div class="field"><label>Cliente (X)</label><input type="text" id="n_cliente" oninput="syncS4()" required placeholder="Nombre completo"></div>
                <div class="field"><label>Tipo Cliente (K)</label><select id="n_tipoCliente"><option value="">-- Seleccionar --</option><option>JURIDICO</option><option>INDEPENDIENTE</option><option>ASALARIADO</option></select></div>
                <div class="field"><label>Riesgo (AH)</label><select id="n_tipoRiesgo"><option value="SIN ALERTA">SIN ALERTA</option><option value="API">API</option><option value="PEP">PEP</option><option value="APFND">APFND</option></select></div>
                <div class="field"><label>Cliente–Garantía (E)</label><select id="n_clienteGarantia"><option value="">-- Seleccionar --</option><option>LISTA</option><option>SIN EMPEZAR</option></select></div>
                <div class="field"><label>¿Se Cancela? (G)</label><select id="n_siCancela"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div class="field"><label>¿Es de WF? (J)</label><select id="n_esWF"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div class="field"><label># OP Cancelada (H)</label><input type="text" id="n_operacion"></div>
            </div>

            <div class="section-title">2. Garantía y Financiero</div>
            <div class="financiero-highlight">
                <div class="grid">
                    <div class="field"><label>Moneda (Y)</label><select id="n_moneda"><option value="COLONES">COLONES</option><option value="DOLARES">DOLARES</option></select></div>
                    <div class="field"><label>Monto Crédito (Z)</label><input type="number" id="n_valor" oninput="validarYCalcularPorcentaje()" placeholder="0.00"></div>
                    <div class="field">
                        <label>Depósito / Prima (AA)</label>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="number" id="n_deposito" placeholder="0.00" oninput="validarYCalcularPorcentaje()" style="flex: 1;">
                            <span id="n_porcentaje_txt" style="font-weight: 800; color: var(--brand-red); min-width: 50px; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid var(--border); text-align: center;">0%</span>
                        </div>
                    </div>
                    <div class="field"><label>Monto Garantía (AB)</label><input type="number" id="n_montoArrendar" oninput="validarYCalcularPorcentaje()" placeholder="0.00"></div>
                    <div class="field"><label>Ingreso Depósito (AJ)</label><select id="n_ingresoDeposito" onchange="toggleCamposAmbas()"><option value="">-- Seleccionar --</option><option value="Entra por CAFSA">Entra por CAFSA</option><option value="Entra por Agencia">Entra por Agencia</option><option value="Entra por Ambas">Entra por Ambas</option></select></div>
                    
                    <div id="contenedorAmbas" class="field span-full" style="display: none; background: #fff; padding: 20px; border-radius: 12px; border: 1px solid var(--border);">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="field"><label>Monto en Agencia (AM)</label><input type="number" id="n_montoAgencia" placeholder="0"></div>
                            <div class="field"><label>Monto en CAFSA (AN)</label><input type="number" id="n_montoCafsa" placeholder="0"></div>
                        </div>
                    </div>

                    <div class="field"><label>Unidades (AC)</label><input type="number" id="n_qUnidades" value="1"></div>
                    <div class="field"><label>Marca (AD)</label><input type="text" id="n_marca"></div>
                    <div class="field"><label>Modelo (AE)</label><input type="text" id="n_modelo"></div>
                    <div class="field"><label>Año (AF)</label><input type="number" id="n_anio" placeholder="2024"></div>
                    <div class="field"><label>Vendedor (AG)</label><input type="text" id="n_vendedor"></div>
                </div>
            </div>

            <div class="section-title">3. Estado de Operación</div>
            <div class="grid">
                <div class="field"><label>Estado Principal (B)</label><select id="n_estado" onchange="syncS4()" required><option value="">-- Seleccionar --</option><option>Aprobado</option><option>Desembolsado</option><option>Reservado</option><option>Rechazado</option><option>En aprobación</option><option>En Estudio de Riesgo</option></select></div>
                <div class="field"><label>Producto (F)</label><select id="n_producto"><option value="">-- Seleccionar --</option><option>AOFF</option><option>AOP</option><option>RENTING</option><option>USADOS</option><option>MOTOS</option><option>PRENDARIO</option></select></div>
                <div class="field"><label>Mes (L)</label><select id="n_mes"><option>ENERO</option><option>FEBRERO</option><option>MARZO</option><option>ABRIL</option><option>MAYO</option><option>JUNIO</option><option>JULIO</option><option>AGOSTO</option><option>SEPTIEMBRE</option><option>OCTUBRE</option><option>NOVIEMBRE</option><option>DICIEMBRE</option></select></div>
                <div class="field"><label>Estado Desembolso (P)</label><select id="n_estadoDesembolso"><option value="">-- Seleccionar --</option><option>AM LISTO</option><option>REVISIÓN WF 1</option><option>SIN SOLICITAR</option></select></div>
                <div class="field"><label>OS (R)</label><select id="n_os"><option value="LISTA">LISTA</option><option value="EN TRÁMITE">EN TRÁMITE</option></select></div>
                <div class="field"><label>OC (S)</label><select id="n_oc"><option value="LISTA">LISTA</option><option value="EN TRÁMITE">EN TRÁMITE</option></select></div>
                <div class="field"><label>Fecha Entrega (C)</label><input type="date" id="n_fechaEntrega"></div>
                <div class="field"><label>F. Desembolso (M)</label><input type="date" id="n_fechaDesembolso"></div>
                <div class="field"><label>OP (N)</label><input type="text" id="n_op"></div>
                <div class="field"><label>Solicitud (O)</label><input type="text" id="n_solicitud"></div>
                <div class="field"><label>Garantía Llamado (AP)</label><input type="number" id="n_garantia_llamado"></div>
                <div class="field"><label>PV Llamado (AQ)</label><input type="number" id="n_pv_llamado"></div>
            </div>

            <div class="section-title">4. Detalles de Aprobación y Seguimiento</div>
            <div class="field span-full">
                <div class="referido-box" style="border-style: solid; background: #fff;">
                    <input type="checkbox" id="check_s4" style="width: 20px; height: 20px; accent-color: var(--brand-red);">
                    <label for="check_s4" style="margin:0; cursor:pointer;">Desplegar campos adicionales de aprobación (AT)</label>
                </div>
            </div>

            <div id="seccion4_content">
                <div class="grid" style="margin-top: 20px;">
                    <div class="field"><label>Estado Replica (AV)</label><input type="text" id="s4_estado_replica" class="replica-field" readonly></div>
                    <div class="field"><label>Nombre Cliente (AW)</label><input type="text" id="s4_nombre_replica" class="replica-field" readonly></div>
                    <div class="field"><label>Cédula Cliente (AX)</label><input type="text" id="s4_cedula_replica" class="replica-field" readonly></div>
                    
                    <div class="field"><label>Monto Solicitud (AY)</label><input type="text" id="s4_monto_solicitud" placeholder="$ ó ¢ 0.00"></div>
                    <div class="field"><label>Tipo Vehículo (AZ)</label><input type="text" id="s4_tipo_vehiculo" placeholder="Marca, estilo, año, estado"></div>
                    <div class="field"><label>Porcentaje Prima (BA)</label><input type="text" id="s4_porc_prima" placeholder="10%"></div>
                    
                    <div class="field"><label>Nivel de Aprobación (BA)</label>
                        <select id="s4_nivel_aprobacion">
                            <option value="">-- Seleccionar --</option>
                            <option>Comité de Crédito</option>
                            <option>Comité Ejecutivo</option>
                            <option>Gerencia General</option>
                            <option>Gerencia de Crédito</option>
                        </select>
                    </div>

                    <div class="field"><label>Tipo de Operación (BB)</label>
                        <select id="s4_tipo_operacion">
                            <option value="">-- Seleccionar --</option>
                            <option>Arrendamiento</option>
                            <option>Financiamiento</option>
                            <option>Línea</option>
                            <option>Tarjeta</option>
                            <option>Marchamo</option>
                        </select>
                    </div>

                    <div class="field"><label>Gestión (BC)</label>
                        <select id="s4_gestion">
                            <option value="">-- Seleccionar --</option>
                            <option>Incremento</option>
                            <option>Nuevo</option>
                            <option>Renovación</option>
                            <option>Renovación e incremento</option>
                            <option>Seguimiento</option>
                        </select>
                    </div>

                    <div class="field span-full"><label>Tasa Fija y Variable (BD)</label>
                        <textarea id="s4_tasas" rows="2" placeholder="Detalle: Tasa fija los primeros X años de, posterior tasa de X"></textarea>
                    </div>

                    <div class="field"><label>Plazo (Meses) (BE)</label><input type="number" id="s4_plazo"></div>
                    <div class="field"><label>Ejecutivo y Contacto (BF)</label><input type="text" id="s4_ejecutivo_contacto"></div>
                    <div class="field"><label>Exposición (BG)</label><input type="text" id="s4_exposicion" placeholder="Individual, GIE, Total"></div>
                    
                    <div class="field"><label>Origen de Fondos (BJ)</label>
                        <select id="s4_origen_fondos">
                            <option value="">-- Seleccionar --</option>
                            <option>Entrega vehículo</option>
                            <option>Ahorros</option>
                            <option>Fondos propios</option>
                            <option>Otros</option>
                        </select>
                    </div>

                    <div class="field span-full"><label>Comentarios Adicionales (BH)</label><textarea id="s4_comentarios" rows="2"></textarea></div>
                    <div class="field span-full"><label>Archivos del Caso (BI)</label><input type="text" id="s4_archivos" placeholder="Nombre de archivos en ZIP"></div>
                </div>
            </div>

            <div class="actions">
                <button type="button" id="btnGuardar" class="btn-save" onclick="guardarNuevo()">
                    <div class="spinner" id="btnSpinner"></div>
                    <span id="btnText">Finalizar Registro</span>
                </button>
            </div>
        </form>
    </div>
</main>

<div id="toast"></div>

<script>
// CONFIGURACIÓN MSAL
const msalConfig = {
    auth: {
        clientId: "330765a8-2c56-4eca-bce2-f418eb1cdaf0",
        authority: "https://login.microsoftonline.com/8fe4234f-a041-4848-a8c7-ebe2442403da",
        redirectUri: "https://mhernandez-cafsa.github.io/formulario-cafsa/"
    },
    cache: { cacheLocation: "sessionStorage" }
};

const EXCEL_CONFIG = {
    driveUrl: "/sites/financieracafsasa.sharepoint.com:/sites/RepositoriodeCasos:/drive",
    fileName: "Casos en trámite.xlsx",
    sheetName: "Casos"
};

let msalInstance, accessToken, currentUser, fileId, driveId, nextRow = 0;

// Sincronización de campos réplica en S4
function syncS4() {
    document.getElementById('s4_estado_replica').value = document.getElementById('n_estado').value;
    document.getElementById('s4_nombre_replica').value = document.getElementById('n_cliente').value;
    document.getElementById('s4_cedula_replica').value = document.getElementById('n_cedula').value;
}

async function init() {
    msalInstance = new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();
    
    try {
        const response = await msalInstance.handleRedirectPromise();
        if (response) {
            accessToken = response.accessToken;
            currentUser = response.account;
            onAuthenticated();
        } else {
            const accounts = msalInstance.getAllAccounts();
            if (accounts.length > 0) {
                const silent = await msalInstance.acquireTokenSilent({
                    scopes: ["Files.ReadWrite.All", "Sites.ReadWrite.All"],
                    account: accounts[0]
                });
                accessToken = silent.accessToken;
                currentUser = accounts[0];
                onAuthenticated();
            } else {
                document.getElementById("manual-login-btn").style.display = "block";
            }
        }
    } catch (e) {
        console.error(e);
        document.getElementById("manual-login-btn").style.display = "block";
    }
}

async function signIn() { await msalInstance.loginRedirect({ scopes: ["Files.ReadWrite.All", "Sites.ReadWrite.All"] }); }
async function signOut() { await msalInstance.logoutRedirect(); }

async function onAuthenticated() {
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("auth-label").innerText = currentUser.name;
    document.getElementById("status-bar").style.display = "flex";
    document.getElementById("status-text").innerText = "Buscando archivo Excel...";
    
    try {
        const driveRes = await graphCall(EXCEL_CONFIG.driveUrl);
        driveId = driveRes.id;
        const search = await graphCall(`/drives/${driveId}/root/search(q='${EXCEL_CONFIG.fileName}')`);
        const file = search.value.find(f => f.name === EXCEL_CONFIG.fileName);
        if (!file) throw new Error("No se encontró el archivo");
        fileId = file.id;
        const range = await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${EXCEL_CONFIG.sheetName}/usedRange`);
        nextRow = range.rowCount + 1;
        document.getElementById("status-text").innerText = "Conectado. Próxima fila: " + nextRow;
    } catch (e) {
        showToast("Error de conexión con SharePoint", "error");
        document.getElementById("status-text").innerText = "Error al conectar con Excel.";
    }
}

async function graphCall(endpoint, method = "GET", body = null) {
    const headers = new Headers();
    headers.append("Authorization", `Bearer ${accessToken}`);
    headers.append("Content-Type", "application/json");
    const options = { method, headers };
    if (body) options.body = JSON.stringify(body);
    const response = await fetch(`https://graph.microsoft.com/v1.0${endpoint}`, options);
    if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error.message);
    }
    return response.json();
}

function toggleCamposAmbas() {
    const val = document.getElementById("n_ingresoDeposito").value;
    document.getElementById("contenedorAmbas").style.display = (val === "Entra por Ambas") ? "block" : "none";
}

function validarYCalcularPorcentaje() {
    const deposito = parseFloat(document.getElementById("n_deposito").value) || 0;
    const montoG = parseFloat(document.getElementById("n_montoArrendar").value) || 0;
    if (montoG > 0) {
        const porc = ((deposito / montoG) * 100).toFixed(1);
        document.getElementById("n_porcentaje_txt").innerText = porc + "%";
    }
}

async function guardarNuevo() {
    if (!accessToken || !fileId) {
        showToast("Error: No hay conexión con Excel", "error");
        return;
    }
    const btn = document.getElementById("btnGuardar");
    const spinner = document.getElementById("btnSpinner");
    const btnText = document.getElementById("btnText");
    btn.disabled = true;
    spinner.style.display = "block";
    btnText.innerText = "Procesando...";

    try {
        const idUnico = "ID-" + new Date().getTime();
        const timestamp = new Date().toLocaleString();
        const moneda = document.getElementById("n_moneda").value;
        const valor = parseFloat(document.getElementById("n_valor").value) || 0;
        const conversion = (moneda === "COLONES") ? (valor / 525).toFixed(2) : valor; 
        const deposito = parseFloat(document.getElementById("n_deposito").value) || 0;
        const montoG = parseFloat(document.getElementById("n_montoArrendar").value) || 0;

        const referido = document.getElementById("esReferido").checked ? "SI" : "NO";
        const s4_activo = document.getElementById("check_s4").checked ? "SI" : "NO";

        const rowData = [[

            document.getElementById("n_operacion").value, // H
            "", // I
            document.getElementById("n_esWF").value, // J
            document.getElementById("n_tipoCliente").value, // K
            document.getElementById("n_mes").value, // L
            document.getElementById("n_fechaDesembolso").value, // M
            document.getElementById("n_op").value, // N
            document.getElementById("n_solicitud").value, // O
            document.getElementById("n_estadoDesembolso").value, // P

            document.getElementById("n_os").value, // R

            document.getElementById("n_empresa").value, // T
            document.getElementById("n_ejecutivo").value, // U
            document.getElementById("n_sucursal").value, // V
            document.getElementById("n_cedula").value, // W
            document.getElementById("n_cliente").value, // X
            moneda, // Y
            valor, // Z
            deposito, // AA
            montoG, // AB
            document.getElementById("n_qUnidades").value, // AC
            document.getElementById("n_marca").value, // AD
            document.getElementById("n_modelo").value, // AE

            document.getElementById("n_montoCafsa").value, // AN
            porcentajeFormula, // AO
            document.getElementById("n_garantia_llamado").value, // AP
            document.getElementById("n_pv_llamado").value, // AQ
            currentUser.name, // AR
            referido, // AS
            s4_activo, // AT (Check S4)
            timestamp, // AU (Marca temporal)
            document.getElementById("n_estado").value, // AV (Replica AR/B)
            document.getElementById("n_cliente").value, // AW (Replica X)

            document.getElementById("s4_nivel_aprobacion").value, // BA (Nota: Se guarda en BA según instrucción)
            document.getElementById("s4_tipo_operacion").value, // BB
            document.getElementById("s4_gestion").value, // BC
            document.getElementById("s4_tasas").value, // BD

            document.getElementById("s4_ejecutivo_contacto").value, // BF

            document.getElementById("s4_origen_fondos").value // BJ
        ]];

        const address = `${EXCEL_CONFIG.sheetName}!A${nextRow}:BJ${nextRow}`;
        await graphCall(`/drives/${driveId}/items/${fileId}/workbook/worksheets/${EXCEL_CONFIG.sheetName}/range(address='${address}')`, "PATCH", {
            values: rowData
        });
        showToast("✓ Registro guardado correctamente", "success");
        document.getElementById("formNuevo").reset();
        document.getElementById("n_porcentaje_txt").innerText = "0%";

    } catch (e) {

        showToast("Error al guardar: " + e.message, "error");
    } finally {
        btn.disabled = false;
        spinner.style.display = "none";
        btnText.innerText = "Finalizar Registro";
    }

function showToast(msg, type) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.className = type;
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 4000);
}
document.addEventListener("DOMContentLoaded", init);
