<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Casos — CAFSA</title>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #0F4C81;
    --brand-light: #E6F1FB;
    --brand-mid: #378ADD;
    --accent: #1D9E75;
    --danger: #E24B4A;
    --text-primary: #1a1a1a;
    --text-secondary: #5F5E5A;
    --border: rgba(0,0,0,0.12);
    --surface: #ffffff;
    --surface-2: #F8F9FB;
    --radius: 10px;
    --radius-lg: 16px;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--surface-2);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--brand);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-brand { display: flex; align-items: center; gap: 12px; }
  .logo-badge { width: 34px; height: 34px; background: rgba(255,255,255,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 13px; color: #fff; }
  .header-title { font-size: 15px; font-weight: 600; color: #fff; }

  #auth-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }

  .auth-dot { width: 8px; height: 8px; border-radius: 50%; background: #9FE1CB; display: inline-block; margin-right: 5px; }
  .auth-dot.disconnected { background: #F5C4B3; }

  /* STATUS BAR */
  #status-bar {
    background: var(--brand-light);
    border-bottom: 1px solid rgba(55,138,221,0.2);
    padding: 8px 2rem;
    font-size: 12.5px;
    color: var(--brand);
    display: none;
  }

  /* MAIN LAYOUT */
  main { flex: 1; padding: 2rem; max-width: 900px; margin: 0 auto; width: 100%; }
  .page-heading { margin-bottom: 2rem; }
  .page-heading h1 { font-size: 26px; font-weight: 700; }

  /* FORM */
  .form-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; }
  .section-header { padding: 1.25rem 1.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: #fafafa; }
  .section-number { width: 24px; height: 24px; border-radius: 50%; background: var(--brand); color: #fff; font-size: 11px; display: flex; align-items: center; justify-content: center; }
  
  .form-grid { padding: 1.5rem 1.75rem; display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.25rem 1.5rem; }
  .cols-3 { grid-template-columns: repeat(3, 1fr); }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .span-all { grid-column: 1 / -1; }

  label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); }
  input, select, textarea { 
    padding: 10px; border: 1px solid var(--border); border-radius: var(--radius); font-family: inherit; font-size: 14px;
  }

  .form-actions { padding: 1.5rem 1.75rem; display: flex; justify-content: flex-end; gap: 1rem; border-top: 1px solid var(--border); }
  .btn-submit { background: var(--brand); color: white; border: none; padding: 12px 24px; border-radius: var(--radius); font-weight: 600; cursor: pointer; }
  .btn-submit:disabled { opacity: 0.5; }

  /* OVERLAY */
  #login-overlay { position: fixed; inset: 0; background: rgba(15,76,129,0.95); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .login-card { background: #fff; border-radius: 20px; padding: 2.5rem; text-align: center; max-width: 400px; }
  .ms-logo { width: 40px; height: 40px; margin: 0 auto 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
  .ms-logo div:nth-child(1) { background: #f25022; } .ms-logo div:nth-child(2) { background: #7fbba0; }
  .ms-logo div:nth-child(3) { background: #00a4ef; } .ms-logo div:nth-child(4) { background: #ffb900; }

  #toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; display: none; z-index: 1000; }
  .error { background: var(--danger); }
  .success { background: var(--accent); }
</style>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <div class="ms-logo"><div></div><div></div><div></div><div></div></div>
    <h2>Acceso requerido</h2>
    <p style="margin: 15px 0; color: #666;">Inicia sesión para registrar datos en el SharePoint de CAFSA.</p>
    <button onclick="signIn()" style="background: #0F4C81; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%;">Iniciar sesión con Microsoft</button>
  </div>
</div>

<header>
  <div class="header-brand"><div class="logo-badge">CA</div><div class="header-title">CAFSA <span>Repositorio</span></div></div>
  <button id="auth-btn" onclick="signOut()"><span id="auth-dot" class="auth-dot disconnected"></span><span id="auth-label">Cargando...</span></button>
</header>

<div id="status-bar"><span id="status-text">Conectando...</span></div>

<main>
  <div class="page-heading">
    <h1>Nuevo Registro de Caso</h1>
    <p style="color: #666; font-size: 13px;">Archivo: Casos en trámite.xlsx</p>
  </div>

  <div class="form-card">
    <div class="section-header"><div class="section-number">1</div><h2>Detalles del Caso</h2></div>
    <div class="form-grid cols-3">
      <div class="field"><label>Fecha</label><input type="date" id="fecha"></div>
      <div class="field"><label>No. Caso</label><input type="text" id="numero_caso" placeholder="000-000"></div>
      <div class="field"><label>Estado</label><select id="estado"><option>Abierto</option><option>En trámite</option><option>Cerrado</option></select></div>
    </div>

    <div class="section-header"><div class="section-number">2</div><h2>Información Cliente</h2></div>
    <div class="form-grid">
      <div class="field"><label>Nombre Cliente</label><input type="text" id="nombre_cliente"></div>
      <div class="field"><label>Cédula</label><input type="text" id="cedula"></div>
      <div class="field span-all"><label>Descripción</label><textarea id="descripcion" rows="3"></textarea></div>
    </div>

    <div class="form-actions">
      <button class="btn-submit" id="btn-submit" onclick="submitForm()">Guardar en Excel</button>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
// --- CONFIGURACIÓN AZURE ---
const msalConfig = {
  auth: {
    clientId: "330765a8-2c56-4eca-bce2-f418eb1cdaf0", // Tu ID de la captura
    authority: "https://login.microsoftonline.com/8fe4234f-a041-4848-a8c7-ebe2442403da",
    redirectUri: "https://mhernandez-cafsa.github.io/formulario-cafsa/" // Tu URI de la captura
  },
  cache: { cacheLocation: "localStorage", storeAuthStateInCookie: true }
};

const SP_CONFIG = {
  siteUrl: "financieracafsasa.sharepoint.com:/sites/RepositoriodeCasos",
  fileName: "Casos en trámite.xlsx",
  sheetName: "Hoja1"
};

const GRAPH_SCOPES = ["Files.ReadWrite.All", "Sites.ReadWrite.All", "User.Read"];

let msalInstance = null;
let accessToken = null;
let nextRow = 2;

// --- INICIALIZACIÓN ---
async function init() {
  try {
    msalInstance = new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();
    
    // Verificar si ya hay una cuenta logueada
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      msalInstance.setActiveAccount(accounts[0]);
      await acquireToken(accounts[0]);
    } else {
      document.getElementById("auth-label").textContent = "No conectado";
    }
  } catch (e) {
    console.error(e);
    showToast("Error de inicialización: " + e.message, "error");
  }
}

async function signIn() {
  try {
    const loginResponse = await msalInstance.loginPopup({ scopes: GRAPH_SCOPES });
    msalInstance.setActiveAccount(loginResponse.account);
    await acquireToken(loginResponse.account);
  } catch (e) {
    showToast("Error de login: " + e.message, "error");
  }
}

async function acquireToken(account) {
  try {
    const res = await msalInstance.acquireTokenSilent({ scopes: GRAPH_SCOPES, account });
    accessToken = res.accessToken;
    document.getElementById("login-overlay").style.display = "none";
    updateUI(true, account.name);
    await connectToSharePoint();
  } catch (e) {
    console.warn("Token silent falló, se requiere login manual");
  }
}

// --- SHAREPOINT API ---
async function connectToSharePoint() {
  try {
    showStatus("Buscando archivo en SharePoint...");
    const site = await graphCall(`/sites/${SP_CONFIG.siteUrl}`);
    const drive = await graphCall(`/sites/${site.id}/drive`);
    SP_CONFIG.driveId = drive.id;

    const search = await graphCall(`/drives/${drive.id}/root/search(q='${SP_CONFIG.fileName}')`);
    const file = search.value?.find(f => f.name.includes(SP_CONFIG.fileName));
    
    if (!file) throw new Error("No se encontró 'Casos en trámite.xlsx'");
    SP_CONFIG.fileId = file.id;

    const range = await graphCall(`/drives/${drive.id}/items/${file.id}/workbook/worksheets/${SP_CONFIG.sheetName}/usedRange`);
    nextRow = (range.rowCount || 1) + 1;
    showStatus(`Conectado. Próxima fila: ${nextRow}`);
  } catch (e) {
    showStatus("Error de conexión: " + e.message);
  }
}

async function graphCall(endpoint, method = "GET", body = null) {
  const headers = new Headers();
  headers.append("Authorization", `Bearer ${accessToken}`);
  headers.append("Content-Type", "application/json");

  const options = { method, headers };
  if (body) options.body = JSON.stringify(body);

  const response = await fetch(`https://graph.microsoft.com/v1.0${endpoint}`, options);
  if (!response.ok) throw new Error("Error en API Graph");
  return response.json();
}

async function submitForm() {
  const btn = document.getElementById("btn-submit");
  btn.disabled = true;
  btn.textContent = "Guardando...";

  try {
    const data = [
      document.getElementById("fecha").value,
      document.getElementById("numero_caso").value,
      document.getElementById("estado").value,
      document.getElementById("nombre_cliente").value,
      document.getElementById("cedula").value,
      document.getElementById("descripcion").value,
      new Date().toLocaleString()
    ];

    const rangeAddress = `A${nextRow}:G${nextRow}`;
    await graphCall(
      `/drives/${SP_CONFIG.driveId}/items/${SP_CONFIG.fileId}/workbook/worksheets/${SP_CONFIG.sheetName}/range(address='${rangeAddress}')`,
      "PATCH",
      { values: [data] }
    );

    showToast("✓ Registrado en Excel", "success");
    nextRow++;
    document.querySelectorAll("input, textarea").forEach(i => i.value = "");
  } catch (e) {
    showToast("Error al guardar: " + e.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "Guardar en Excel";
    showStatus(`Conectado. Próxima fila: ${nextRow}`);
  }
}

// --- HELPERS ---
function updateUI(connected, name) {
  document.getElementById("auth-dot").className = connected ? "auth-dot" : "auth-dot disconnected";
  document.getElementById("auth-label").textContent = connected ? name : "No conectado";
}

function showStatus(msg) {
  const bar = document.getElementById("status-bar");
  bar.style.display = "block";
  document.getElementById("status-text").textContent = msg;
}

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = type;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 4000);
}

function signOut() {
  msalInstance.logoutPopup();
}

window.onload = init;
</script>
</body>
</html>
