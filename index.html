<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Casos — CAFSA</title>
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap');
        :root {
            --brand: #0F4C81; --brand-light: #E6F1FB; --accent: #1D9E75;
            --text-primary: #1a1a1a; --text-secondary: #5F5E5A;
            --border: #ddd; --surface: #ffffff; --surface-2: #F8F9FB;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Syne', sans-serif; background: var(--surface-2); color: var(--text-primary); }
        
        header { background: var(--brand); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; color: white; }
        .logo-badge { background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 6px; font-family: 'DM Mono'; margin-right: 10px; }
        #auth-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        
        #status-bar { background: var(--brand-light); padding: 8px 2rem; font-size: 12px; color: var(--brand); border-bottom: 1px solid #c9def1; }
        
        main { padding: 2rem; max-width: 1100px; margin: 0 auto; }
        .form-card { background: white; border-radius: 15px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .section-title { background: var(--brand); color: white; padding: 10px 15px; border-radius: 6px; margin: 20px 0 15px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field.span-full { grid-column: 1 / -1; }
        label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; background: #fff; }
        
        .actions { margin-top: 30px; text-align: right; }
        .btn-save { background: var(--brand); color: white; border: none; padding: 12px 40px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { background: #0a3a63; transform: translateY(-2px); }
        
        #toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; display: none; z-index: 1000; }
        
        /* MSAL Overlay */
        #login-overlay { position: fixed; inset: 0; background: rgba(15,76,129,0.98); display: flex; align-items: center; justify-content: center; z-index: 200; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div style="background:#fff; border-radius:20px; padding:2.5rem; max-width:380px; width:90%; text-align:center;">
        <h2 id="overlay-title">Verificando Credenciales...</h2>
        <button id="manual-login-btn" onclick="signIn()" style="display:none; width:100%; padding:12px; background:#0F4C81; color:#fff; border:none; border-radius:8px; margin-top:20px; cursor:pointer;">Iniciar Sesión con Microsoft</button>
    </div>
</div>

<header>
    <div class="header-brand"><span class="logo-badge">CA</span><strong>CAFSA Repositorio</strong></div>
    <button id="auth-btn" onclick="signOut()"><span id="auth-label">Conectando...</span></button>
</header>

<div id="status-bar"><span id="status-text">Iniciando sistema...</span></div>

<main>
    <div class="form-card">
        <form id="formNuevo">
            <div class="section-title">1. Cliente y Operación</div>
            <div class="grid">
                <div class="field span-full">
                    <label>¿ES REFERIDO? (AS)</label>
                    <div style="display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                        <input type="checkbox" id="esReferido" style="width: 20px; height: 20px;">
                        <span>Marcar si es un cliente referido</span>
                    </div>
                </div>
                <div class="field"><label>Empresa (T)</label><select id="n_empresa" required><option value="">-- Seleccionar --</option><option>ARRENDADORA</option><option>FINANCIERA</option></select></div>
                <div class="field"><label>Ejecutivo (U)</label><select id="n_ejecutivo" required><option value="">-- Seleccionar --</option><option>K. Rodríguez</option><option>A. Mora</option><option>A. Valverde</option><option>B. Castro</option><option>C. Molina</option><option>C. Jiménez</option><option>D. Alvarado</option><option>D. Espinoza</option><option>D. Mora</option><option>D. Villar</option><option>D. Piña</option><option>D. Valerin</option><option>F. Badilla</option><option>F. Meza</option><option>F. Palma</option><option>I. Ureña</option><option>J. González</option><option>J. Viales</option><option>J. Martínez</option><option>J. Montero</option><option>J. Arroyo</option><option>L. Espinoza</option><option>M. Sánchez</option><option>G. Peña</option><option>R. Rodríguez</option><option>R. Porras</option><option>R. Abarca</option></select></div>
                <div class="field"><label>Sucursal (V)</label><select id="n_sucursal" required><option value="">-- Seleccionar --</option><option>AL ESTE</option><option>AUTOMOTRIZ CURRIDABAT</option><option>AUTOMOTRIZ ESCAZU</option><option>AUTOMOTRIZ LA URUCA</option><option>AUTOMOTRIZ LIBERIA</option><option>AUTOMOTRIZ PEREZ ZELEDON</option><option>AUTOMOTRIZ SAN CARLOS</option><option>LEXUS</option><option>XPENG</option><option>PURDY CIUDAD TOYOTA</option><option>PURDY CURRIDABAT</option><option>OTROS NEGOCIOS</option></select></div>
                <div class="field"><label>Cédula (W)</label><input type="text" id="n_cedula"></div>
                <div class="field"><label>Cliente (X)</label><input type="text" id="n_cliente" required></div>
                <div class="field"><label>Tipo Cliente (K)</label><select id="n_tipoCliente"><option value="">-- Seleccionar --</option><option>JURIDICO</option><option>INDEPENDIENTE</option><option>ASALARIADO</option></select></div>
                <div class="field"><label>Riesgo (AH)</label><select id="n_tipoRiesgo"><option value="SIN ALERTA">SIN ALERTA</option><option value="API">API</option><option value="PEP">PEP</option><option value="APFND">APFND</option></select></div>
                <div class="field"><label>Cliente–Garantía (E)</label><select id="n_clienteGarantia"><option value="">-- Seleccionar --</option><option>LISTA</option><option>SIN EMPEZAR</option></select></div>
                <div class="field"><label>¿Se Cancela? (G)</label><select id="n_siCancela"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div class="field"><label>¿Es de WF? (J)</label><select id="n_esWF"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div class="field"><label># OP Cancelada (H)</label><input type="text" id="n_operacion"></div>
            </div>

            <div class="section-title">2. Garantía y Financiero</div>
            <div class="grid">
                <div class="field"><label>Moneda (Y)</label><select id="n_moneda"><option value="COLONES">COLONES</option><option value="DOLARES">DOLARES</option></select></div>
                <div class="field"><label>Monto Arrendar / Crédito (Z)</label><input type="number" id="n_valor" oninput="validarYCalcularPorcentaje()"></div>
                <div class="field">
                    <label>Depósito / Prima (AA)</label>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="number" id="n_deposito" placeholder="0.00" oninput="validarYCalcularPorcentaje()" style="flex: 1;">
                        <span id="n_porcentaje_txt" style="font-weight: bold; color: var(--brand);">0%</span>
                    </div>
                </div>
                <div class="field"><label>Monto Garantía (AB)</label><input type="number" id="n_montoArrendar" oninput="validarYCalcularPorcentaje()"></div>
                <div class="field"><label>Ingreso de Depósito (AJ)</label><select id="n_ingresoDeposito" onchange="toggleCamposAmbas()"><option value="">-- Seleccionar --</option><option value="Entra por CAFSA">Entra por CAFSA</option><option value="Entra por Agencia">Entra por Agencia</option><option value="Entra por Ambas">Entra por Ambas</option></select></div>
                
                <div id="contenedorAmbas" class="field span-full" style="display: none; background: #f4f4f4; padding: 15px; border-radius: 8px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="field"><label>Monto en Agencia (AM)</label><input type="number" id="n_montoAgencia" placeholder="0"></div>
                        <div class="field"><label>Monto en CAFSA (AN)</label><input type="number" id="n_montoCafsa" placeholder="0"></div>
                    </div>
                </div>

                <div class="field"><label>Unidades (AC)</label><input type="number" id="n_qUnidades" value="1"></div>
                <div class="field"><label>Marca (AD)</label><input type="text" id="n_marca"></div>
                <div class="field"><label>Modelo (AE)</label><input type="text" id="n_modelo"></div>
                <div class="field"><label>Año (AF)</label><input type="number" id="n_anio"></div>
                <div class="field"><label>Vendedor (AG)</label><input type="text" id="n_vendedor"></div>
            </div>

            <div class="section-title">3. Estado de Operación</div>
            <div class="grid">
                <div class="field"><label>Estado Principal (B)</label><select id="n_estado" required><option value="">-- Seleccionar --</option><option>Aprobado</option><option>Desembolsado</option><option>Reservado</option><option>Rechazado</option><option>En aprobación</option><option>En Estudio de Riesgo</option></select></div>
                <div class="field"><label>Producto (F)</label><select id="n_producto"><option value="">-- Seleccionar --</option><option>AOFF</option><option>AOP</option><option>RENTING</option><option>USADOS</option><option>MOTOS</option><option>PRENDARIO</option></select></div>
                <div class="field"><label>Mes (L)</label><select id="n_mes"><option>ENERO</option><option>FEBRERO</option><option>MARZO</option><option>ABRIL</option><option>MAYO</option><option>JUNIO</option><option>JULIO</option><option>AGOSTO</option><option>SEPTIEMBRE</option><option>OCTUBRE</option><option>NOVIEMBRE</option><option>DICIEMBRE</option></select></div>
                <div class="field"><label>Estado Desembolso (P)</label><select id="n_estadoDesembolso"><option value="">-- Seleccionar --</option><option>AM LISTO</option><option>REVISIÓN WF 1</option><option>SIN SOLICITAR</option></select></div>
                <div class="field"><label>OS (R)</label><select id="n_os"><option value="LISTA">LISTA</option><option value="EN TRÁMITE">EN TRÁMITE</option></select></div>
                <div class="field"><label>OC (S)</label><select id="n_oc"><option value="LISTA">LISTA</option><option value="EN TRÁMITE">EN TRÁMITE</option></select></div>
                <div class="field"><label>Fecha Entrega (C)</label><input type="date" id="n_fechaEntrega"></div>
                <div class="field"><label>Hora Entrega (D)</label><input type="time" id="n_horaEntrega"></div>
                <div class="field"><label>F. Desembolso (M)</label><input type="date" id="n_fechaDesembolso"></div>
                <div class="field"><label>OP (N)</label><input type="text" id="n_op"></div>
                <div class="field"><label>Solicitud (O)</label><input type="text" id="n_solicitud"></div>
                <div class="field"><label>Garantía Llamado (AP)</label><input type="number" id="n_garantia_llamado"></div>
                <div class="field"><label>PV Llamado (AQ)</label><input type="number" id="n_pv_llamado"></div>
            </div>

            <div class="actions">
                <button type="button" class="btn-save" onclick="guardarNuevo()">Guardar Registro en Excel</button>
            </div>
        </form>
    </div>
</main>

<div id="toast"></div>

<script>
// --- CONFIGURACIÓN MSAL ---
const msalConfig = {
    auth: {
        clientId: "330765a8-2c56-4eca-bce2-f418eb1cdaf0",
        authority: "https://login.microsoftonline.com/8fe4234f-a041-4848-a8c7-ebe2442403da",
        redirectUri: "https://mhernandez-cafsa.github.io/formulario-cafsa/"
    }
};

const SP_CONFIG = {
    siteUrl: "https://financieracafsasa.sharepoint.com/sites/RepositoriodeCasos",
    fileName: "Casos en trámite.xlsx",
    sheetName: "Casos"
};

let msalInstance, accessToken, currentUser;

async function initMSAL() {
    msalInstance = new msal.PublicClientApplication(msalConfig);
    const response = await msalInstance.handleRedirectPromise();
    if (response) { 
        accessToken = response.accessToken; 
        currentUser = response.account;
        finishLogin();
    } else {
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) {
            const silent = await msalInstance.acquireTokenSilent({ scopes: ["Files.ReadWrite.All"], account: accounts[0] });
            accessToken = silent.accessToken;
            currentUser = accounts[0];
            finishLogin();
        } else {
            document.getElementById("overlay-title").innerText = "Sesión requerida";
            document.getElementById("manual-login-btn").style.display = "block";
        }
    }
}

function finishLogin() {
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("auth-label").innerText = currentUser.name;
    document.getElementById("status-text").innerText = "Conectado a SharePoint";
}

async function signIn() { await msalInstance.loginRedirect({ scopes: ["Files.ReadWrite.All"] }); }
async function signOut() { msalInstance.logout(); }

// --- LÓGICA FORMULARIO ---
function toggleCamposAmbas() {
    const val = document.getElementById("n_ingresoDeposito").value;
    document.getElementById("contenedorAmbas").style.display = (val === "Entra por Ambas") ? "block" : "none";
}

function validarYCalcularPorcentaje() {
    const deposito = parseFloat(document.getElementById("n_deposito").value) || 0;
    const montoG = parseFloat(document.getElementById("n_montoArrendar").value) || 0;
    if (montoG > 0) {
        const porc = ((deposito / montoG) * 100).toFixed(1);
        document.getElementById("n_porcentaje_txt").innerText = porc + "%";
    }
}

async function guardarNuevo() {
    if (!accessToken) return alert("No hay conexión");
    
    document.getElementById("status-text").innerText = "Guardando en Excel...";
    
    const idUnico = new Date().getTime().toString();
    const moneda = document.getElementById("n_moneda").value;
    const valor = parseFloat(document.getElementById("n_valor").value) || 0;
    const conversion = (moneda === "COLONES") ? (valor / 525).toFixed(2) : valor; // TC ejemplo 525
    
    const deposito = parseFloat(document.getElementById("n_deposito").value) || 0;
    const montoG = parseFloat(document.getElementById("n_montoArrendar").value) || 0;
    const porcentajeFormula = montoG > 0 ? (deposito / montoG) : 0;
    const referido = document.getElementById("esReferido").checked ? "SI" : "NO";

    // ESTRUCTURA EXACTA 45 COLUMNAS (A-AS)
    const rowData = [
        idUnico,                                        // A: ID_UNICO
        document.getElementById("n_estado").value,      // B: Estado Principal
        document.getElementById("n_fechaEntrega").value,// C: Fecha Entrega
        document.getElementById("n_horaEntrega").value, // D: Hora Entrega
        document.getElementById("n_clienteGarantia").value, // E: Cliente-Garantía
        document.getElementById("n_producto").value,    // F: Producto
        document.getElementById("n_siCancela").value,   // G: ¿Se Cancela?
        document.getElementById("n_operacion").value,   // H: # OP Cancelada
        "",                                             // I: Comentario
        document.getElementById("n_esWF").value,        // J: ¿Es de WF?
        document.getElementById("n_tipoCliente").value, // K: Tipo Cliente
        document.getElementById("n_mes").value,         // L: Mes
        document.getElementById("n_fechaDesembolso").value, // M: F. Desembolso
        document.getElementById("n_op").value,          // N: OP
        document.getElementById("n_solicitud").value,   // O: Solicitud
        document.getElementById("n_estadoDesembolso").value, // P: Estado Desembolso
        "",                                             // Q: Q (Vacío)
        document.getElementById("n_os").value,          // R: OS
        document.getElementById("n_oc").value,          // S: OC
        document.getElementById("n_empresa").value,     // T: Empresa
        document.getElementById("n_ejecutivo").value,   // U: Ejecutivo
        document.getElementById("n_sucursal").value,    // V: Sucursal
        document.getElementById("n_cedula").value,      // W: Cédula
        document.getElementById("n_cliente").value,     // X: Cliente
        moneda,                                         // Y: Moneda
        valor,                                          // Z: Monto Arrendar
        deposito,                                       // AA: Depósito
        montoG,                                         // AB: Valor/Garantía
        document.getElementById("n_qUnidades").value,   // AC: Unidades
        document.getElementById("n_marca").value,       // AD: Marca
        document.getElementById("n_modelo").value,      // AE: Modelo
        document.getElementById("n_anio").value,        // AF: Año
        document.getElementById("n_vendedor").value,    // AG: Vendedor
        document.getElementById("n_tipoRiesgo").value,  // AH: Riesgo
        "ACTIVO",                                       // AI: Status
        document.getElementById("n_ingresoDeposito").value, // AJ: Ingreso Depósito
        "",                                             // AK: M (Vacío)
        conversion,                                     // AL: Conversión
        document.getElementById("n_montoAgencia").value,// AM: Agencia
        document.getElementById("n_montoCafsa").value,  // AN: CAFSA
        porcentajeFormula,                              // AO: %
        document.getElementById("n_garantia_llamado").value, // AP: G
        document.getElementById("n_pv_llamado").value,  // AQ: PV
        currentUser.name,                               // AR: Usuario
        referido                                        // AS: Referido
    ];

    try {
        // Lógica simplificada de envío a Graph (Requiere driveId e itemId previamente obtenidos)
        // Aquí debes insertar tu función fetch habitual para PATCH /session/workbook/tables/...
        console.log("Datos a enviar:", rowData);
        alert("Simulación: Datos listos para el Excel con 45 columnas.");
        document.getElementById("status-text").innerText = "Guardado con éxito.";
    } catch (err) {
        console.error(err);
        document.getElementById("status-text").innerText = "Error al guardar.";
    }
}

document.addEventListener("DOMContentLoaded", initMSAL);
</script>
</body>
</html>
