<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFSA — Gestión de Crédito</title>
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.js"></script>
    <style>
        :root {
            --primary: #1A2B49; /* Azul Financiero */
            --accent: #E24B4A;  /* Rojo CAFSA */
            --success: #2E7D32;
            --bg-body: #F4F7F9;
            --text-main: #2C3E50;
            --border-color: #CFD8DC;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, Helvetica, sans-serif; background: var(--bg-body); color: var(--text-main); }
        
        header { 
            background: var(--primary); padding: 0 2rem; height: 60px; display: flex; 
            align-items: center; justify-content: space-between; color: white;
            border-bottom: 4px solid var(--accent);
        }
        
        .logo-badge { font-weight: 900; letter-spacing: 1px; font-size: 1.2rem; }
        
        main { padding: 2rem 1rem; max-width: 1100px; margin: 0 auto; }
        
        .form-card { 
            background: #ffffff; border-radius: var(--radius); padding: 2.5rem; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.08); border: 1px solid var(--border-color);
        }

        .section-title { 
            color: var(--primary); padding-bottom: 8px; border-bottom: 2px solid #ECEFF1;
            margin: 30px 0 20px 0; font-size: 14px; font-weight: bold; text-transform: uppercase;
            display: flex; align-items: center; gap: 10px;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field.span-full { grid-column: 1 / -1; }
        
        label { font-size: 11px; font-weight: bold; color: #546E7A; }
        
        input, select, textarea { 
            padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; 
            font-size: 13px; background: #FBFCFD; transition: 0.2s; outline: none;
        }
        
        input:focus, select:focus, textarea:focus { 
            border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(26, 43, 73, 0.1);
        }

        input:required { border-left: 3px solid var(--accent); }

        .analysis-section { 
            border: 1px solid var(--primary); background: #F8F9FA; display: none; 
            padding: 20px; border-radius: var(--radius); margin-top: 15px;
        }

        .btn-save { 
            background: var(--primary); color: white; border: none; padding: 14px 45px; 
            border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s;
            font-size: 14px; box-shadow: 0 4px 12px rgba(26, 43, 73, 0.2);
        }
        .btn-save:hover { background: #0D192E; transform: translateY(-2px); }

        #status-bar { background: #fff; padding: 10px 2rem; font-size: 12px; border-bottom: 1px solid #eee; display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-badge">CAFSA <span style="font-weight:100; opacity:0.7">| CRÉDITO</span></div>
    <button id="auth-btn" style="background:none; border:1px solid #fff; color:#fff; padding:5px 15px; border-radius:20px; cursor:pointer;" onclick="signOut()">Cerrar Sesión</button>
</header>

<div id="status-bar"><span id="status-text">Validando credenciales...</span></div>

<main>
    <div class="form-card">
        <form id="formNuevo">
            <div class="section-title">1. Información del Solicitante</div>
            <div class="grid">
                <div class="field"><label>Cédula (W) *</label><input type="text" id="n_cedula" required></div>
                <div class="field"><label>Cliente (X) *</label><input type="text" id="n_cliente" required></div>
                <div class="field"><label>Empresa (T) *</label><select id="n_empresa" required><option value="">-- Seleccionar --</option><option>ARRENDADORA</option><option>FINANCIERA</option></select></div>
                <div class="field"><label>Ejecutivo (U) *</label><select id="n_ejecutivo" required><option value="">-- Seleccionar --</option><option>K. Rodríguez</option><option>A. Mora</option><option>A. Valverde</option><option>B. Castro</option><option>C. Molina</option></select></div>
            </div>

            <div class="section-title">2. Estructura Financiera</div>
            <div class="grid">
                <div class="field"><label>Moneda (Y) *</label><select id="n_moneda" required><option value="COLONES">COLONES</option><option value="DOLARES">DOLARES</option></select></div>
                <div class="field"><label>Monto Solicitado (Z) *</label><input type="number" id="n_valor" required></div>
                <div class="field"><label>Prima/Depósito (AA) *</label><input type="number" id="n_deposito" required oninput="calcularPct()"></div>
                <div class="field"><label>Monto Garantía (AB) *</label><input type="number" id="n_montoArrendar" required></div>
            </div>

            <div class="section-title">3. Control Interno</div>
            <div class="grid">
                <div class="field"><label>Estado Operación (B) *</label><select id="n_estado" required><option value="">-- Seleccionar --</option><option>Aprobado</option><option>En aprobación</option><option>En Estudio de Riesgo</option></select></div>
                <div class="field"><label>Producto (F) *</label><select id="n_producto" required><option value="">-- Seleccionar --</option><option>AOFF</option><option>AOP</option><option>USADOS</option></select></div>
                <div class="field"><label>Fecha Entrega (C)</label><input type="date" id="n_fechaEntrega"></div>
            </div>

            <div class="section-title">4. Envío a Análisis Técnico</div>
            <div class="field span-full">
                <div style="display: flex; align-items: center; gap: 15px; padding: 20px; background: #1A2B49; color: white; border-radius: 12px; cursor: pointer;">
                    <input type="checkbox" id="check_A" onchange="toggleAnalisis()" style="width: 20px; height: 20px;">
                    <label for="check_A" style="color: white; font-size: 13px; margin:0;">REQUIERE ANÁLISIS DE CRÉDITO (AT)</label>
                </div>
            </div>

            <div id="seccionAnalisis" class="analysis-section">
                <div class="grid">
                    <div class="field"><label>Monto Solicitud (AX) *</label><input type="text" id="ana_monto" placeholder="$1111 ó ¢11111"></div>
                    <div class="field"><label>Tipo de vehículo (AV)</label><input type="text" id="ana_vehiculo" placeholder="Marca, estilo, año..."></div>
                    <div class="field"><label>Porcentaje de Prima (AZ) *</label><input type="text" id="ana_prima" placeholder="Ej: 20%"></div>
                    <div class="field"><label>Nivel de aprobación (BA) *</label>
                        <select id="ana_nivel">
                            <option value="">-- Seleccionar --</option>
                            <option>Comité de Crédito</option>
                            <option>Comité Ejecutivo</option>
                            <option>Gerencia General</option>
                        </select>
                    </div>
                    <div class="field"><label>Gestión (BC) *</label>
                        <select id="ana_gestion">
                            <option value="">-- Seleccionar --</option>
                            <option>Nuevo</option>
                            <option>Incremento</option>
                            <option>Renovación</option>
                        </select>
                    </div>
                    <div class="field"><label>Plazo Meses (BE) *</label><input type="number" id="ana_plazo"></div>
                    <div class="field span-full"><label>Tasa fija y variable (BD) *</label><textarea id="ana_tasas" rows="2" placeholder="Detallar condiciones de tasa..."></textarea></div>
                    <div class="field"><label>Ejecutivo y contacto (BF) *</label><input type="text" id="ana_contacto" placeholder="Nombre y Celular"></div>
                    <div class="field"><label>Origen de fondos (BJ) *</label><input type="text" id="ana_fondos"></div>
                </div>
            </div>

            <div style="margin-top: 40px; text-align: right;">
                <button type="button" class="btn-save" onclick="guardar()">Registrar Operación</button>
            </div>
        </form>
    </div>
</main>

<script>
    // Lógica de validación obligatoria
    function toggleAnalisis() {
        const isChecked = document.getElementById("check_A").checked;
        const seccion = document.getElementById("seccionAnalisis");
        seccion.style.display = isChecked ? "block" : "none";
        
        // Hacer requeridos los campos de análisis solo si el check está activo
        const camposAnalisis = seccion.querySelectorAll('input, select, textarea');
        camposAnalisis.forEach(el => el.required = isChecked);
    }

    function calcularPct() {
        const dep = parseFloat(document.getElementById("n_deposito").value) || 0;
        const mon = parseFloat(document.getElementById("n_montoArrendar").value) || 0;
        if (mon > 0) {
            const pct = ((dep/mon)*100).toFixed(0) + "%";
            document.getElementById("ana_prima").value = pct;
        }
    }

    async function guardar() {
        const form = document.getElementById("formNuevo");
        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }
        
        // Aquí se dispara tu lógica de SharePoint (guardarNuevo)
        // Recordar que el campo AU (Marca Temporal) se genera aquí:
        const marcaTemporal = new Date().toLocaleString();
        console.log("Guardando con Marca Temporal:", marcaTemporal);
        // ... (resto de tu función graphCall)
    }
</script>
</body>
</html>
